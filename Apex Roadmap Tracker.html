turn s;}\nfunction weekStart(off){const d=new Date();const dow=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-dow-7*off);return d;}\nfunction timeData(f){\n  const D=86400000;\n  if(f==='week'){\n    const s=weekStart(0).getTime();\n    return {label:'This week',cmp:'VS LAST WEEK',pods:[{v:sumBetween(s,s+3*D),l:'Mon–Wed'},{v:sumBetween(s+3*D,s+5*D),l:'Thu–Fri'},{v:sumBetween(s+5*D,s+7*D),l:'Sat–Sun'}],cur:sumBetween(s,s+7*D),prev:sumBetween(s-7*D,s)};\n  }\n  if(f==='month'){\n    const n=new Date(),y=n.getFullYear(),m=n.getMonth();\n    const a=new Date(y,m,1).getTime(),m2=new Date(y,m,15).getTime(),m3=new Date(y,m,22).getTime(),end=new Date(y,m+1,1).getTime(),pa=new Date(y,m-1,1).getTime();\n    return {label:'This month',cmp:'VS LAST MONTH',pods:[{v:sumBetween(a,m2),l:'Wk 1–2'},{v:sumBetween(m2,m3),l:'Wk 3'},{v:sumBetween(m3,end),l:'Wk 4+'}],cur:sumBetween(a,end),prev:sumBetween(pa,a)};\n  }\n  const n=new Date(),y=n.getFullYear(),q=Math.floor(n.getMonth()/3);\n  const pods=[q-2,q-1,q].map(qq=>{const yy=y+(qq<0?-1:0),qi=((qq%4)+4)%4;return {v:sumBetween(new Date(yy,qi*3,1).getTime(),new Date(yy,qi*3+3,1).getTime()),l:'Q'+(qi+1)};});\n  const ys=new Date(y,0,1).getTime(),ye=new Date(y+1,0,1).getTime(),pys=new Date(y-1,0,1).getTime();\n  return {label:'This year',cmp:'VS LAST YEAR',pods,cur:sumBetween(ys,ye),prev:sumBetween(pys,ys)};\n}\nfunction podPattern(i){\n  const c='rgba(255,122,60,.3)';\n  if(i===0)return `<svg viewBox=\"0 0 60 60\" preserveAspectRatio=\"none\"><path d=\"M0 44 Q10 36 20 44 T40 44 T60 44\" fill=\"none\" stroke=\"${c}\" stroke-width=\"1.4\"/><path d=\"M0 52 Q10 44 20 52 T40 52 T60 52\" fill=\"none\" stroke=\"${c}\" stroke-width=\"1.4\"/><\u002Fsvg>`;\n  if(i===1){let d='';for(let y=8;y<60;y+=9)for(let x=8;x<60;x+=9)d+=`<circle cx=\"${x}\" cy=\"${y}\" r=\"1.4\" fill=\"${c}\"/>`;return `<svg viewBox=\"0 0 60 60\" preserveAspectRatio=\"none\">${d}<\u002Fsvg>`;}\n  return `<svg viewBox=\"0 0 60 60\" preserveAspectRatio=\"none\"><defs><linearGradient id=\"pg\" x1=\"0\" y1=\"1\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"rgba(255,122,60,.32)\"/><stop offset=\"1\" stop-color=\"rgba(255,122,60,0)\"/><\u002FlinearGradient><\u002Fdefs><rect width=\"60\" height=\"60\" fill=\"url(#pg)\"/><\u002Fsvg>`;\n}\nfunction bentoHTML(){\n  const T=timeData(_progFilter);\n  const ds=T.cur-T.prev;\n  const cmpCol=T.cur>T.prev?'var(--green)':T.cur<T.prev?'var(--red)':'var(--gold)';\n  const ratio=T.prev>0?Math.round(T.cur/T.prev*100)+'%':(T.cur>0?'NEW':'0%');\n  const dtxt=(ds>=0?'▲ +':'▼ ')+hrsmin(Math.abs(ds))+' vs last';\n  const pods=T.pods.map((p,i)=>`<div class=\"pod\"><div class=\"pod-pat\">${podPattern(i)}<\u002Fdiv><div class=\"pod-v\">${p.v?hrsmin(p.v):'0m'}<\u002Fdiv><div class=\"pod-l\">${p.l}<\u002Fdiv><\u002Fdiv>`).join('');\n  const dots=['week','month','year'].map(f=>`<button class=\"${f===_progFilter?'on':''}\" onclick=\"setTime('${f}')\" aria-label=\"${f}\"><\u002Fbutton>`).join('');\n  return `<div class=\"card bento\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <h3 style=\"font-size:21px\">Time worked<\u002Fh3>\n      <button class=\"bento-filter\" style=\"margin-left:auto\" onclick=\"cycleTime()\">${_progFilter} ▸<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:7px;margin-top:11px;flex-wrap:wrap\">\n      <span class=\"chip\">📅 ${T.label}<\u002Fspan>\n      <span class=\"chip\" style=\"color:${cmpCol};border-color:${cmpCol}\">${dtxt}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"bento-pods\">${pods}<\u002Fdiv>\n    <div class=\"bento-foot\">\n      <div><div class=\"big\" style=\"font-size:38px;line-height:.9;color:${cmpCol}\">${ratio}<\u002Fdiv><div class=\"mono\" style=\"font-size:8.5px;color:var(--muted);letter-spacing:.12em;margin-top:4px\">${T.cmp}<\u002Fdiv><\u002Fdiv>\n      <div class=\"dotpage\">${dots}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction cycleTime(){_progFilter=_progFilter==='week'?'month':_progFilter==='month'?'year':'week';renderScreen('progress');}\nfunction setTime(f){_progFilter=f;renderScreen('progress');}\nfunction progressHTML(){\n  const wd=weekSessDays();const wlabels=['TUE','WED','THU','FRI','SAT'];\n  let wkpips='';wd.forEach((on,i)=>{wkpips+=`<div style=\"flex:1;text-align:center\"><div style=\"height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${on?'var(--green)':'rgba(255,255,255,.04)'};color:${on?'#06220F':'var(--dim)'};font-size:13px\">${on?'✓':''}<\u002Fdiv><div class=\"mono\" style=\"font-size:8px;color:var(--dim);margin-top:4px\">${wlabels[i]}<\u002Fdiv><\u002Fdiv>`;});\n  const sw=staminaWeek();\n  // bw trend line (last 12)\n  const bwArr=DB.bw.slice(-12).map(e=>+e.w);\n  const bwChart=lineChart(bwArr);\n  // lift history\n  const logged=Object.keys(DB.log).filter(k=>DB.log[k].length);\n  if(!_progSel&&logged.length)_progSel=logged[0];\n  let opts=logged.map(k=>`<option value=\"${k}\" ${k===_progSel?'selected':''}>${esc((exDef(k)||[null,k])[1])}<\u002Foption>`).join('');\n  let liftHist='',liftChart='';\n  if(_progSel&&DB.log[_progSel]){\n    liftHist=DB.log[_progSel].slice(-5).reverse().map(e=>`${e.d} — <b>${e.w?e.w+'kg × ':''}${e.reps.join('/')}<\u002Fb>`).join('<br>');\n    const warr=DB.log[_progSel].slice(-10).map(e=>parseFloat(e.w)||0);\n    liftChart=miniBar(warr);\n  }\n  // gates\n  let gates='';\n  ORDER.forEach(ph=>{gates+=gateCardHTML(ph);});\n\n  return `\n  <div class=\"hd\"><div><div class=\"eyebrow\" style=\"color:var(--dawn)\">Progress<\u002Fdiv><h1 style=\"font-size:26px;margin-top:8px\">Logs & Trends<\u002Fh1><\u002Fdiv><\u002Fdiv>\n\n  <div class=\"divider\">This week<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n    <div class=\"card\">\n      <div style=\"display:flex;align-items:baseline\"><span class=\"clabel\">Sessions<\u002Fspan><span class=\"big\" style=\"margin-left:auto;font-size:22px\">${weekCount()}/5<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:5px;margin-top:12px\">${wkpips}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;justify-content:center\">\n      <div class=\"clabel\">Stamina<\u002Fdiv>\n      <div class=\"big\" style=\"font-size:22px;margin-top:6px;color:var(--blue)\">${sw.done}/${sw.planned}<\u002Fdiv>\n      <div class=\"pbar\" style=\"margin-top:8px\"><span class=\"blu\" style=\"width:${sw.planned?Math.round(sw.done/sw.planned*100):0}%\"><\u002Fspan><\u002Fdiv>\n      <div class=\"mono\" style=\"font-size:9px;color:var(--dim);margin-top:6px\">Zone-2 walks done<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card\" style=\"margin-top:12px\"><div class=\"clabel\">Recovery streak · <span style=\"color:var(--gold)\">${DB.restDays.streak} days<\u002Fspan><\u002Fdiv><\u002Fdiv>\n\n  <div class=\"divider\">Stamina & cardio<\u002Fdiv>\n  ${cardioSectionHTML()}\n\n  <div class=\"divider\">Time worked<\u002Fdiv>\n  ${bentoHTML()}\n\n  <div class=\"divider\">Consistency calendar<\u002Fdiv>\n  ${calendarHTML()}\n\n  <div class=\"divider\">PR trophy case<\u002Fdiv>\n  ${prCaseHTML()}\n\n  <div class=\"divider\">Weekly volume by muscle<\u002Fdiv>\n  ${volumeTrendHTML()}\n\n  <div class=\"divider\">Bodyweight trend<\u002Fdiv>\n  <div class=\"card\">${DB.bw.length>1?bwChart:'<div class=\"mono\" style=\"font-size:12px;color:var(--muted)\">Log bodyweight to see the trend.<\u002Fdiv>'}\n    <div class=\"hist\" style=\"margin-top:12px\">${DB.bw.length?DB.bw.slice(-6).reverse().map(e=>`${e.d} — <b>${e.w}kg<\u002Fb>`).join('<br>'):'No entries yet.'}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"divider\">Lift history<\u002Fdiv>\n  <div class=\"card\">\n    <select class=\"selin\" onchange=\"progSel(this.value)\"><option value=\"\">${logged.length?'— pick an exercise —':'— log sets to populate —'}<\u002Foption>${opts}<\u002Fselect>\n    ${liftChart?`<div style=\"margin-top:12px\">${liftChart}<\u002Fdiv>`:''}\n    <div class=\"hist\" style=\"margin-top:12px\">${liftHist||'Log sets and they appear here.'}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"divider\">Injury & pain log<\u002Fdiv>\n  ${injuryHTML()}\n\n  <div class=\"divider\">Phase gates<\u002Fdiv>\n  ${gates}\n\n  <div class=\"divider\">Backup & restore<\u002Fdiv>\n  <div class=\"card\">\n    ${(()=>{const a=backupAge();return a==null?'<div class=\"mono\" style=\"font-size:10px;color:var(--gold);margin-bottom:10px\">⚠ Never backed up — download a copy to be safe.<\u002Fdiv>':a>=7?'<div class=\"mono\" style=\"font-size:10px;color:var(--gold);margin-bottom:10px\">⚠ Last backup '+a+' days ago — time for a fresh one.<\u002Fdiv>':'<div class=\"mono\" style=\"font-size:10px;color:var(--green);margin-bottom:10px\">✓ Backed up '+(a===0?'today':a+'d ago')+'<\u002Fdiv>';})()}\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n      <button class=\"ghostbtn\" onclick=\"downloadBackup()\">⬇ Download backup file<\u002Fbutton>\n      <label class=\"ghostbtn\" style=\"cursor:pointer\">⬆ Restore from file<input type=\"file\" accept=\"application/json,.json\" style=\"display:none\" onchange=\"importFile(this)\"><\u002Flabel>\n    <\u002Fdiv>\n    <button class=\"ghostbtn\" style=\"margin-top:8px\" onclick=\"exportLog()\">Copy backup (JSON)<\u002Fbutton> <span id=\"exp-ok\" class=\"saved\"><\u002Fspan>\n    <textarea class=\"txtin\" id=\"impbox\" style=\"margin-top:10px\" placeholder=\"…or paste a backup JSON here to restore…\"><\u002Ftextarea>\n    <button class=\"ghostbtn\" style=\"margin-top:8px\" onclick=\"importLog()\">Import pasted JSON<\u002Fbutton> <span id=\"imp-ok\" class=\"saved\"><\u002Fspan>\n    <div class=\"simplecard\" style=\"margin-top:12px\"><b>Your data lives on this device.<\u002Fb> It survives closing the app and redeploys — but not clearing site data or switching phones. Download a file weekly and you’re safe.<\u002Fdiv>\n  <\u002Fdiv>\n  `;\n}\nfunction progSel(v){_progSel=v;renderScreen('progress');}\n/* ---- #6 cardio / football log ---- */\nfunction cardioSectionHTML(){\n  const fb=footballWeek();const cw=cardioWeek();\n  const recent=DB.cardio.slice(-6).reverse();\n  const label={football:'⚽ Football',zone2:'🚶 Zone-2',intervals:'🚴 Intervals',sprints:'🏃 Sprints',rope:'🪢 Jump rope',swim:'🏊 Swim',other:'· Other'};\n  let list=recent.map((c,i)=>`<div class=\"cardio-row\"><span>${label[c.type]||c.type}${c.mins?' · '+c.mins+'m':''}<\u002Fspan><span class=\"mono\" style=\"color:var(--dim);font-size:10px;margin-left:auto\">${c.d}<\u002Fspan><\u002Fdiv>`).join('');\n  return `<div class=\"card\">\n    <div style=\"display:flex;align-items:baseline;gap:8px\"><span class=\"clabel\">Stamina & cardio · this week<\u002Fspan><span class=\"big\" style=\"margin-left:auto;font-size:18px;color:var(--blue)\">${cw}<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:7px;margin-top:6px;flex-wrap:wrap\">\n      <span class=\"chip\" style=\"color:var(--green);border-color:rgba(74,222,128,.35)\">⚽ Football ×${fb}<\u002Fspan>\n      <span class=\"chip\">Any cardio counts toward stamina<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:7px;margin-top:12px;flex-wrap:wrap\">\n      <button class=\"cardio-add tap\" onclick=\"quickCardio('football')\">+ Football<\u002Fbutton>\n      <button class=\"cardio-add tap\" onclick=\"quickCardio('zone2')\">+ Zone-2<\u002Fbutton>\n      <button class=\"cardio-add tap\" onclick=\"quickCardio('intervals')\">+ Intervals<\u002Fbutton>\n      <button class=\"cardio-add tap\" onclick=\"quickCardio('sprints')\">+ Sprints<\u002Fbutton>\n      <button class=\"cardio-add tap\" onclick=\"quickCardio('rope')\">+ Rope<\u002Fbutton>\n    <\u002Fdiv>\n    ${list?`<div style=\"margin-top:12px;display:flex;flex-direction:column;gap:6px\">${list}<\u002Fdiv>`:'<div class=\"mono\" style=\"font-size:11px;color:var(--dim);margin-top:12px\">No cardio logged yet — football is ad-hoc, log it whenever you play.<\u002Fdiv>'}\n  <\u002Fdiv>`;\n}\nfunction quickCardio(type){logCardio(type,0,'');renderScreen('progress');renderScreen('home');}\n/* ---- #9 PR trophy case ---- */\nfunction prCaseHTML(){\n  if(!DB.prs.length)return `<div class=\"card empty\"><div class=\"empty-i\">🏆<\u002Fdiv><div class=\"empty-t\">No PRs yet<\u002Fdiv><div class=\"empty-b\">Beat a logged weight on any lift and it lands here.<\u002Fdiv><button class=\"ghostbtn\" style=\"margin-top:12px\" onclick=\"beginPress()\">Start a session<\u002Fbutton><\u002Fdiv>`;\n  const best={};DB.prs.forEach(p=>{if(!best[p.id]||p.w>best[p.id].w)best[p.id]=p;});\n  const arr=Object.values(best).sort((a,b)=>new Date(b.iso)-new Date(a.iso)).slice(0,10);\n  const rows=arr.map(p=>`<div class=\"pr-row\"><span class=\"pr-medal\">🏆<\u002Fspan><div style=\"min-width:0\"><div style=\"font-weight:600;font-size:13.5px\">${esc(p.name)}<\u002Fdiv><div class=\"mono\" style=\"font-size:10px;color:var(--dim)\">${p.d}<\u002Fdiv><\u002Fdiv><span class=\"pr-w mono\">${p.w}kg${p.reps?' × '+esc(p.reps):''}<\u002Fspan><\u002Fdiv>`).join('');\n  return `<div class=\"card\"><div style=\"display:flex;align-items:baseline\"><span class=\"clabel\">Lifetime PRs<\u002Fspan><span class=\"mono\" style=\"margin-left:auto;font-size:11px;color:var(--gold)\">${Object.keys(best).length} lifts<\u002Fspan><\u002Fdiv><div style=\"margin-top:12px;display:flex;flex-direction:column;gap:7px\">${rows}<\u002Fdiv><\u002Fdiv>`;\n}\n/* ---- #16 calendar ---- */\nlet _calOff=0;\nfunction calendarHTML(){\n  const now=new Date();const base=new Date(now.getFullYear(),now.getMonth()-_calOff,1);\n  const y=base.getFullYear(),m=base.getMonth();\n  const first=new Date(y,m,1).getDay();const days=new Date(y,m+1,0).getDate();\n  const trained={};DB.sess.forEach(s=>{const d=new Date(s.d);if(d.getFullYear()===y&&d.getMonth()===m)trained[d.getDate()]=(trained[d.getDate()]||0)+1;});\n  const cardioD={};DB.cardio.forEach(c=>{const d=new Date(c.iso);if(d.getFullYear()===y&&d.getMonth()===m)cardioD[d.getDate()]=1;});\n  let cells='';for(let i=0;i<first;i++)cells+='<div><\u002Fdiv>';\n  for(let dd=1;dd<=days;dd++){const t=trained[dd],ca=cardioD[dd];const isToday=(_calOff===0&&dd===now.getDate());\n    cells+=`<div class=\"cal-d ${t?'trained':''} ${isToday?'today':''}\" title=\"${t?t+' session':''}\">${dd}${ca&&!t?'<span class=\"cal-dot\"><\u002Fspan>':''}<\u002Fdiv>`;}\n  const mName=base.toLocaleDateString('en-US',{month:'long',year:'numeric'});\n  const dows=['S','M','T','W','T','F','S'].map(d=>`<div class=\"cal-h\">${d}<\u002Fdiv>`).join('');\n  return `<div class=\"card\">\n    <div style=\"display:flex;align-items:center;gap:10px\"><button class=\"cal-nav\" onclick=\"calMove(1)\">‹<\u002Fbutton><span class=\"big\" style=\"font-size:16px;flex:1;text-align:center\">${mName}<\u002Fspan><button class=\"cal-nav\" onclick=\"calMove(-1)\" ${_calOff===0?'disabled':''}>›<\u002Fbutton><\u002Fdiv>\n    <div class=\"cal-grid\" style=\"margin-top:12px\">${dows}${cells}<\u002Fdiv>\n    <div style=\"display:flex;gap:14px;margin-top:12px;justify-content:center\"><span class=\"mono\" style=\"font-size:9.5px;color:var(--muted)\"><span class=\"cal-key trained\"><\u002Fspan> Trained<\u002Fspan><span class=\"mono\" style=\"font-size:9.5px;color:var(--muted)\"><span class=\"cal-key dot\"><\u002Fspan> Cardio<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction calMove(d){_calOff=Math.max(0,_calOff+d);renderScreen('progress');}\n/* ---- #17 deload-aware weekly volume by muscle ---- */\nfunction volumeTrendHTML(){\n  const cats=[['Chest','chest'],['Back',['lat','mid-back','trap']],['Shoulders',['shoulder-front','shoulder-side','shoulder-rear']],['Arms',['bicep','tricep','forearm']],['Legs',['quad','hamstring','glute','calf']],['Core',['abs','obliques']]];\n  const now=Date.now();const setsByCat={};cats.forEach(c=>setsByCat[c[0]]=0);let any=false;\n  Object.keys(DB.log).forEach(id=>{const h=DB.log[id]||[];h.forEach(e=>{const t=new Date(e.d+' '+now).getTime?0:0;});});\n  // count hard sets in last 7 days from session logs (DB.log entries with recent date string unreliable) — use DB.sess durations? Instead count from DB.log by matching dispDate of last 7 days\n  const recentDates=new Set();for(let i=0;i<7;i++){recentDates.add(dispDate(new Date(Date.now()-i*86400000).toISOString().slice(0,10)));}\n  Object.keys(DB.log).forEach(id=>{const mus=musclesFor(id);const h=DB.log[id]||[];h.forEach(e=>{if(recentDates.has(e.d)){any=true;const sets=(e.reps||[]).length||1;mus.p.forEach(mm=>cats.forEach(c=>{const g=Array.isArray(c[1])?c[1]:[c[1]];if(g.includes(mm))setsByCat[c[0]]+=sets;}));}});});\n  if(!any)return `<div class=\"card empty\"><div class=\"empty-i\">📊<\u002Fdiv><div class=\"empty-t\">No volume yet this week<\u002Fdiv><div class=\"empty-b\">Log sets and your weekly hard-set balance by muscle appears here${DB.deload?' — recovery week, aim ~60%':''}.<\u002Fdiv><\u002Fdiv>`;\n  const max=Math.max(1,...cats.map(c=>setsByCat[c[0]]));\n  const rows=cats.map(c=>{const v=setsByCat[c[0]];const pct=Math.round(v/max*100);return `<div style=\"display:flex;align-items:center;gap:10px;margin-bottom:9px\"><span class=\"mono\" style=\"font-size:10px;color:var(--muted);width:70px\">${c[0]}<\u002Fspan><div class=\"pbar\" style=\"flex:1\"><span class=\"${v?'dwn':''}\" style=\"width:${pct}%\"><\u002Fspan><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:var(--gold);width:26px;text-align:right\">${v}<\u002Fspan><\u002Fdiv>`;}).join('');\n  return `<div class=\"card\">${DB.deload?'<div class=\"mono\" style=\"font-size:10px;color:var(--blue);margin-bottom:10px\">RECOVERY WEEK · target ~60% of normal volume<\u002Fdiv>':''}${rows}<div class=\"mono\" style=\"font-size:9.5px;color:var(--dim);margin-top:4px\">Hard sets logged · last 7 days<\u002Fdiv><\u002Fdiv>`;\n}\n/* ---- #19 injury / pain log ---- */\nfunction injuryHTML(){\n  const recent=DB.injuries.slice(-8).reverse();\n  const patterns={};DB.injuries.forEach(x=>{patterns[x.area]=(patterns[x.area]||0)+1;});\n  const flags=Object.keys(patterns).filter(a=>patterns[a]>=3);\n  let rows=recent.map(x=>`<div class=\"cardio-row\"><span>${esc(x.area)}${x.note?' — '+esc(x.note):''}<\u002Fspan><span class=\"mono\" style=\"color:var(--dim);font-size:10px;margin-left:auto\">${x.d}<\u002Fspan><\u002Fdiv>`).join('');\n  return `<div class=\"card\">\n    ${flags.length?`<div class=\"mono\" style=\"font-size:11px;color:var(--red);background:rgba(255,140,140,.07);border:1px solid rgba(255,140,140,.3);border-radius:10px;padding:9px 11px;margin-bottom:12px\">⚠ Recurring: ${flags.map(esc).join(', ')} — consider deload or form check.<\u002Fdiv>`:''}\n    <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n      ${['Knee','Shoulder','Lower back','Elbow','Wrist','Hamstring'].map(a=>`<button class=\"cardio-add tap\" onclick=\"logInjury('${a}')\">+ ${a}<\u002Fbutton>`).join('')}\n    <\u002Fdiv>\n    ${rows?`<div style=\"margin-top:12px;display:flex;flex-direction:column;gap:6px\">${rows}<\u002Fdiv>`:'<div class=\"mono\" style=\"font-size:11px;color:var(--dim);margin-top:12px\">Flag any tweak or pain — patterns surface after 3 logs.<\u002Fdiv>'}\n  <\u002Fdiv>`;\n}\nfunction logInjury(area){DB.injuries.push({area,note:'',iso:isoToday(),d:dispDate(isoToday())});if(DB.injuries.length>200)DB.injuries=DB.injuries.slice(-200);buzz([80,40,80]);saveDB();renderScreen('progress');}\n/* ---- #11 file backup ---- */\nfunction downloadBackup(){\n  const blob=new Blob([JSON.stringify(DB,null,0)],{type:'application/json'});\n  const url=URL.createObjectURL(blob);const a=document.createElement('a');\n  a.href=url;a.download='apex-backup-'+isoToday()+'.json';document.body.appendChild(a);a.click();a.remove();\n  setTimeout(()=>URL.revokeObjectURL(url),2000);\n  DB.lastBackup=isoToday();saveDB();renderScreen('progress');\n}\nfunction importFile(input){const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.log)throw 0;DB={...DB,...d};saveDB();applyTheme();renderAll();alertToast('Backup restored ✓');}catch(e){alertToast('Invalid backup file ✗');}};r.readAsText(f);}\nfunction backupAge(){if(!DB.lastBackup)return null;return Math.floor((Date.now()-new Date(DB.lastBackup).getTime())/86400000);}\nfunction alertToast(msg){const o=document.getElementById('imp-ok');if(o){o.textContent=msg;setTimeout(()=>{o.textContent='';},2200);}}\nfunction gateCardHTML(ph){\n  const idx=ORDER.indexOf(ph),act=actIdx();\n  const passed=!!DB.advanced[ph];\n  let items='';\n  PHASES[ph].exit.forEach((txt,i)=>{\n    const met=gateMet(ph,i);\n    if(i===0){const hint='auto · current '+(bwNow()||'—')+'kg / needs '+BWGATE[ph]+'kg';\n      items+=`<div class=\"gate ${met?'met':''}\" style=\"margin-bottom:7px\"><span class=\"cb\">✓<\u002Fspan><span>${txt}<span class=\"hint\">${hint}<\u002Fspan><\u002Fspan><span class=\"autotag\">AUTO<\u002Fspan><\u002Fdiv>`;}\n    else{let hint='';if(ph==='p1'&&i===3)hint=`<span class=\"hint\">current streak: ${DB.diet.streak} days<\u002Fspan>`;\n      items+=`<div class=\"gate ${met?'met':''}\" onclick=\"gateToggle('${ph}',${i})\" style=\"cursor:pointer;margin-bottom:7px\"><span class=\"cb\">✓<\u002Fspan><span>${txt}${hint}<\u002Fspan><\u002Fdiv>`;}\n  });\n  const nxt=ORDER[idx+1];\n  const label=nxt?'Advance to Phase '+nxt.slice(1)+' →':'Mark target achieved 🏆';\n  let btn;\n  if(passed)btn=`<div class=\"simplecard\" style=\"border-left-color:var(--green);margin-top:6px\"><b>Gate passed ${dispDate(DB.advanced[ph])}.<\u002Fb>${nxt?'':' Maintenance mode.'}<\u002Fdiv>`;\n  else if(idx>act)btn=`<div class=\"mono\" style=\"font-size:11px;color:var(--dim);margin-top:6px\">🔒 Locked — pass Phase ${act+1} first. Read the criteria freely.<\u002Fdiv>`;\n  else btn=`<button class=\"advbtn\" ${allMet(ph)?'':'disabled'} onclick=\"advance('${ph}')\">${allMet(ph)?label:'Complete all criteria to unlock →'}<\u002Fbutton>`;\n  return `<div class=\"card\" style=\"margin-bottom:12px\">\n    <div style=\"display:flex;align-items:baseline;gap:9px;margin-bottom:12px\"><span class=\"big\" style=\"font-size:17px;text-transform:uppercase\">${PHASES[ph].title}<\u002Fspan><span class=\"mono\" style=\"font-size:10px;color:${passed?'var(--green)':idx===act?'var(--dawn)':'var(--dim)'};text-transform:uppercase\">${passed?'PASSED':idx===act?'ACTIVE':idx<act?'PASSED':'LOCKED'}<\u002Fspan><\u002Fdiv>\n    ${items}${btn}<\u002Fdiv>`;\n}\nfunction lineChart(arr){\n  if(arr.length<2)return '';\n  const mn=Math.min(...arr)-0.3,mx=Math.max(...arr)+0.3,Wd=380,Hd=120,n=arr.length,pad=6;\n  const pt=arr.map((v,i)=>[pad+(i/(n-1))*(Wd-2*pad),Hd-pad-((v-mn)/(mx-mn))*(Hd-2*pad)]);\n  const line='M'+pt.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L');\n  const area=line+` L${Wd-pad} ${Hd} L${pad} ${Hd} Z`;\n  let dots=pt.map(p=>`<circle cx=\"${p[0].toFixed(1)}\" cy=\"${p[1].toFixed(1)}\" r=\"2.6\" fill=\"var(--dawn)\"/>`).join('');\n  return `<svg viewBox=\"0 0 ${Wd} ${Hd}\" style=\"width:100%;height:auto;overflow:visible\"><path d=\"${area}\" fill=\"rgba(255,122,60,.1)\"/><path d=\"${line}\" fill=\"none\" stroke=\"var(--dawn)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>${dots}<\u002Fsvg>`;\n}\nfunction miniBar(arr){\n  if(!arr.length)return '';\n  const mx=Math.max(1,...arr);\n  return `<div class=\"barrow\" style=\"height:70px\">${arr.map((v,i)=>`<div class=\"bar\"><div class=\"col\" style=\"height:${v?Math.max(6,Math.round(v/mx*100)):2}%\"><\u002Fdiv><\u002Fdiv>`).join('')}<\u002Fdiv>`;\n}\nfunction exportLog(){\n  const txt=JSON.stringify(DB);\n  try{navigator.clipboard.writeText(txt);}catch(e){const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();}\n  const o=document.getElementById('exp-ok');o.textContent='COPIED ✓';setTimeout(()=>o.textContent='',1600);\n}\nfunction importLog(){\n  const v=document.getElementById('impbox').value.trim();if(!v)return;\n  try{const d=JSON.parse(v);if(typeof d!=='object'||!d.log)throw 0;DB={...DB,...d};saveDB();renderAll();\n    document.getElementById('imp-ok').textContent='RESTORED ✓';}\n  catch(e){document.getElementById('imp-ok').textContent='INVALID JSON ✗';}\n  setTimeout(()=>{const o=document.getElementById('imp-ok');if(o)o.textContent='';},2000);\n}\n\n/* ============================================================\n   MODAL\n   ============================================================ */\nlet _modalYes=null;\nfunction showModal(title,body,onYes,yesLabel){\n  _modalYes=onYes;\n  document.getElementById('modal-box').innerHTML=`<h4>${title}<\u002Fh4><p>${body}<\u002Fp><div class=\"row\"><button class=\"no\" onclick=\"modalClose()\">Cancel<\u002Fbutton><button class=\"yes\" onclick=\"modalYes()\">${yesLabel||'Confirm'}<\u002Fbutton><\u002Fdiv>`;\n  document.getElementById('modal').classList.add('show');\n}\nfunction modalClose(){document.getElementById('modal').classList.remove('show');_modalYes=null;}\nfunction modalYes(){if(_modalYes)_modalYes();}\n\n/* ============================================================\n   RESUME + BOOT\n   ============================================================ */\nfunction offerResume(){\n  const a=DB.activeSession;if(!a)return;\n  setTimeout(()=>{\n    showModal('Resume session?','You left a '+(WNAME[PHASES[a.phase].days[a.dayIdx].w]||'')+' session in progress — exercise '+(a.exIdx+1)+'. Pick up where you left off?',()=>{\n      modalClose();resumeSession();\n    },'Resume');\n    document.getElementById('modal-box').innerHTML+='';\n    // add discard option\n    const box=document.getElementById('modal-box');\n    const no=box.querySelector('.no');no.textContent='Discard';no.onclick=()=>{DB.activeSession=null;saveDB();modalClose();};\n  },700);\n}\nfunction resumeSession(){\n  const a=DB.activeSession;\n  RN=buildSession();\n  RN.exIdx=Math.min(a.exIdx,RN.exs.length-1);RN.setIdx=a.setIdx||0;RN.elapsed=a.elapsed||0;RN._elapsedBase=RN.elapsed;RN.logs=a.logs||{};RN.prs=a.prs||[];RN.startAt=a.startedAt||Date.now();\n  RN.phase='exercise';seedStep();\n  DB.activeSession=null;saveDB();\n  document.getElementById('runner').classList.add('show');\n  startRnTimer();renderRunner();\n}\n\nfunction applyTheme(){const t=DB.settings.theme||'dark';document.body.classList.toggle('light',t==='light');const m=document.querySelector('meta[name=\"theme-color\"]');if(m)m.setAttribute('content',t==='light'?'#EDEFF3':'#05070C');}\nfunction toggleTheme(){DB.settings.theme=(DB.settings.theme==='light')?'dark':'light';try{localStorage.removeItem('apex-theme');}catch(e){}buzz();saveDB();applyTheme();renderScreen('home');}\nfunction themeIcon(){return (DB.settings.theme||'dark')==='light'\n  ?'<svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z\"/><\u002Fsvg>'\n  :'<svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"/><path d=\"M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19\"/><\u002Fsvg>';}\nload();\napplyTheme();\n/* ============ ONBOARDING (#10) ============ */\nlet _obStep=0,_obPhase='p1';\nfunction startOnboard(){_obStep=0;document.getElementById('onboard').classList.add('show');renderOnboard();}\nfunction renderOnboard(){\n  const dots=[0,1,2,3].map(i=>`<span class=\"${i===_obStep?'on':''}\"><\u002Fspan>`).join('');\n  const steps=[\n    {ico:'🏔',step:'Welcome',h:'This is APEX',p:'Your 24-month roadmap from 62.5kg to a strong, athletic 75kg — training, fuel, stamina and recovery in one place. The product always shows you what to do next.',btn:'Get started'},\n    {ico:'⚖',step:'Step 1 · Baseline',h:'Your bodyweight',p:'Log it once now — you\\'ll update it weekly. Everything scales from here.',input:'weight',btn:'Next'},\n    {ico:'🎯',step:'Step 2 · Phase',h:'Where are you?',p:'Pick your starting phase. Most beginners start at Foundation — you can advance anytime once you pass the gates.',phase:true,btn:'Next'},\n    {ico:'▸',step:'Step 3 · The loop',h:'How a day works',p:'Tap BEGIN SESSION → warm up → log each set with the steppers → hit your rest timer → finish with your muscle map. Log water and protein in Fuel. Rest days have their own recovery protocol.',btn:'Start training'}\n  ];\n  const s=steps[_obStep];\n  let mid='';\n  if(s.input==='weight')mid=`<input class=\"ob-in\" id=\"ob-weight\" type=\"number\" inputmode=\"decimal\" placeholder=\"62.5 kg\" value=\"${DB.bw.length?DB.bw[DB.bw.length-1].w:''}\">`;\n  if(s.phase)mid=`<div class=\"ob-phase\">${ORDER.map(ph=>`<button class=\"${_obPhase===ph?'on':''}\" onclick=\"obPickPhase('${ph}')\"><div class=\"pt\">${PHASES[ph].title}<\u002Fdiv><div class=\"pd\">${PHMETA[ph][1]} · ${esc(PHASES[ph].desc.split('.')[0])}<\u002Fdiv><\u002Fbutton>`).join('')}<\u002Fdiv>`;\n  document.getElementById('onboard').innerHTML=`\n    <div class=\"ob-body\">\n      <div class=\"ob-ico\">${s.ico}<\u002Fdiv>\n      <div class=\"ob-step\">${s.step}<\u002Fdiv>\n      <h2>${s.h}<\u002Fh2>\n      <p>${s.p}<\u002Fp>\n      ${mid}\n    <\u002Fdiv>\n    <div class=\"ob-foot\">\n      <div class=\"ob-dots\">${dots}<\u002Fdiv>\n      <button class=\"logset tap\" onclick=\"obNext()\">${s.btn} ▸<\u002Fbutton>\n      ${_obStep===0?'<div style=\"text-align:center\"><button class=\"skiplink\" onclick=\"obFinish()\">skip intro<\u002Fbutton><\u002Fdiv>':''}\n    <\u002Fdiv>`;\n  setTimeout(()=>{const el=document.getElementById('ob-weight');if(el)el.focus();},250);\n}\nfunction obPickPhase(ph){_obPhase=ph;renderOnboard();}\nfunction obNext(){\n  const s=_obStep;\n  if(s===1){const v=(document.getElementById('ob-weight')||{}).value;if(v&&!isNaN(parseFloat(v))){if(!DB.bw.length)DB.bw.push({w:parseFloat(v),d:dispDate(isoToday()),iso:isoToday()});else DB.bw[DB.bw.length-1]={w:parseFloat(v),d:dispDate(isoToday()),iso:isoToday()};DB.bwPromptedFor=isoToday();}}\n  if(s===2){DB.phase=_obPhase;if(!DB.start[_obPhase])DB.start[_obPhase]=isoToday();selPhase=actIdx();}\n  if(_obStep>=3){obFinish();return;}\n  _obStep++;buzz();renderOnboard();\n}\nfunction obFinish(){DB.onboarded=true;saveDB();document.getElementById('onboard').classList.remove('show');renderAll();go('home');}\nif(!DB.onboarded)startOnboard(); else if(DB.activeSession)offerResume();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
