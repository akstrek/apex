  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e-area-inset-bottom))}\n.screen{display:none;padding:24px 18px 30px;animation:fade .28s var(--ease) both}\n.screen.show{display:block}\n@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n@keyframes pop{0%{transform:scale(.6);opacity:0}55%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}\n@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}50%{box-shadow:0 0 16px 1px rgba(74,222,128,.5)}}\n@keyframes breathe{0%,100%{box-shadow:0 22px 58px -26px rgba(255,70,50,.85),inset 0 1px 0 rgba(255,255,255,.12)}50%{box-shadow:0 24px 72px -20px rgba(255,70,50,1),inset 0 1px 0 rgba(255,255,255,.12)}}\n@keyframes haloPulse{0%,100%{opacity:.3}50%{opacity:.62}}\n.tap{transition:transform .08s var(--ease),filter .15s,border-color .15s,background .15s}\n.tap:active{transform:translateY(1px) scale(.99)}\n@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}\n\n/* cards */\n.card{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:var(--rad);padding:16px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 26px -20px rgba(0,0,0,.65)}\n.card+.card,.stack>*+*{margin-top:12px}\n.clabel{font-family:var(--fmono);font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}\n.big{font-family:var(--fdisp);font-weight:700;letter-spacing:-.02em}\n.divider{display:flex;align-items:center;gap:9px;font-family:var(--fmono);font-size:10.5px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin:24px 2px 12px}\n.divider::after{content:\"\";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}\n.divider.hasbtn::after{display:none}\n\n/* ============ HEADER ============ */\n.hd{display:flex;align-items:flex-start;gap:10px}\n.hd .date{font-family:var(--fmono);font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}\n.hd h1{font-size:28px;margin-top:6px}\n.pillstack{margin-left:auto;display:flex;flex-direction:column;gap:5px;align-items:flex-end}\n.spill{font-family:var(--fmono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:99px;padding:5px 10px;color:var(--muted);white-space:nowrap}\n.spill b{color:var(--gold)}\n.spill.rec{cursor:pointer}\n.spill.rec.on{background:rgba(92,168,255,.14);border-color:rgba(92,168,255,.4);color:var(--blue)}\n\n/* segmented */\n.seg{display:flex;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:4px}\n.seg button{flex:1;border:none;border-radius:9px;padding:9px;font-family:var(--fmono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;background:transparent;color:var(--muted);font-weight:700}\n.seg button.on.train{background:var(--dawn);color:#1A0E05}\n.seg button.on.rest{background:var(--blue);color:#0B1526}\n\n/* ============ HERO ============ */\n.hero{position:relative;margin-top:14px;border-radius:20px;padding:20px 20px 22px;overflow:hidden;\n  background:radial-gradient(140% 120% at 0% 0%,rgba(255,70,50,.26),transparent 55%),linear-gradient(180deg,rgba(255,122,60,.13),rgba(255,122,60,.045));\n  border:1px solid rgba(255,122,60,.5);animation:breathe 2.6s ease-in-out infinite}\n.hero.restday{background:radial-gradient(140% 120% at 0% 0%,rgba(92,168,255,.24),transparent 55%),linear-gradient(180deg,rgba(92,168,255,.12),rgba(92,168,255,.04));border-color:rgba(92,168,255,.45);animation:none;box-shadow:0 22px 58px -30px rgba(92,168,255,.7),inset 0 1px 0 rgba(255,255,255,.12)}\n.hero .halo{position:absolute;inset:-40% -20% auto -20%;height:180px;background:radial-gradient(closest-side,rgba(255,122,60,.5),transparent);filter:blur(20px);animation:haloPulse 2s ease-in-out infinite;pointer-events:none}\n.hero.restday .halo{background:radial-gradient(closest-side,rgba(92,168,255,.45),transparent)}\n.hero .meta{font-family:var(--fmono);font-size:11.5px;color:var(--muted);position:relative}\n.hero h2{font-size:38px;text-transform:uppercase;margin-top:4px;line-height:.98;position:relative}\n.hero .sub{color:#C9D2E0;font-size:13.5px;margin-top:8px;max-width:340px;text-wrap:pretty;position:relative}\nbody.light .hero .sub{color:var(--text)}\n.begin{display:block;width:100%;text-align:center;margin-top:16px;border:none;border-radius:14px;background:var(--dawn);color:#1A0E05;\n  font-family:var(--fdisp);font-weight:700;font-size:17px;text-transform:uppercase;padding:16px;position:relative;box-shadow:0 16px 34px -16px rgba(255,122,60,.95)}\n.hero.restday .begin{background:var(--blue);color:#0B1526;box-shadow:0 16px 34px -16px rgba(92,168,255,.9)}\n\n/* ============ ARC ============ */\n.arc{position:relative;padding:2px 6px}\n.arc .line{position:absolute;top:16px;left:14%;right:14%;height:2px;background:rgba(255,255,255,.1)}\n.arc .line .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--green),var(--dawn));border-radius:99px}\n.arc .nodes{position:relative;display:flex}\n.anode{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0}\n.anode .dot{width:32px;height:32px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-family:var(--fmono);font-size:12px;font-weight:700;border:2px solid var(--line2);background:var(--panel2);color:var(--dim);transition:all .2s var(--ease)}\n.anode .nl{font-family:var(--fmono);font-size:9px;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;text-align:center;line-height:1.3}\n.anode .nl small{display:block;color:var(--dim);font-size:8.4px}\n.anode.done .dot{background:var(--green);border-color:var(--green);color:#06220F}\n.anode.active .dot{background:var(--dawn);border-color:var(--dawn);color:#1A0E05;box-shadow:0 0 15px rgba(255,122,60,.7);animation:haloPulse 2s ease-in-out infinite}\n.anode.locked .dot{opacity:.55}\n.anode.sel .nl{color:var(--dawn)}\n\n/* progress bars */\n.pbar{height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}\n.pbar>span{display:block;height:100%;border-radius:99px}\n.pbar .grn{background:linear-gradient(90deg,var(--green),#8BEFA9)}\n.pbar .dwn{background:linear-gradient(90deg,var(--dawn),var(--gold))}\n.pbar .blu{background:linear-gradient(90deg,var(--blue),#9AC8FF)}\n/* ============ SEGMENTED BAR (bodyweight goal) ============ */\n:root{--neogreen:#4BF07A}\n.segbar{display:flex;align-items:stretch;gap:2px;width:100%;height:38px}\n.segbar .sg{flex:1;border-radius:1.5px;background:rgba(255,255,255,.13)}\n.segbar .sg.on{background:var(--neogreen);box-shadow:0 0 5px -1px rgba(75,240,122,.6)}\nbody.light .segbar .sg{background:rgba(0,0,0,.13)}\nbody.light .segbar .sg.on{background:var(--neogreen)}\n.segwrap .grow{display:flex;align-items:center;gap:5px;font-family:var(--fmono);font-size:10px;color:var(--muted)}\n.segwrap .grow b{color:var(--neogreen)}\n\n/* meal chips / pips */\n.chip{border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);font-family:var(--fmono);font-size:10.5px;border-radius:99px;padding:6px 10px}\n.chip.on{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.45);color:var(--green)}\n.wkpip{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:0}\n.wkpip .cell{width:100%;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(255,255,255,.03);border:1px solid var(--line2);color:var(--dim)}\n.wkpip.on .cell{background:var(--green);border-color:var(--green);color:#06220F}\n.wkpip .lb{font-family:var(--fmono);font-size:8.5px;letter-spacing:.05em;color:var(--dim)}\n\n/* ring */\n.ring-wrap{position:relative;flex-shrink:0}\n.ring-wrap svg{transform:rotate(-90deg);display:block}\n.ring-cent lc(100vw - 32px));bottom:calc(16px + env(safe-area-inset-bottom));height:66px;\n  display:flex;background:linear-gradient(180deg,rgba(144,0,32,.34),rgba(30,10,16,.7));backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);\n  border:1px solid rgba(144,0,32,.55);border-radius:24px;box-shadow:0 18px 44px -14px rgba(0,0,0,.72),0 0 22px -6px rgba(144,0,32,.4),inset 0 1px 0 rgba(255,194,214,.16);z-index:40}\n#nav button{position:relative;flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--dim);padding:8px 0;border-radius:20px}\n#nav button.on::before{content:\"\";position:absolute;top:9px;width:30px;height:3px;border-radius:99px;background:var(--neon);box-shadow:0 0 12px var(--neon)}\n#nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}\n#nav button .nlab{font-family:var(--fmono);font-size:9px;letter-spacing:.08em;text-transform:uppercase}\n#nav button.on{color:var(--dawn)}\n\n/* ============ FUEL / PROGRESS shared ============ */\n.calc-out{font-family:var(--fmono);font-size:13px;color:var(--gold);text-align:right;line-height:1.5}\n.calc-out small{display:block;color:var(--muted);font-size:10px}\n.dtseg{display:flex;gap:6px;margin-top:10px}\n.dtseg button{flex:1;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);border-radius:9px;font-family:var(--fmono);font-size:10px;font-weight:700;padding:9px 4px;text-transform:uppercase;letter-spacing:.04em}\n.dtseg button.on{background:var(--green);border-color:var(--green);color:#06220F}\n.mealrow{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line2);border-radius:12px;background:rgba(255,255,255,.02);font-size:13px}\n.mealrow.done{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05)}\n.mealrow .cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:12px}\n.mealrow.done .cb{border-color:var(--green);background:var(--green);color:#06220F}\n.mealrow .pv{margin-left:auto;font-family:var(--fmono);font-size:11px;color:var(--gold);white-space:nowrap}\ntable{width:100%;border-collapse:collapse;font-size:12px}\nth{font-family:var(--fmono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:7px 6px;border-bottom:1px solid var(--line2)}\ntd{padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:top}\ntd:first-child{color:var(--gold);font-family:var(--fmono);font-size:10px;white-space:nowrap}\ntd.up{color:var(--green);font-family:var(--fmono);font-size:10px}\n.scrollx{overflow-x:auto;margin:0 -2px}\n#mealchart{position:relative}\n.scrollx table{min-width:600px}\n.chart-expand{position:absolute;top:10px;right:10px;z-index:3;width:32px;height:32px;border-radius:9px;border:1px solid var(--line2);background:rgba(20,20,20,.72);backdrop-filter:blur(8px);color:var(--muted);display:flex;align-items:center;justify-content:center}\n.chart-expand:hover{border-color:var(--dawn);color:var(--dawn)}\n#mealchart.expanded{position:fixed;inset:14px;z-index:95;margin:0;max-width:none;overflow:auto;display:flex;flex-direction:column;box-shadow:0 30px 70px -20px rgba(0,0,0,.85);animation:fade .22s var(--ease) both}\n#mealchart.expanded .chart-expand{position:sticky;float:right;top:0}\n#mealchart.expanded table{min-width:0;width:100%}\n#mealchart.expanded td,#mealchart.expanded th{white-space:normal}\n#chart-scrim{position:fixed;inset:0;z-index:94;background:rgba(4,6,10,.7);backdrop-filter:blur(3px);display:none}\n#chart-scrim.on{display:block;animation:fade .2s ease both}\n.waterbtn{flex:1;border:1px solid var(--blue);background:rgba(92,168,255,.1);color:var(--blue);font-family:var(--fmono);font-size:13px;font-weight:700;border-radius:12px;padding:15px}\n.barrow{display:flex;align- h:380px){.wxcond{display:none}}\n.wxcond{font-size:9.5px!important}\n.themetgl{width:38px;height:38px;flex-shrink:0;border-radius:11px;border:1px solid var(--line2);background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--dawn);display:flex;align-items:center;justify-content:center;transition:transform .15s var(--ease),border-color .2s}\n.themetgl:active{transform:scale(.92)}\n.themetgl:hover{border-color:var(--dawn)}\n/* ============ MUSCLE INFOGRAPHIC ============ */\n.mband{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}\n.mband-side{display:flex;flex-direction:column;align-items:center;gap:12px}\n.mtoggle{display:inline-flex;gap:3px;background:rgba(255,255,255,.03);border:1px solid var(--line2);border-radius:99px;padding:3px;align-self:flex-start}\n.mtoggle button{border:none;background:none;color:var(--muted);font-family:var(--fmono);font-size:9.5px;font-weight:700;letter-spacing:.08em;padding:5px 12px;border-radius:99px;transition:all .2s var(--ease)}\n.mtoggle button.on{background:var(--dawn);color:#1a0e05}\n.mchips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}\n.mchip{display:flex;align-items:center;gap:8px;font-size:12px;border-radius:99px;padding:6px 12px;border:1px solid transparent}\n.mchip.pri{background:var(--dawn);color:#1a0e05;font-weight:600}\n.mchip.sec{border-color:var(--line2);color:var(--muted)}\n.mdot{width:9px;height:9px;border-radius:99px;flex-shrink:0}\n.mchip.pri .mdot{background:#1a0e05}\n.mchip.sec .mdot{border:1.5px solid var(--muted)}\n.mfig{flex-shrink:0;display:flex;justify-content:flex-end}\n@media(max-width:380px){.mchips{flex-direction:row;flex-wrap:wrap}}\n/* ============ BW OVERLAY HAPTICS ============ */\n.hapchip{border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);font-family:var(--fmono);font-size:10px;letter-spacing:.06em;padding:9px 15px;border-radius:99px}\n.hapchip.on{border-color:rgba(255,122,60,.4);color:var(--dawn);background:rgba(255,122,60,.08)}\n/* ============ PROGRESS BENTO ============ */\n.bento{position:relative;overflow:hidden}\n.bento-filter{border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);font-family:var(--fmono);font-size:9.5px;letter-spacing:.1em;border-radius:99px;padding:7px 13px;text-transform:uppercase}\n.bento-filter:hover{border-color:var(--dawn);color:var(--dawn)}\n.bento-pods{display:flex;gap:10px;margin:16px 0 6px}\n.pod{flex:1;position:relative;overflow:hidden;border-radius:12px;background:var(--panel2);border:1px solid var(--line);padding:13px 11px 11px;min-height:80px}\n.pod-pat{position:absolute;inset:0;opacity:.55;pointer-events:none}\n.pod-pat svg{width:100%;height:100%;display:block}\n.pod-v{position:relative;font-family:var(--fdisp);font-weight:700;font-size:19px;color:var(--dawn);letter-spacing:-.02em}\n.pod-l{position:relative;font-family:var(--fmono);font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:6px}\n.bento-foot{display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px}\n.dotpage{display:flex;gap:6px;align-items:center}\n.dotpage button{width:7px;height:7px;border-radius:99px;border:none;background:rgba(255,255,255,.2);padding:0;transition:all .2s var(--ease)}\n.dotpage button.on{background:var(--dawn);width:18px}\n/* ============ NAV ACTIVE PILL ============ */\n#nav{padding:7px 8px}\n#nav button{margin:0 2px;border-radius:17px;transition:background .2s var(--ease),color .2s var(--ease)}\n#nav button.on{background:rgba(144,0,32,.42);color:#F2B8C6}\n#nav button.on::before{display:none}\n#nav button .nlab{font-weight:500}\n#nav button.on .nlab{font-weight:600}\nbody.light #nav button{color:#2B2B23}\nbody.light #nav button.on{color:var(--neon)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"app\">\n  <div id=\"screens\">\n    <section class=\"screen show\" id=\"s-home\"><\u002Fsection>\n    <section class=\"screen\" id=\"s-plan\"><\u002Fsection>\n    <section class=\"screen\" id=\"s-fuel\"><\u002Fsection>\n    <section class=\"screen\" id=\"s-progress\"><\u002Fsection>\n  <\u002Fdiv>\n\n  <nav id=\"nav\">\n    <button data-t=\"home\" class=\"on\" onclick=\"go('home')\"><svg viewBox=\"0 0 24 24\"><path d=\"M3 10.5 12 3l9 7.5\"><\u002Fpath><path d=\"M5 9.5V21h14V9.5\"><\u002Fpath><\u002Fsvg><span class=\"nlab\">Home<\u002Fspan><\u002Fbutton>\n    <button data-t=\"plan\" onclick=\"go('plan')\"><svg viewBox=\"0 0 24 24\"><path d=\"M4 5h16M4 12h16M4 19h10\"><\u002Fpath><circle cx=\"19\" cy=\"19\" r=\"2\"><\u002Fcircle><\u002Fsvg><span class=\"nlab\">Plan<\u002Fspan><\u002Fbutton>\n    <button data-t=\"fuel\" onclick=\"go('fuel')\"><svg viewBox=\"0 0 24 24\"><path d=\"M6 3v7a3 3 0 0 0 6 0V3M9 3v18\"><\u002Fpath><path d=\"M17 3c-1.5 1-2 3-2 5s.5 4 2 5v8\"><\u002Fpath><\u002Fsvg><span class=\"nlab\">Fuel<\u002Fspan><\u002Fbutton>\n    <button data-t=\"progress\" onclick=\"go('progress')\"><svg viewBox=\"0 0 24 24\"><path d=\"M4 20V10M10 20V4M16 20v-7M22 20H2\"><\u002Fpath><\u002Fsvg><span class=\"nlab\">Progress<\u002Fspan><\u002Fbutton>\n  <\u002Fnav>\n\n  <div id=\"runner\"><\u002Fdiv>\n  <div id=\"flash\"><div class=\"inner\" id=\"flash-txt\"><\u002Fdiv><\u002Fdiv>\n  <div id=\"bwov\"><\u002Fdiv>\n  <div id=\"modal\"><div class=\"scrim\" onclick=\"modalClose()\"><\u002Fdiv><div class=\"box\" id=\"modal-box\"><\u002Fdiv><\u002Fdiv>\n  <div id=\"tip\"><\u002Fdiv>\n  <div id=\"chart-scrim\" onclick=\"toggleMealExpand()\"><\u002Fdiv>\n  <div id=\"onboard\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ============================================================\n   APEX v3 — Overview OS · single-file · localStorage 'apex-v3'\n   ============================================================ */\n\n/* ---------- STATIC: warmup / cooldown ---------- */\nconst W={push:[\"<b>Arm circles<\u002Fb> — 20 each way\",\"<b>Wall push-ups<\u002Fb> — 15 slow\",\"<b>Towel shoulder dislocates<\u002Fb> — 10 wide-grip\",\"<b>Side-lying external rotation<\u002Fb> — 1×12/side, 2–3kg DB\"],\npull:[\"<b>Cat-cow<\u002Fb> — 10\",\"<b>Scapular retractions<\u002Fb> — 15, 2s squeeze\",\"<b>Dead hang<\u002Fb> — 30s\"],\nlegs:[\"<b>Bodyweight squats<\u002Fb> — 15 slow, full depth\",\"<b>Walking lunges<\u002Fb> — 10 total\",\"<b>Leg swings<\u002Fb> — 10 front-back each leg\"],\nsho:[\"<b>Arm circles<\u002Fb> — 20 each way\",\"<b>Wall angels<\u002Fb> — 12 slow\",\"<b>Pike push-ups<\u002Fb> — 8\",\"<b>Side-lying external rotation<\u002Fb> — 1×12/side light\"],\nvol:[\"<b>Arm circles<\u002Fb> — 20 each way\",\"<b>Scapular push-ups<\u002Fb> — 12\",\"<b>Cat-cow<\u002Fb> — 10\"]};\nconst C={push:[\"Doorframe chest stretch — 30s/side\",\"Overhead tricep stretch — 30s/arm\",\"Cross-body shoulder stretch — 30s/arm\"],\npull:[\"Doorframe lat stretch — 30s/side\",\"Bicep wall stretch — 30s/arm\",\"Thread-the-needle — 30s/side\"],\nlegs:[\"Standing quad stretch — 30s/leg\",\"Standing hamstring fold — 30s\",\"Pigeon pose — 45s/side\"],\nsho:[\"Cross-body shoulder stretch — 30s/arm\",\"Overhead tricep stretch — 30s/arm\",\"Neck side stretch — 20s/side\"],\nvol:[\"Doorframe chest stretch — 30s/side\",\"Doorframe lat stretch — 30s/side\",\"Seated forward fold — 45s\"]};\nconst RAMP=\"RAMP: empty/light ×10 → 50% ×6 → 75% ×3 → work sets\";\n/* expert cues for warm-up / cool-down mobility moves */\nconst MOBINFO=[\n ['arm circle',\"Stand tall, arms straight out to the sides. Draw slow controlled circles — small to large. Keep shoulders down, core braced. Reverse direction halfway.\",\"arm circles warm up form\"],\n ['wall push',\"Hands on wall at chest height, shoulder-width. Lower chest toward wall under control, elbows ~45°, then press back. Keep a straight line head-to-heel.\",\"wall push up form\"],\n ['shoulder dislocate',\"Hold a towel/band wide overhead. Keep arms straight and sweep it back behind you and return. Widen grip if it pinches — never force range.\",\"shoulder dislocates towel mobility\"],\n ['external rotation',\"Lie on your side, upper elbow pinned to your ribs, light DB in hand. Rotate the forearm up toward the ceiling, pause, lower slow. Small weight only.\",\"side lying external rotation form\"],\n ['cat-cow',\"On all fours. Inhale — drop the belly, lift chest and tailbone (cow). Exhale — round the spine, tuck chin and tailbone (cat). Move with the breath.\",\"cat cow stretch form\"],\n ['scapular retraction',\"Arms in front or on a bar. Without bending elbows, pull the shoulder blades back and down, squeeze 2s, release. Isolate the blades, not the arms.\",\"scapular retraction form\"],\n ['dead hang',\"Grip a bar overhead, hands shoulder-width. Relax and hang with straight arms, shoulders active (slightly pulled down). Breathe. Build time gradually.\",\"dead hang form benefits\"],\n ['scapular push',\"Top of a push-up/plank, arms straight. Without bending elbows, let the chest sink between the blades, then push the floor away to spread them. Slow reps.\",\"scapular push up form\"],\n ['bodyweight squat',\"Feet shoulder-width, toes slightly out. Sit back and down, knees tracking over toes, chest up, full depth. Drive through mid-foot to stand.\",\"bodyweight squat form\"],\n ['walking lunge',\"Step forward, both knees to ~90°, back knee near floor, torso upright. Push through the front heel into the next step. Alternate legs.\",\"walking lunge form\"],\n ['leg swing',\"Hold a wall for balance. Swing one leg front-to-back in a controlled arc, relaxed and rhythmic. Keep the torso still. Switch sides.\",\"leg swings warm up\"],\n ['wall angel',\"Back flat to a wall, arms in a goalpost touching the wall. Slide arms up overhead keeping wrists and elbows on the wall, then back down. Slow.\",\"wall angels form\"],\n ['pike push',\"Hips high in an inverted-V, hands shoulder-width. Bend elbows to lower the crown of your head toward the floor, then press up. Targets shoulders.\",\"pike push up form\"],\n ['doorframe chest',\"Forearm on a doorframe, elbow ~90° at shoulder height. Step through gently and turn away until you feel the chest open. Hold, breathe, switch.\",\"doorway chest stretch form\"],\n ['doorframe lat',\"Grip a frame/pole, hips sit back and away so the arm goes overhead. Feel the stretch down the lat/side. Hold and breathe, then switch sides.\",\"standing lat stretch form\"],\n ['overhead tricep',\"Raise one arm overhead, bend the elbow so the hand drops behind the head. Gently pull the elbow with the other hand. Hold, switch arms.\",\"overhead triceps stretch form\"],\n ['cross-body shoulder',\"Bring one arm straight across your chest. Use the other arm to draw it closer until you feel the rear-shoulder stretch. Hold, switch.\",\"cross body shoulder stretch form\"],\n ['bicep wall',\"Palm flat on a wall behind you at shoulder height, arm straight. Rotate your body away from the arm to stretch the biceps/forearm. Hold, switch.\",\"biceps wall stretch form\"],\n ['thread-the-needle',\"On all fours, thread one arm under the body, shoulder and temple toward the floor. Feel the upper-back/shoulder open. Hold, then switch sides.\",\"thread the needle stretch form\"],\n ['quad stretch',\"Stand tall, hold a wall. Grab one ankle behind you, heel toward glute, knees together, hips forward. Feel the front thigh. Hold, switch.\",\"standing quad stretch form\"],\n ['hamstring fold',\"Feet hip-width, hinge at the hips and fold forward, soft knees, let the head hang. Feel the hamstrings. Breathe and relax deeper.\",\"standing forward fold hamstring\"],\n ['pigeon',\"From all fours, bring one shin forward across, extend the other leg back. Sink the hips and fold over the front shin. Deep glute stretch. Switch.\",\"pigeon pose form\"],\n ['neck side',\"Sit or stand tall. Gently tilt one ear toward the shoulder, hand can add light weight. Feel the side of the neck. Hold, switch sides — never force.\",\"neck side stretch form\"],\n ['seated forward fold',\"Sit with legs extended. Hinge from the hips and reach toward the feet, long spine, soft knees. Stretches hamstrings and lower back. Breathe.\",\"seated forward fold form\"]\n];\nfunction mobInfo(name){const n=name.toLowerCase();for(const[k,tip,yt]of MOBINFO)if(n.indexOf(k)>=0)return{tip,yt};return{tip:\"Move slowly and with control through a comfortable range. Breathe steadily and stop short of any sharp pain.\",yt:name+\" exercise form\"};}\nconst ORDER=['p1','p2','p3','p4'];\nconst BWGATE={p1:66,p2:68.5,p3:70,p4:72};\nconst PHMETA={p1:['Foundation','M0–3'],p2:['Strength','M3–6'],p3:['Build','M6–12'],p4:['Pro','M12–24']};\nconst WNAME={push:'Push',pull:'Pull',legs:'Legs',sho:'Shoulders',vol:'Volume'};\nconst MUSCLES={push:['chest','shoulders','triceps'],pull:['lats','upper back','biceps'],legs:['quads','hamstrings','calves','core'],sho:['shoulders','rear delts','arms'],vol:['chest','back','core']};\n\n/* ---------- ANATOMY (inline SVG, per-muscle fill) ---------- */\nconst MLABEL={chest:'Chest','shoulder-front':'Front delts','shoulder-side':'Side delts','shoulder-rear':'Rear delts',bicep:'Biceps',tricep:'Triceps',forearm:'Forearms',abs:'Abs',obliques:'Obliques',quad:'Quads',hamstring:'Hamstrings',glute:'Glutes',calf:'Calves',lat:'Lats',trap:'Traps','mid-back':'Mid-back',neck:'Neck'};\nconst MORDER=['chest','shoulder-front','shoulder-side','shoulder-rear','trap','lat','mid-back','bicep','tricep','forearm','abs','obliques','glute','quad','hamstring','calf'];\nconst MBASE='var(--mbase)';\nfunction anatomy(view,lit,h){\n  h=h||190;\n  const on=id=>lit.has(id);\n  const F=id=>on(id)?'var(--dawn)':MBASE;\n  const delt=(on('shoulder-front')||on('shoulder-side')||on('shoulder-rear'))?'var(--dawn)':MBASE;\n  const S='stroke=\"#12161C\" stroke-width=\"1.1\" stroke-linejoin=\"round\" stroke-linecap=\"round\"';\n  const sep='fill=\"none\" stroke=\"rgba(0,0,0,.35)\" stroke-width=\"1\"';\n  const mir=s=>s+`<g transform=\"matrix(-1 0 0 1 200 0)\">${s}<\u002Fg>`;\n\n  // shared base body parts (center drawn once, sides mirrored)\n  const head=`<ellipse cx=\"1
