&/g,'&amp;').replace(/\"/g,'&quot;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');}\nfunction stripTags(s){return String(s==null?'':s).replace(/<[^>]*>/g,'');}\nfunction clampInt(v,mn,mx){v=parseInt(v,10);if(isNaN(v))v=mn;return Math.max(mn,Math.min(mx,v));}\nfunction clampNum(v,mn,mx){v=parseFloat(v);if(isNaN(v))v=mn;return Math.max(mn,Math.min(mx,Math.round(v*100)/100));}\nfunction buzz(pattern){if(DB.settings.haptics!==false&&navigator.vibrate)navigator.vibrate(pattern||16);}\nfunction beep(){\n  if(DB.settings.haptics===false)return;\n  buzz([250,120,250]);\n  try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();\n  o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.13;o.start();\n  o.frequency.setValueAtTime(660,a.currentTime+.18);o.stop(a.currentTime+.4);}catch(e){}\n  restNotify();\n}\nfunction restNotify(){\n  // fires only when the app is backgrounded, so you hear it mid-set with the phone down\n  try{if(document.visibilityState==='visible')return;if(!('Notification'in window)||Notification.permission!=='granted')return;\n    const ex=(RN&&RN.exs&&RN.exs[RN.exIdx])?RN.exs[RN.exIdx].name:'';\n    const n=new Notification('Rest done — next set',{body:ex?('Back to '+ex):'Tap to continue your session',tag:'apex-rest',silent:false});\n    setTimeout(()=>{try{n.close();}catch(e){}},8000);\n  }catch(e){}\n}\nfunction askNotify(){try{if('Notification'in window&&Notification.permission==='default')Notification.requestPermission().catch(()=>{});}catch(e){}}\n\nfunction saveDB(){try{localStorage.setItem('apex-v3',JSON.stringify(DB));}catch(e){}}\nfunction load(){\n  try{const r=localStorage.getItem('apex-v3');if(r){const d=JSON.parse(r);DB={...DB,...d};\n    DB.gates={...{p1:[0,0,0,0],p2:[0,0,0,0],p3:[0,0,0,0],p4:[0,0,0,0]},...(d.gates||{})};\n    DB.diet={...{date:'',checks:[0,0,0,0,0,0],hit:false,streak:0},...(d.diet||{})};\n    DB.settings={haptics:true,theme:'dark',weightStep:{},...(d.settings||{})};\n    DB.water={date:'',ml:0,streak:0,...(d.water||{})};\n    DB.restDays={checklists:{},streak:0,lastDate:'',...(d.restDays||{})};\n    DB.weather={lat:null,lon:null,temp:null,code:null,condition:'',fetchedAt:0,...(d.weather||{})};\n  }}catch(e){}\n  ['plan','customEx','added','removed','stamina'].forEach(k=>{if(!DB[k]||typeof DB[k]!=='object')DB[k]={};});\n  ['sess','bw','prs','cardio','injuries'].forEach(k=>{if(!Array.isArray(DB[k]))DB[k]=[];});\n  // migrate legacy theme store → settings\n  try{const lt=localStorage.getItem('apex-theme');if(lt)DB.settings.theme=DB.settings.theme||lt;}catch(e){}\n  if(!DB._stamV2){DB.stamina={};DB._stamV2=1;} // #6 re-seed expanded stamina once\n  dietRollover(); waterRollover(); deloadAutoClear();\n  const dow=new Date().getDay();\n  dayMode=(dow>=2&&dow<=6)?'train':'rest';\n  selPhase=actIdx();\n  renderAll();\n  maybeBwPrompt();\n}\n\n/* ============================================================\n   PHASE / GATE ENGINE\n   ============================================================ */\nconst actIdx=()=>ORDER.indexOf(DB.phase);\nfunction weekOf(ph){if(!DB.start[ph])return 0;return Math.floor((Date.now()-new Date(DB.start[ph]).getTime())/604800000)+1;}\nfunction startPhase(ph){DB.start[ph]=isoToday();saveDB();renderAll();}\nfunction bwNow(){return DB.bw.length?DB.bw[DB.bw.length-1].w:0;}\nfunction gateMet(ph,i){if(i===0)return bwNow()>=BWGATE[ph];return !!DB.gates[ph][i];}\nfunction gateToggle(ph,i){DB.gates[ph][i]=DB.gates[ph][i]?0:1;saveDB();renderScreen('progress');}\nfunction allMet(ph){return PHASES[ph].exit.every((_,i)=>gateMet(ph,i));}\nfunction advance(ph){\n  if(!allMet(ph))return;\n  DB.advanced[ph]=isoToday();\n  const nxt=ORDER[ORDER.indexOf(ph)+1];\n  if(nxt){DB.phase=nxt;DB.start[nxt]=DB.start[nxt]||isoToday();}\n  selPhase=actIdx();saveDB();renderAll();\n}\nconst recoveryDue=()=>{const wk=weekOf(DB.phase);return !DB.deload && wk>=6;};\nfunction toggleDeload(){DB.deload=!DB.deload;DB.deloadStart=DB.deload?isoToday():'';saveDB();renderAll();}\nfunction deloadAutoClear(){if(DB.deload&&DB.deloadStart){const days=Math.floor((Date.now()-new Date(DB.deloadStart).getTime())/86400000);if(days>=7){DB.deload=false;DB.deloadStart='';}}}\n\n/* ---------- exercise resolver ---------- */\nfunction cfgOf(e){return e[7]||{s:3,lo:8,hi:12};}\nconst BASE_IDX={};\n(function(){for(const p of Object.values(PHASES))for(const d of p.days)for(const e of d.ex)BASE_IDX[e[0]]=e;})();\nfunction rawDef(id){return BASE_IDX[id]||((DB.customEx&&DB.customEx[id])?DB.customEx[id]:null);}\nfunction exDef(id){\n  const base=rawDef(id);if(!base)return null;\n  const o=(DB.plan&&DB.plan[id])||null;if(!o)return base;\n  const cfg=Object.assign({},base[7]||{s:3,lo:8,hi:12});\n  if(o.s!=null)cfg.s=o.s;if(o.lo!=null)cfg.lo=o.lo;if(o.hi!=null)cfg.hi=o.hi;\n  return [base[0],o.name??base[1],o.scheme??base[2],o.rest??base[3],o.cue??base[4],o.yt??base[5],base[6],cfg];\n}\nfunction dayKey(ph,i){return ph+'-'+i;}\nfunction baseExArr(ph,i){return (PHASES[ph]&&PHASES[ph].days[i])?PHASES[ph].days[i].ex:[];}\nfunction effExList(ph,i){\n  const removed=DB.removed||{};const out=[];\n  baseExArr(ph,i).forEach(e=>{if(!removed[e[0]])out.push(exDef(e[0]));});\n  const add=(DB.added&&DB.added[dayKey(ph,i)])||[];\n  add.forEach(id=>{if(!removed[id]){const e=exDef(id);if(e)out.push(e);}});\n  return out;\n}\nfunction startW(id){if(DB.plan&&DB.plan[id]&&DB.plan[id].dw!=null)return DB.plan[id].dw;return SEED[id]||0;}\nfunction findCfg(id){const e=exDef(id);return e?cfgOf(e):null;}\nfunction dlSets(s){return Math.max(1,Math.round(s*0.6));}\nfunction setsOf(cfg){return DB.deload?dlSets(cfg.s):cfg.s;}\nfunction weightStepFor(id){const cfg=findCfg(id);const def=(cfg&&(cfg.lo<=8))?2.5:1.25;return DB.settings.weightStep[id]||def;}\n\n/* today's session index (Tue..Sat = 0..4) */\nfunction todayIdx(){const dow=new Date().getDay();return (dow>=2&&dow<=6)?dow-2:-1;}\nfunction heroDay(){const i=todayIdx();if(i<0)return null;return PHASES[DB.phase].days[i];}\n\n/* ============================================================\n   DIET / WATER\n   ============================================================ */\nfunction dietRollover(){\n  const t=isoToday();\n  if(DB.diet.date&&DB.diet.date!==t){DB.diet.streak=DB.diet.hit?(DB.diet.streak+1):0;DB.diet.checks=[0,0,0,0,0,0];DB.diet.hit=false;}\n  DB.diet.date=t;\n}\nfunction waterRollover(){\n  const t=isoToday();\n  if(DB.water.date&&DB.water.date!==t){\n    const target=3000;DB.water.streak=DB.water.ml>=target?(DB.water.streak+1):0;DB.water.ml=0;\n  }\n  DB.water.date=t;\n}\nfunction waterTarget(){return calcDayT===1?3500:3000;}\nfunction addWater(ml){DB.water.ml=Math.min(6000,DB.water.ml+ml);buzz();saveDB();renderScreen('fuel');}\nfunction resetWater(){DB.water.ml=0;saveDB();renderScreen('fuel');}\n\nfunction proteinTotal(p){return DB.diet.checks.reduce((a,c,i)=>a+(c?PVAL[p][i]:0),0);}\nfunction chkToggle(i){DB.diet.checks[i]=DB.diet.checks[i]?0:1;const tot=proteinTotal(actIdx());DB.diet.hit=tot>=FLOOR[actIdx()];saveDB();renderScreen('home');renderScreen('fuel');}\n\n/* ============================================================\n   SESSIONS / ADHERENCE\n   ============================================================ */\nfunction sessKey(ph,i){return ph+'-'+i;}\nfunction doneToday(ph,i){const t=isoToday();return DB.sess.some(s=>s.k===sessKey(ph,i)&&s.d===t);}\nfunction weekCount(){const now=Date.now();return DB.sess.filter(s=>now-new Date(s.d).getTime()<604800000).length;}\nfunction weekSessDays(){\n  // returns array over Tue..Sat: done boolean\n  const now=new Date();const out=[false,false,false,false,false];\n  DB.sess.forEach(s=>{const d=new Date(s.d);if(now-d.getTime()<604800000){const dow=d.getDay();if(dow>=2&&dow<=6)out[dow-2]=true;}});\n  return out;\n}\nfunction weekWorkedSec(){const now=Date.now();return DB.sess.filter(s=>now-new Date(s.d).getTime()<604800000).reduce((a,s)=>a+(s.duration||0),0);}\nfunction staminaWeek(){\n  // planned stamina this phase per training week vs done (sessions + ad-hoc cardio)\n  const now=Date.now();let done=0;\n  DB.sess.forEach(s=>{if(now-new Date(s.d).getTime()<604800000 && s.staminaDone)done++;});\n  done+=cardioWeek();\n  const planned=staminaList(DB.phase).length||2;\n  return {done,planned:Math.max(planned,done)};\n}\nfunction cardioWeek(){const now=Date.now();return DB.cardio.filter(c=>now-new Date(c.iso).getTime()<604800000).length;}\nfunction footballWeek(){const now=Date.now();return DB.cardio.filter(c=>c.type==='football'&&now-new Date(c.iso).getTime()<604800000).length;}\nfunction logCardio(type,mins,note){DB.cardio.push({type,mins:mins||0,note:note||'',iso:isoToday(),d:dispDate(isoToday())});if(DB.cardio.length>400)DB.cardio=DB.cardio.slice(-400);buzz([90]);saveDB();}\nfunction delCardio(iso,idx){let c=0;DB.cardio=DB.cardio.filter(x=>{if(x.iso===iso){if(c===idx){c++;return false;}c++;}return true;});saveDB();}\nfunction weeklyWorked(nWeeks){\n  const out=[];const now=new Date();\n  for(let w=nWeeks-1;w>=0;w--){\n    const end=now.getTime()-w*604800000;const start=end-604800000;\n    let sec=0;DB.sess.forEach(s=>{const t=new Date(s.d).getTime();if(t>=start&&t<end)sec+=(s.duration||0);});\n    out.push(sec);\n  }\n  return out;\n}\nfunction monthWorked(offset){\n  const now=new Date();const m=now.getMonth()-offset,y=now.getFullYear();\n  const d=new Date(y,m,1);const mm=d.getMonth(),yy=d.getFullYear();\n  let sec=0;DB.sess.forEach(s=>{const t=new Date(s.d);if(t.getMonth()===mm&&t.getFullYear()===yy)sec+=(s.duration||0);});\n  return sec;\n}\n\n/* ---------- PR detection ---------- */\nfunction maxWeightHist(id){const h=DB.log[id]||[];let mx=0;h.forEach(e=>{const w=parseFloat(e.w)||0;if(w>mx)mx=w;});return mx;}\nfunction readyToProgress(list){\n  const out=[];list.forEach(ex=>{const cfg=ex.cfg;if(cfg.hi>=99||cfg.m==='b'||cfg.m==='t')return;const h=DB.log[ex.id];if(!h||!h.length)return;const last=h[h.length-1];const reps=(last.reps||[]).map(r=>parseInt(r,10)||0);if(reps.length&&reps.every(r=>r>=cfg.hi))out.push(ex.name);});\n  return out;\n}\n\n/* ============================================================\n   NAV / RENDER ROUTER\n   ============================================================ */\nfunction go(t){\n  const ov=document.getElementById('bwov');\n  if(ov.classList.contains('show')){DB.bwPromptedFor=isoToday();ov.className='';saveDB();}\n  curScreen=t;\n  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('show',s.id==='s-'+t));\n  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));\n  document.getElementById('screens').scrollTo({top:0});\n  renderScreen(t);\n}\nfunction renderAll(){renderScreen('home');renderScreen('plan');renderScreen('fuel');renderScreen('progress');}\nfunction renderScreen(t){\n  if(t==='home')document.getElementById('s-home').innerHTML=homeHTML();\n  if(t==='plan')document.getElementById('s-plan').innerHTML=planHTML();\n  if(t==='fuel')document.getElementById('s-fuel').innerHTML=fuelHTML();\n  if(t==='progress')document.getElementById('s-progress').innerHTML=progressHTML();\n}\n\n/* ============================================================\n   HOME\n   ============================================================ */\nfunction greeting(){const h=new Date().getHours();if(h<5)return 'Still up';if(h<12)return 'Good morning';if(h<17)return 'Good afternoon';if(h<21)return 'Good evening';return 'Wind down';}\nfunction datestamp(){const d=new Date();return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short',year:'numeric'}).toUpperCase().replace(/,/g,' ·');}\nfunction weatherLabel(code){if(code===0)return 'Clear';if(code<=3)return 'Partly cloudy';if(code<=48)return 'Fog';if(code<=67)return 'Rain';if(code<=77)return 'Snow';if(code<=82)return 'Showers';return 'Thunderstorm';}\nfunction weatherIcon(code){\n  const s='fill=\"none\" stroke=\"var(--dawn)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"';\n  const wrap=inner=>`<svg viewBox=\"0 0 24 24\" width=\"32\" height=\"32\" ${s}>${inner}<\u002Fsvg>`;\n  if(code===0)return wrap('<circle cx=\"12\" cy=\"12\" r=\"4\"/><path d=\"M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19\"/>');\n  if(code<=3)return wrap('<circle cx=\"8\" cy=\"7.5\" r=\"3\"/><path d=\"M8 2v1.4M2.5 7.5H4M4 3.5l1 1\"/><path d=\"M7 18h9a3 3 0 0 0 0-6 4 4 0 0 0-7.7-1\"/>');\n  if(code<=48)return wrap('<path d=\"M3 8h18M5 12h14M3 16h18\"/>');\n  if(code<=67)return wrap('<path d=\"M6 13h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 13z\"/><path d=\"M8 17l-1 3M12 17l-1 3M16 17l-1 3\"/>');\n  if(code<=77)return wrap('<path d=\"M6 12h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 12z\"/><path d=\"M9 16v.01M9 19v.01M13 17v.01M16 16v.01M16 19v.01\"/>');\n  if(code<=82)return wrap('<path d=\"M6 12h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 12z\"/><path d=\"M8 15l-2 5M13 15l-2 5M18 15l-2 5\"/>');\n  return wrap('<path d=\"M6 12h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 12z\"/><path d=\"M13 13l-3 4h4l-3 4\"/>');\n}\nlet _weatherFetching=false;\nfunction fetchWeather(){\n  if(_weatherFetching)return;\n  if(DB.weather.temp!=null && (Date.now()-DB.weather.fetchedAt)<1800000)return;\n  _weatherFetching=true;\n  const go=(lat,lon)=>{\n    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code&temperature_unit=celsius')\n      .then(r=>r.json()).then(d=>{\n        const c=d.current;\n        DB.weather={lat,lon,temp:Math.round(c.temperature_2m),code:c.weather_code,condition:weatherLabel(c.weather_code),fetchedAt:Date.now()};\n        saveDB();_weatherFetching=false;if(curScreen==='home')renderScreen('home');\n      }).catch(()=>{_weatherFetching=false;});\n  };\n  const fallback=()=>go(19.2437,73.1355);\n  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>go(pos.coords.latitude,pos.coords.longitude),fallback,{timeout:8000,maximumAge:1800000});}\n  else fallback();\n}\nfunction weatherBlockHTML(){\n  const wx=DB.weather;\n  if(wx&&wx.temp!=null){\n    return `<div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:2px\">${weatherIcon(wx.code)}<span class=\"big\" style=\"font-size:26px\">${wx.temp}°C<\u002Fspan><span class=\"mono wxcond\" style=\"font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase\">${wx.condition}<\u002Fspan><\u002Fdiv>`;\n  }\n  return `<div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:6px\"><div style=\"width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06)\"><\u002Fdiv><div style=\"width:52px;height:17px;border-radius:5px;background:rgba(255,255,255,.06)\"><\u002Fdiv><div style=\"width:70px;height:9px;border-radius:4px;background:rgba(255,255,255,.05)\"><\u002Fdiv><\u002Fdiv>`;\n}\nfunction homeHTML(){\n  const ph=DB.phase,wk=weekOf(ph)||1,act=actIdx();\n  const now=new Date();\n  fetchWeather();\n  const train=dayMode==='train';\n  const hd=heroDay();\n  // hero content\n  let heroMeta,heroTitle,heroSub,heroBtn;\n  if(train && hd){\n    heroMeta=hd.d.charAt(0)+hd.d.slice(1).toLowerCase()+' · Week '+wk+' · Phase '+ph.slice(1);\n    heroTitle=(WNAME[hd.w]||'Train')+' Day';\n    const list=effExList(ph,todayIdx());\n    heroSub=hd.f+' · '+list.length+' exercises'+(hd.cond?', then '+stripTags(hd.cond).replace(/\\.$/,'').toLowerCase():'')+'.';\n    heroBtn='Begin session';\n  }else{\n    heroMeta='Recovery · Week '+wk+' · Phase '+ph.slice(1);\n    heroTitle='Rest Day';\n    heroSub=PHASES[ph].rest[0]+', then '+PHASES[ph].rest.slice(1).join(', ').toLowerCase()+'. Protein never drops.';\n    heroBtn='Begin recovery';\n  }\n  // arc\n  let arc='';\n  ORDER.forEach((p,i)=>{\n    const done=!!DB.advanced[p],active=(p===DB.phase&&!done),locked=i>act,sel=(i===selPhase);\n    let cls='anode'+(done?' done':active?' active':locked?' locked':'')+(sel?' sel':'');\n    arc+=`<button class=\"${cls}\" onclick=\"selArc(${i})\"><span class=\"dot\">${done?'✓':locked?'🔒':(i+1)}<\u002Fspan><span class=\"nl\">${PHMETA[p][0]}<small>${PHMETA[p][1]}<\u002Fsmall><\u002Fspan><\u002Fbutton>`;\n  });\n  const fillPct=Math.max(0,Math.min(1,act/(ORDER.length-1)))*100;\n\n  // selected phase reading card (Foundation card style)\n  const sp=ORDER[selPhase],SP=PHASES[sp];\n  const spWk=weekOf(sp);\n  const spState=DB.advanced[sp]?'PASSED':(selPhase===act?('ACTIVE · WK '+(spWk||1)):selPhase<act?'PASSED':'LOCKED');\n  const spCol=DB.advanced[sp]?'var(--green)':(selPhase===act?'var(--dawn)':'var(--dim)');\n  const met=PHASES[sp].exit.filter((_,i)=>gateMet(sp,i)).length;\n  const gatePct=Math.round(met/4*100);\n\n  // bodyweight\n  const bw=DB.bw.length?DB.bw[DB.bw.length-1].w:62.5;\n  const prev=DB.bw.length>1?DB.bw[DB.bw.length-2].w:null;\n  const dlt=prev!=null?(bw-prev):0;\n  const dltTxt=prev!=null?(dlt>0?'▲ +'+dlt.toFixed(1):dlt<0?'▼ '+dlt.toFixed(1):'— 0.0'):'start';\n  const dltCol=dlt>0?'var(--green)':dlt<0?'var(--red)':'var(--muted)';\n  const bwStart=DB.bw.length?DB.bw[0].w:62.5;\n  const bwPct=Math.min(100,Math.max(0,(bw-62.5)/(75-62.5)*100));\n  const spark=sparkline(DB.bw.slice(-8).map(e=>+e.w));\n\n  // week + streak\n  const wd=weekSessDays();const wlabels=['TUE','WED','THU','FRI','SAT'];\n  let wkpips='';wd.forEach((on,i)=>{wkpips+=`<button class=\"wkpip ${on?'on':''}\" onclick=\"toggleSessDay(${i})\"><span class=\"cell\">${on?'✓':''}<\u002Fspan><span class=\"lb\">${wlabels[i]}<\u002Fspan><\u002Fbutton>`;});\n  const sessCount=weekCount();\n\n  // protein\n  const p=act,tot=proteinTotal(p),floor=FLOOR[p],ppct=Math.min(1,tot/floor),phit=tot>=floor;\n  const Cc=2*Math.PI*42;\n  let chips='';MEALFULL.forEach((m,i)=>{const on=!!DB.diet.checks[i];chips+=`<button class=\"chip ${on?'on':''}\" onclick=\"chkToggle(${i})\">${m.split(' — ')[0]} · ${PVAL[p][i]}g<\u002Fbutton>`;});\n\n  // engine / stamina\n  const stam=staminaList(ph);\n  const sw=staminaWeek();\n  let stamItems='';\n  stam.forEach(s=>{stamItems+=`<div class=\"law\"><span class=\"stam-t\" style=\"flex:1;color:var(--muted)\">${esc(stripTags(s.text))}<\u002Fspan><\u002Fdiv>`;});\n\n  return `\n  <div style=\"margin-bottom:2px\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <div class=\"date\">${datestamp()}<\u002Fdiv>\n      <button class=\"themetgl tap\" style=\"margin-left:auto\" onclick=\"toggleTheme()\" aria-label=\"Toggle light and dark mode\">${themeIcon()}<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"hd\" style=\"margin-top:12px;align-items:flex-start\">\n      <h1 style=\"max-width:58%\">${greeting()}, <span style=\"color:var(--dawn)\">Amritanshu<\u002Fspan>.<\u002Fh1>\n      <div style=\"margin-left:auto\">${weatherBlockHTML()}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"seg\" style=\"margin-top:16px\">\n    <button class=\"${train?'on train':''}\" onclick=\"setDayMode('train')\">Training day<\u002Fbutton>\n    <button class=\"${!train?'on rest':''}\" onclick=\"setDayMode('rest')\">Rest day<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"hero ${train?'':'restday'}\">\n    <div class=\"halo\"><\u002Fdiv>\n    <div class=\"meta\">${heroMeta}<\u002Fdiv>\n    <h2>${heroTitle}<\u002Fh2>\n    <div class=\"sub\">${heroSub}<\u002Fdiv>\n    <button class=\"begin tap\" onclick=\"beginPress()\">${heroBtn} ▸<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"divider\">The arc · 24 months<\u002Fdiv>\n  <div class=\"arc\">\n    <div class=\"line\"><span class=\"fill\" style=\"width:${fillPct}%\"><\u002Fspan><\u002Fdiv>\n    <div class=\"nodes\">${arc}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"card foundcard\" onclick=\"go('progress')\" style=\"margin-top:16px\">\n    <div style=\"display:flex;align-items:baseline;gap:9px\">\n      <span class=\"big\" style=\"font-size:20px;text-transform:uppercase\">${SP.title}<\u002Fspan>\n      <span class=\"mono\" style=\"font-size:10.5px;color:${spCol};text-transform:uppercase;letter-spacing:.06em\">${spState}<\u002Fspan>\n      <span class=\"mono\" style=\"margin-left:auto;font-size:12px;color:var(--gold)\">≥ ${BWGATE[sp]}kg<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"color:var(--muted);font-size:12.5px;margin-top:8px;line-height:1.5\">${SP.desc}<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;margin-top:13px\">\n      <div class=\"pbar\" style=\"flex:1\"><span class=\"grn\" style=\"width:${gatePct}%\"><\u002Fspan><\u002Fdiv>\n      <span class=\"mono\" style=\"font-size:10px;color:var(--muted);white-space:nowrap\">GATE ${met}/4<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"card segwrap\" style=\"margin-top:12px;cursor:pointer\" onclick=\"openBw(false)\">\n    <div style=\"display:flex;align-items:flex-end;gap:12px\">\n      <div>\n        <div class=\"clabel\">Bodyweight<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px;margin-top:5px\">\n          <span class=\"big\" style=\"font-size:34px\">${bw}<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:12px;color:${dltCol}\">${dltTxt}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-left:auto;text-align:right\">\n        <div class=\"big\" style=\"font-size:22px;color:var(--neogreen)\">${Math.round(bwPct)}%<\u002Fdiv>\n        <div class=\"grow\" style=\"justify-content:flex-end;margin-top:2px\">↗ to 75kg goal<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:14px\">${segBar(bwPct,36)}<\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;margin-top:7px\">\n      <span class=\"mono\" style=\"font-size:10px;color:var(--dim)\">${bwStart}kg start<\u002Fspan>\n      <span class=\"mono\" style=\"font-size:10px;color:var(--gold)\">75kg<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:1.45fr 1fr;gap:12px;margin-top:12px\">\n    <div class=\"card\">\n      <div style=\"display:flex;align-items:baseline;gap:8px\">\n        <span class=\"clabel\">This week<\u002Fspan>\n        <span class=\"big\" style=\"margin-left:auto;font-size:18px\">${sessCount}/5<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:6px;margin-top:13px\">${wkpips}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;justify-content:center\">\n      <div class=\"clabel\">Protein streak<\u002Fdiv>\n      <div class=\"big\" style=\"font-size:34px;color:var(--gold);margin-top:8px\">${DB.diet.streak}<\u002Fdiv>\n      <div class=\"mono\" style=\"font-size:9.5px;color:var(--dim);margin-top:3px\">days at floor<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"card\" style=\"margin-top:12px\">\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <div class=\"ring-wrap\" style=\"width:92px;height:92px\">\n        <svg viewBox=\"0 0 100 100\" width=\"92\" height=\"92\">\n          <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"rgba(255,255,255,.07)\" stroke-width=\"9\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"${phit?'var(--green)':'var(--dawn)'}\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-dasharray=\"${Cc.toFixed(1)}\" stroke-dashoffset=\"${(Cc*(1-ppct)).toFixed(1)}\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div class=\"ring-center\">\n          <span class=\"big\" style=\"font-size:20px;color:${phit?'var(--green)':'var(--text)'}\">${tot}g<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:9px;color:var(--dim)\">/ ${floor}g<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:0\">\n        <div class=\"clabel\" style=\"margin-bottom:9px;font-size:10.5px\">Protein · tap what you ate<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px\">${chips}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"linkbtn\" onclick=\"go('fuel')\">Manage in Fuel →<\u002Fbutton>\n  <\u002Fdiv>\n\n  <details class=\"card expandable\" style=\"margin-top:12px\">\n    <summary>\n      <div>\n        <div class=\"clabel\">The Engine · Stamina<\u002Fdiv>\n        <div style=\"font-weight:600;font-size:13.5px;margin-top:4px\">P${ph.slice(1)} · ${stam.length} weekly add-on${stam.length!==1?'s':''} · ${sw.done}/${sw.planned} done<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsummary>\n    <div style=\"margin-top:14px\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px\">\n        <span class=\"mono\" style=\"font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em\">This week<\u002Fspan>\n        <div class=\"pbar\" style=\"flex:1\"><span class=\"blu\" style=\"width:${sw.planned?Math.round(sw.done/sw.planned*100):0}%\"><\u002Fspan><\u002Fdiv>\n        <span class=\"mono\" style=\"font-size:10px;color:var(--blue)\">${sw.done}/${sw.planned}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"law\"><span class=\"n\">1<\u002Fspan><span><b>Lift first, cardio after<\u002Fb> — or separate days.<\u002Fspan><\u002Fdiv>\n      <div class=\"law\"><span class=\"n\">2<\u002Fspan><span><b>+200–300 kcal<\u002Fb> every conditioning day.<\u002Fspan><\u002Fdiv>\n      <div class=\"law\"><span class=\"n\">3<\u002Fspan><span><b>Zone 2 base + sprint peak<\u002Fb>, nothing between.<\u002Fspan><\u002Fdiv>\n      <div class=\"law\"><span class=\"n\">4<\u002Fspan><span><b>Football = a conditioning session.<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"law\"><span class=\"n\">5<\u002Fspan><span><b>Legs dead 48h+<\u002Fb> → cut one cardio, add a meal.<\u002Fspan><\u002Fdiv>\n      <button class=\"linkbtn\" onclick=\"go('plan')\">Edit stamina add-ons in Plan →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdetails>\n\n  ${(DB.deload||recoveryDue())?recBannerHTML():''}\n  `;\n}\nfunction recBannerHTML(){\n  if(DB.deload)return `<div class=\"recbanner on\" style=\"margin-top:16px\"><span><b>RECOVERY WEEK ACTIVE<\u002Fb> — sets reduced 60%. Sprints skipped.<\u002Fspan><button onclick=\"toggleDeload()\">Turn off<\u002Fbutton><\u002Fdiv>`;\n  return `<div class=\"recbanner due\" style=\"margin-top:16px\"><span><b>RECOVERY DUE<\u002Fb> — Week 6+. Enable when ready.<\u002Fspan><button onclick=\"toggleDeload()\">Enable<\u002Fbutton><\u002Fdiv>`;\n}\nfunction sparkline(arr){\n  if(arr.length<2)return '<span class=\"mono\" style=\"font-size:10px;color:var(--dim)\">log to chart<\u002Fspan>';\n  const mn=Math.min(...arr)-0.2,mx=Math.max(...arr)+0.2,Wd=150,Hd=48,n=arr.length;\n  const pt=arr.map((v,i)=>[(i/(n-1)*Wd),(Hd-((v-mn)/(mx-mn))*(Hd-6)-3)]);\n  const line='M'+pt.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L');\n  const area=line+` L${Wd} ${Hd} L0 ${Hd} Z`;\n  return `<svg viewBox=\"0 0 ${Wd} ${Hd}\" width=\"${Wd}\" height=\"${Hd}\" style=\"overflow:visible\"><path d=\"${area}\" fill=\"rgba(255,122,60,.12)\"><\u002Fpath><path d=\"${line}\" fill=\"none\" stroke=\"var(--dawn)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"${pt[n-1][0].toFixed(1)}\" cy=\"${pt[n-1][1].toFixed(1)}\" r=\"3.5\" fill=\"var(--dawn)\"><\u002Fcircle><\u002Fsvg>`;\n}\nfunction selArc(i){selPhase=i;renderScreen('home');}\nfunction segBar(pct,n){\n  n=n||34;const filled=Math.round(Math.max(0,Math.min(100,pct))/100*n);\n  let s='';for(let i=0;i<n;i++)s+=`<span class=\"sg ${i<filled?'on':''}\"><\u002Fspan>`;\n  return `<div class=\"segbar\">${s}<\u002Fdiv>`;\n}function setDayMode(m){dayMode=m;renderScreen('home');}\nfunction toggleSessDay(i){\n  // manual toggle of this-week session dot (adds/removes a lightweight session marker for that weekday)\n  const now=new Date();const dow=i+2;const diff=(now.getDay()-dow+7)%7;\n  const d=new Date(now);d.setDate(now.getDate()-diff);const iso=d.toISOString().slice(0,10);\n  const key=sessKey(DB.phase,i);\n  const exists=DB.sess.find(s=>s.d===iso&&s.k===key);\n  if(exists){DB.sess=DB.sess.filter(s=>!(s.d===iso&&s.k===key));}\n  else{DB.sess.push({k:key,d:iso,n:'',duration:0,staminaDone:false});}\n  saveDB();renderScreen('home');renderScreen('progress');\n}\n\n/* recovery tooltip */\nfunction recTip(el){\n  const tip=document.getElementById('tip');\n  tip.innerHTML='<b>Recovery Week<\u002Fb> — a planned lighter week (60% volume, no sprints) so your body can catch up, come back stronger, and dodge injury. <span style=\"display:block;margin-top:8px;color:var(--muted)\">Tap again to toggle it on/off.<\u002Fspan>';\n  const r=el.getBoundingClientRect(),ar=document.getElementById('app').getBoundingClientRect();\n  tip.style.right=(ar.right-r.right)+'px';tip.style.left='auto';tip.style.top=(r.bottom-ar.top+8)+'px';\n  tip.classList.add('show');\n  if(el._t){clearTimeout(el._t);el._t=null;tip.classList.remove('show');toggleDeload();return;}\n  el._t=setTimeout(()=>{el._t=null;},1400);\n  setTimeout(()=>tip.classList.remove('show'),4000);\n}\n\n/* ============================================================\n   BODYWEIGHT OVERLAY\n   ============================================================ */\nfunction maybeBwPrompt(){\n  if(DB.bwPromptedFor===isoToday())return;\n  // fire softly on first open per day\n  setTimeout(()=>{if(DB.bwPromptedFor!==isoToday())openBw(dayMode==='train',true);},500);\n}\nlet _bwPrompt=false;\nfunction bwDaysAgo(){\n  const e=DB.bw.length?DB.bw[DB.bw.length-1]:null;\n  if(!e||!e.iso)return '';\n  const d=Math.round((Date.now()-new Date(e.iso).getTime())/86400000);\n  return d<=0?'today':d===1?'1 day ago':d+' days ago';\n}\nfunction openBw(full,isPrompt){\n  _bwPrompt=!!isPrompt;\n  const ov=document.getElementById('bwov');\n  ov.className='show'+(full?' full':'');\n  const e=DB.bw.length?DB.bw[DB.bw.length-1]:null;\n  const ago=bwDaysAgo();\n  const delta=e?`Last: ${e.w}kg${ago?' · '+ago:''}`:'First weigh-in — set your baseline.';\n  const hap=DB.settings.haptics!==false;\n  ov.innerHTML=`<div class=\"scrim\" onclick=\"skipBw()\"><\u002Fdiv>\n  <div class=\"sheet\">\n    <div class=\"eyebrow\" style=\"color:var(--dawn)\">Daily weigh-in<\u002Fdiv>\n    <h3 style=\"margin-top:8px\">Bodyweight today?<\u002Fh3>\n    <div class=\"mono\" style=\"color:var(--muted);font-size:11.5px;margin-top:8px\">${delta}<\u002Fdiv>\n    <input class=\"bwin\" id=\"bw-input\" type=\"number\" inputmode=\"decimal\" placeholder=\"${e?e.w:'—'} kg\" value=\"\">\n    <button class=\"begin tap\" style=\"animation:none;box-shadow:0 16px 34px -16px rgba(255,122,60,.9)\" onclick=\"logBw()\">Log weight ✓<\u002Fbutton>\n    <div style=\"text-align:center;margin-top:12px\"><button class=\"skiplink\" onclick=\"skipBw()\">skip today<\u002Fbutton><\u002Fdiv>\n    <div style=\"display:flex;justify-content:center;margin-top:${full?'24px':'14px'}\"><button class=\"hapchip ${hap?'on':''}\" onclick=\"toggleHap(this)\">⚡ Haptics ${hap?'ON':'OFF'}<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n  setTimeout(()=>{const el=document.getElementById('bw-input');if(el)el.focus();},220);\n}\nfunction toggleHap(btn){const on=DB.settings.haptics!==false;DB.settings.haptics=!on;saveDB();if(!on)buzz();btn.classList.toggle('on',!on);btn.textContent='⚡ Haptics '+((!on)?'ON':'OFF');}\nfunction closeBw(){document.getElementById('bwov').className='';}\nfunction logBw(){\n  const v=document.getElementById('bw-input').value.trim();\n  if(v){DB.bw.push({w:parseFloat(v),d:dispDate(isoToday()),iso:isoToday()});if(DB.bw.length>80)DB.bw=DB.bw.slice(-80);buzz([120]);}\n  DB.bwPromptedFor=isoToday();saveDB();closeBw();renderAll();\n  if(_bwPrompt&&dayMode==='train')enterRunner();\n}\nfunction skipBw(){DB.bwPromptedFor=isoToday();saveDB();closeBw();if(_bwPrompt&&dayMode==='train')enterRunner();}\n\n/* ============================================================\n   BEGIN SESSION FLOW\n   ============================================================ */\nfunction beginPress(){\n  const ph=DB.phase;\n  if(!DB.start[ph]){DB.start[ph]=isoToday();saveDB();}\n  if(dayMode==='rest'){enterRecovery();return;}\n  if(DB.bwPromptedFor!==isoToday()){openBw(true,true);return;}\n  enterRunner();\n}\n\n/* ============================================================\n   FOCUS RUNNER  (full-screen state machine)\n   ============================================================ */\nlet RN=null;  // runtime session\nlet rnTimer=null,restTimer=null;\n\nfunction buildSession(resume){\n  const ph=DB.phase,i=todayIdx()>=0?todayIdx():0;\n  const list=effExList(ph,i);\n  const exs=list.map(e=>{\n    const cfg=cfgOf(e);const n=setsOf(cfg);\n    return {id:e[0],name:e[1],scheme:e[2],rest:e[3]||0,cue:e[4],yt:e[5],warn:e[6],cfg,w:e[0]&&PHASES[ph].days[i]?PHASES[ph].days[i].w:'push'};\n  });\n  const dayW=PHASES[ph].days[i].w;\n  return {ph,i,dayW,exs,exIdx:0,setIdx:0,logs:{},weight:0,reps:0,elapsed:0,startAt:Date.now(),prs:[],phase:'preview'};\n}\nfunction enterRunner(){\n  RN=buildSession();\n  seedStep();\n  document.getElementById('runner').classList.add('show');\n  renderRunner();\n}\nfunction enterRecovery(){\n  RN={ph:DB.phase,recovery:true};\n  document.getElementById('runner').classList.add('show');\n  renderRecovery();\n}\nfunction exitRunner(saveResume){\n  stopRnTimer();stopRestTimer();\n  if(saveResume)saveActive(); else if(RN&&!RN.recovery){DB.activeSession=null;saveDB();}\n  document.getElementById('runner').classList.remove('show');\n  RN=null;renderAll();go(curScreen);\n}\nfunction startRnTimer(){stopRnTimer();if(RN._elapsedBase==null)RN._elapsedBase=RN.elapsed||0;RN._runFrom=Date.now();rnTimer=setInterval(rnTick,500);}\nfunction rnTick(){if(!RN||RN._runFrom==null)return;RN.elapsed=(RN._elapsedBase||0)+Math.floor((Date.now()-RN._runFrom)/1000);const el=document.getElementById('rn-elapsed');if(el)el.textContent=fmt(RN.elapsed);}\nfunction stopRnTimer(){if(RN&&RN._runFrom!=null){RN._elapsedBase=(RN._elapsedBase||0)+Math.floor((Date.now()-RN._runFrom)/1000);RN.elapsed=RN._elapsedBase;RN._runFrom=null;}if(rnTimer){clearInterval(rnTimer);rnTimer=null;}}\nfunction stopRestTimer(){if(restTimer){clearInterval(restTimer);restTimer=null;}}\ndocument.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&RN){if(RN.phase==='rest')restTick();else if(RN._runFrom!=null)rnTick();}});\nwindow.addEventListener('focus',()=>{if(RN){if(RN.phase==='rest')restTick();else if(RN._runFrom!=null)rnTick();}});\n\nfunction curEx(){return RN.exs[RN.exIdx];}\nfunction seedStep(){\n  const ex=curEx();const cfg=ex.cfg;\n  const h=DB.log[ex.id];\n  const lw=(h&&h.length)?(parseFloat(h[h.length-1].w)||0):startW(ex.id);\n  RN.weight=lw;\n  RN.reps=(cfg.m==='t'?Math.max(5,cfg.lo):cfg.lo)||8;\n}\nfunction sessDoneSets(){let t=0,d=0;RN.exs.forEach(ex=>{t+=setsOf(ex.cfg);d+=(RN.logs[ex.id]||[]).length;});return{t,d};}\n\nfunction renderRunner(){\n  if(!RN)return;\n  if(RN.phase==='preview')return renderPreview();\n  if(RN.phase==='exercise')return renderExercise();\n  if(RN.phase==='rest')return renderRest();\n  if(RN.phase==='exdone')return renderExDone();\n  if(RN.phase==='stamina')return renderStamina();\n  if(RN.phase==='summary')return renderSummary();\n}\n\nfunction rnHeader(){\n  const {t,d}=sessDoneSets();const pct=t?Math.round(d/t*100):0;\n  const ex=curEx();\n  return `<div class=\"rn-hd\">\n    <button class=\"rn-x tap\" onclick=\"exitRunner(true)\" aria-label=\"Close session\">✕<\u002Fbutton>\n    <button class=\"rn-x tap\" onclick=\"backToList()\" aria-label=\"Back to exercise list\" style=\"margin-left:-4px\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"/><\u002Fsvg><\u002Fbutton>\n    <div class=\"rn-center\">\n      <div class=\"ex\">EX <b>${String(RN.exIdx+1).padStart(2,'0')}<\u002Fb> / ${String(RN.exs.length).padStart(2,'0')}<\u002Fdiv>\n      <div class=\"mg\">${(MUSCLES[RN.dayW]||[])[0]?.toUpperCase()||''}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rn-time\" id=\"rn-elapsed\">${fmt(RN.elapsed)}<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"rn-prog\"><span style=\"width:${pct}%\"><\u002Fspan><\u002Fdiv>`;\n}\nfunction backToList(){stopRnTimer();stopRestTimer();saveActive();RN._returnTo=RN.exIdx;RN.phase='preview';buzz();renderRunner();\n  const el=document.getElementById('prev-ex-'+(RN._returnTo||0));const body=document.querySelector('#runner .rn-body');\n  if(el&&body)setTimeout(()=>{body.scrollTop=Math.max(0,el.offsetTop-body.offsetTop-120);},40);\n}\n\n/* ---- preview ---- */\nfunction renderPreview(){\n  const ph=RN.ph,hd=PHASES[ph].days[RN.i];\n  const list=RN.exs;\n  let rows='';\n  list.forEach((ex,i)=>{\n    const cfg=ex.cfg;const scheme=cfg.s+'×'+(cfg.lo===cfg.hi?cfg.lo:cfg.lo+'–'+cfg.hi);\n    rows+=`<div id=\"prev-ex-${i}\" class=\"mpx-row tap ${i===RN.exIdx?'cur':''}\" onclick=\"jumpEx(${i})\" style=\"background:var(--panel);border:1px solid ${i===RN.exIdx?'var(--dawn)':'var(--line)'};border-radius:12px;padding:12px 14px;margin-bottom:8px\">\n      <span class=\"mono\" style=\"font-size:11px;color:var(--muted);width:18px\">${String(i+1).padStart(2,'0')}<\u002Fspan>\n      <div style=\"min-width:0\"><div style=\"font-weight:600;font-size:14px\">${esc(ex.name)}<\u002Fdiv><div style=\"font-size:11px;color:var(--muted);margin-top:1px\">${MUSCLES[RN.dayW]?.[0]||''}<\u002Fdiv><\u002Fdiv>\n      <span class=\"sc\">${scheme}<\u002Fspan>\n    <\u002Fdiv>`;\n  });\n  const estMin=list.reduce((a,e)=>a+setsOf(e.cfg)*(e.rest+30)/60,0);\n  const ready=readyToProgress(list);\n  const nudge=ready.length?`<div class=\"nudge\"><div class=\"nudge-h\">▲ ${ready.length} lift${ready.length>1?'s':''} ready to progress<\u002Fdiv><div class=\"nudge-b\">You hit the top of the range last time on <b>${ready.slice(0,3).map(r=>esc(r)).join('<\u002Fb>, <b>')}<\u002Fb>${ready.length>3?' +'+(ready.length-3)+' more':''}. Add the smallest step today.<\u002Fdiv><\u002Fdiv>`:'';\n  const warm=(W[hd.w]||[]).map(wcCard).join('');\n  const cool=(C[hd.c]||[]).map(wcCard).join('');\n  document.getElementById('runner').innerHTML=`\n  <div class=\"rn-screen\">\n    <div class=\"rn-hd\">\n      <button class=\"rn-x tap\" onclick=\"exitRunner(false)\">✕<\u002Fbutton>\n      <div class=\"rn-center\"><div class=\"ex\" style=\"color:var(--muted)\">TODAY · ${hd.d}<\u002Fdiv><\u002Fdiv>\n      <div style=\"width:38px\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rn-body\">\n      <h2 style=\"font-size:40px;text-transform:uppercase\">${WNAME[RN.dayW]} Day<\u002Fh2>\n      <div style=\"color:var(--muted);margin-top:6px;font-size:14px\">${hd.f}<\u002Fdiv>\n      <div style=\"display:flex;gap:7px;margin-top:14px;flex-wrap:wrap\">\n        <span class=\"chip\">${list.length} EXERCISES<\u002Fspan>\n        <span class=\"chip\">~${Math.round(estMin)} MIN<\u002Fspan>\n        ${hd.cond?'<span class=\"chip\" style=\"color:var(--blue);border-color:rgba(92,168,255,.3);background:rgba(92,168,255,.08)\">+ '+stripTags(hd.cond).split('(')[0].trim()+'<\u002Fspan>':''}\n      <\u002Fdiv>\n      ${nudge}\n      <div class=\"divider\" style=\"margin:20px 0 12px\">Warm-up · dynamic<\u002Fdiv>\n      ${warm}\n      <div class=\"divider\" style=\"margin:20px 0 12px\">The plan<\u002Fdiv>\n      ${rows}\n      <div class=\"divider\" style=\"margin:20px 0 12px\">Cool-down · static<\u002Fdiv>\n      ${cool}\n    <\u002Fdiv>\n    <div class=\"rn-foot\">\n      <button class=\"logset tap\" onclick=\"startExercises()\">Begin session ▸<\u002Fbutton>\n      <button class=\"endbtn\" onclick=\"exitRunner(false)\">Exit<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction jumpEx(i){RN.exIdx=i;RN.setIdx=(RN.logs[RN.exs[i].id]||[]).length;seedStep();RN.phase='exercise';if(!rnTimer)startRnTimer();renderRunner();}\nfunction wcCard(item){\n  const parts=item.split('—');\n  const name=stripTags(parts[0]).trim();\n  const detail=parts.length>1?parts.slice(1).join('—').trim():'';\n  const info=mobInfo(name);\n  return `<div class=\"wc-card\"><div class=\"wc-head tap\" onclick=\"toggleWC(this)\">\n      <span class=\"nm\">${esc(name)}<\u002Fspan>\n      ${detail?`<span class=\"rp\">${esc(detail)}<\u002Fspan>`:''}\n      <span class=\"cv\">⌄<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"wc-info\"><div><div class=\"wc-inner\">\n      ${esc(info.tip)}\n      <a class=\"wc-yt\" href=\"https://www.youtube.com/results?search_query=${encodeURIComponent(info.yt)}\" target=\"_blank\" rel=\"noopener\" onclick=\"event.stopPropagation()\">▶ Watch on YouTube<\u002Fa>\n    <\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction toggleWC(head){head.parentElement.classList.toggle('open');buzz();}\nfunction startExercises(){RN.phase='exercise';RN.exIdx=0;RN.setIdx=0;seedStep();askNotify();startRnTimer();renderRunner();}\n\n/* ---- exercise (stepper) ---- */\nfunction renderExercise(){\n  const ex=curEx();const cfg=ex.cfg;const n=setsOf(cfg);\n  if(RN.setIdx>=n)RN.setIdx=n-1;\n  const isT=cfg.m==='t';const noW=cfg.m==='b'||isT;\n  const kgLabel=cfg.m==='w'?'Added · kg':(ex.id==='p1ch'||ex.id==='p2ch')?'Assist · kg':'Weight · kg';\n  const scheme=cfg.s+' × '+(cfg.lo===cfg.hi?cfg.lo:cfg.lo+'–'+cfg.hi);\n  const logged=RN.logs[ex.id]||[];\n  let pips='';for(let i=0;i<n;i++){const st=i<RN.setIdx?'done':(i===RN.setIdx?'active':'');pips+=`<button class=\"setpip ${st}\" onclick=\"editSet(${i})\" aria-label=\"Set ${i+1}\">${logged[i]!=null?logged[i]:'S'+(i+1)}<\u002Fbutton>`;}\n  const step=weightStepFor(ex.id);\n  const steptabs=noW?'':`<div class=\"steptabs\">${[0.5,1,1.25,2,2.5,5].map(v=>`<button class=\"${v===step?'on':''}\" onclick=\"setStep('${ex.id}',${v})\">${v}<\u002Fbutton>`).join('')}<\u002Fdiv>`;\n  const wcard=noW?'':`<div class=\"stepcard\">\n    ${steptabs}\n    <div class=\"sl\">${kgLabel}<\u002Fdiv>\n    <div class=\"stepctl\"><button class=\"stepbtn tap\" onclick=\"stepW(-1)\">−<\u002Fbutton><span class=\"stepval\">${RN.weight||0}<\u002Fspan><button class=\"stepbtn up tap\" onclick=\"stepW(1)\">+<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n  const rcard=`<div class=\"stepcard\">\n    <div class=\"sl\">${isT?'Seconds':'Reps'}<\u002Fdiv>\n    <div class=\"stepctl\"><button class=\"stepbtn tap\" onclick=\"stepR(-1)\">−<\u002Fbutton><span class=\"stepval\">${RN.reps}<\u002Fspan><button class=\"stepbtn up tap\" onclick=\"stepR(1)\">+<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n  const h=DB.log[ex.id];\n  const prevSet=RN.setIdx>0?logged[RN.setIdx-1]:null;\n  let lastTxt;\n  if(RN.setIdx>0)lastTxt='Last set · '+(noW?'':RN.weight+'kg × ')+prevSet;\n  else if(h&&h.length){const L=h[h.length-1];lastTxt='Last: '+(L.w?L.w+'kg × ':'')+L.reps.join('/');}\n  else lastTxt='Last: first set';\n  const atTop=!isT&&cfg.hi<99&&RN.reps>=cfg.hi;\n  const target='Target '+(cfg.lo===cfg.hi?cfg.lo:cfg.lo+'–'+cfg.hi)+(isT?' sec':' reps');\n  document.getElementById('runner').innerHTML=`\n  <div class=\"rn-screen\">\n    ${rnHeader()}\n    <div class=\"rn-body ex-body\">\n      <h2 style=\"font-size:29px;margin-top:6px\">${esc(ex.name)}<\u002Fh2>\n      <div style=\"display:flex;align-items:baseline;gap:9px;margin-top:8px;flex-wrap:wrap\">\n        <span class=\"mono\" style=\"font-size:14px;color:var(--gold);font-weight:700\">${scheme}<\u002Fspan>\n        ${ex.cue?`<span style=\"font-size:14px;color:var(--muted)\">${esc(ex.cue)}<\u002Fspan>`:''}\n      <\u002Fdiv>\n      ${ex.warn?`<div class=\"mono\" style=\"margin-top:9px;font-size:11px;color:var(--red);background:rgba(255,140,140,.07);border:1px solid rgba(255,140,140,.3);border-radius:10px;padding:8px 11px\">${esc(ex.warn)}<\u002Fdiv>`:''}\n      ${ex.yt?`<a class=\"mono\" style=\"display:inline-block;margin-top:9px;font-size:12px\" href=\"https://www.youtube.com/results?search_query=${encodeURIComponent(ex.yt)}\" target=\"_blank\" rel=\"noopener\">▶ YT: \"${esc(ex.yt)}\"<\u002Fa>`:''}\n      <div style=\"display:flex;align-items:flex-start;justify-content:center;padding:12px 0 4px\">${muscleBand(ex)}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;margin-top:20px;margin-bottom:12px\">\n        <span class=\"mono\" style=\"font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:700\">Set ${RN.setIdx+1} of ${n}<\u002Fspan>\n        <div class=\"setpips\" style=\"margin-left:auto\">${pips}<\u002Fdiv>\n      <\u002Fdiv>\n      ${noW?`<div class=\"stepgrid one\">${rcard}<\u002Fdiv>`:`<div class=\"stepgrid one\" style=\"margin-bottom:12px\">${wcard}<\u002Fdiv>${plateHTML(ex)}<div class=\"stepgrid one\">${rcard}<\u002Fdiv>`}\n      <div style=\"display:flex;align-items:center;gap:10px;margin-top:11px;min-height:22px\">\n        <span class=\"mono\" style=\"font-size:12px;color:var(--green)\">↳ ${lastTxt}<\u002Fspan>\n        ${atTop?'<span class=\"mono\" style=\"margin-left:auto;font-size:10px;color:var(--green);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.4);border-radius:99px;padding:4px 9px\">▲ top of range — add weight<\u002Fspan>':''}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rn-foot\">\n      <button class=\"logset tap\" id=\"logbtn\" onclick=\"logSet()\">${RN.setIdx<logged.length?'Update set ✓':'Log set ✓'}<\u002Fbutton>\n      <div class=\"subcap\">${target} · <button class=\"skiplink\" style=\"text-decoration:underline\" onclick=\"openSwap()\">swap exercise<\u002Fbutton><\u002Fdiv>\n      <button class=\"endbtn\" onclick=\"confirmEnd()\">End session<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction setStep(id,v){DB.settings.weightStep[id]=v;saveDB();renderExercise();}\nfunction isBarbell(ex){return /barbell|bench press|\\brow\\b/i.test(ex.name)&&/barbell|bench|row/i.test(ex.name)&&/barbell/i.test(ex.name);}\nconst PLATES=[20,15,10,5,2.5,1.25];\nfunction plateMath(total,bar){\n  bar=bar||20;if(total<=bar)return {ok:false,bar};\n  let perSide=(total-bar)/2,rem=perSide,out=[];\n  PLATES.forEach(p=>{let c=0;while(rem>=p-1e-6){rem=Math.round((rem-p)*100)/100;c++;}if(c)out.push(c+'×'+p);});\n  return {ok:true,bar,perSide:Math.round(perSide*100)/100,plates:out,leftover:Math.round(rem*100)/100};\n}\nfunction plateHTML(ex){\n  if(!/barbell/i.test(ex.name))return '';\n  const pm=plateMath(RN.weight,20);\n  let body;\n  if(!pm.ok)body=`Just the <b>20kg bar<\u002Fb>${RN.weight<20?' (or empty/lighter)':''}.`;\n  else body=`<b>20kg bar<\u002Fb> + <b>${pm.plates.join(' + ')||'—'}<\u002Fb> per side <span style=\"color:var(--dim)\">= ${pm.perSide}kg/side${pm.leftover?', '+pm.leftover+'kg short':''}<\u002Fspan>`;\n  return `<div class=\"platebox\"><div class=\"pl-h\">🏋 Plate math <span>${RN.weight||0}kg total<\u002Fspan><\u002Fdiv><div class=\"pl-b\">${body}<\u002Fdiv><div class=\"pl-n\">Total = bar (20kg) + plates × 2 sides. Load the biggest plates first, mirror both ends.<\u002Fdiv><\u002Fdiv>`;\n}\nfunction muscleBand(ex){\n  const m=musclesFor(ex.id);\n  const view=(RN.view&&RN.view[ex.id])||m.v;\n  const lit=new Set([...m.p,...m.s]);\n  const chip=(id,pri)=>`<div class=\"mchip ${pri?'pri':'sec'}\"><span class=\"mdot\"><\u002Fspan>${MLABEL[id]||id}<\u002Fdiv>`;\n  let chips='';m.p.slice(0,6).forEach(id=>chips+=chip(id,true));\n  m.s.slice(0,Math.max(0,6-Math.min(m.p.length,6))).forEach(id=>chips+=chip(id,false));\n  return `<div class=\"mband\">\n    <div class=\"mfig\">${anatomy(view,lit,160)}<\u002Fdiv>\n    <div class=\"mtoggle\"><button class=\"${view==='front'?'on':''}\" onclick=\"setMuscleView('${ex.id}','front')\">FRONT<\u002Fbutton><button class=\"${view==='back'?'on':''}\" onclick=\"setMuscleView('${ex.id}','back')\">BACK<\u002Fbutton><\u002Fdiv>\n    <div class=\"mchips\">${chips}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction setMuscleView(id,v){if(!RN.view)RN.view={};RN.view[id]=v;renderExercise();}function stepW(dir){const step=weightStepFor(curEx().id);RN.weight=Math.max(0,Math.round((RN.weight+dir*step)*100)/100);buzz();renderExercise();}\nfunction stepR(dir){const cfg=curEx().cfg;const s=cfg.m==='t'?5:1,mn=cfg.m==='t'?5:1;RN.reps=Math.max(mn,RN.reps+dir*s);buzz();renderExercise();}\n\nfunction logSet(){\n  const ex=curEx();const cfg=ex.cfg;const n=setsOf(cfg);\n  if(!RN.logs[ex.id])RN.logs[ex.id]=[];\n  const editing=RN._editing!=null;\n  RN.logs[ex.id][RN.setIdx]=RN.reps;\n  buzz([120]);\n  saveActive(); // #2 autosave every set\n  if(editing){RN._editing=null;const done=(RN.logs[ex.id]||[]).filter(x=>x!=null).length;RN.setIdx=Math.min(done,n-1);seedStepKeepWeight();renderExercise();return;}\n  const lastSet=RN.setIdx>=n-1;\n  const lastEx=RN.exIdx>=RN.exs.length-1;\n  if(lastSet){\n    // commit exercise to DB.log + PR check\n    commitExercise(ex);\n    if(lastEx){ finishToStamina(); return; }\n    else { RN.phase='exdone'; renderRunner(); return; }\n  }else{\n    RN.setIdx++;\n    if(ex.rest>0){ startRest(); }\n    else { renderExercise(); }\n  }\n}\nfunction editSet(i){const ex=curEx();const logged=RN.logs[ex.id]||[];if(logged[i]==null&&i!==RN.setIdx)return;RN._editing=(logged[i]!=null)?i:null;RN.setIdx=i;if(logged[i]!=null)RN.reps=logged[i];buzz();renderExercise();}\nfunction swapCandidates(){\n  const cur=new Set(RN.exs.map(e=>e.id));const w=RN.dayW;const out=[];const seen=new Set();\n  ORDER.forEach(ph=>{PHASES[ph].days.forEach(d=>{if(d.w===w)d.ex.forEach(e=>{if(!cur.has(e[0])&&!seen.has(e[1])){seen.add(e[1]);const def=exDef(e[0]);out.push({id:e[0],name:def[1],scheme:def[2]});}});});});\n  return out.slice(0,14);\n}\nfunction openSwap(){\n  const cands=swapCandidates();\n  const rows=cands.map(c=>`<button class=\"swap-opt tap\" onclick=\"doSwap('${c.id}')\"><span>${esc(c.name)}<\u002Fspan><span class=\"mono\" style=\"color:var(--gold);font-size:11px\">${esc(c.scheme)}<\u002Fspan><\u002Fbutton>`).join('');\n  document.getElementById('modal-box').innerHTML=`<h4>Swap exercise<\u002Fh4><p>Machine taken? Pick a same-muscle alternative — your logged sets so far stay.<\u002Fp>\n    <div style=\"max-height:46vh;overflow-y:auto;margin-top:14px;display:flex;flex-direction:column;gap:8px\">${rows||'<div class=\"mono\" style=\"font-size:12px;color:var(--muted)\">No alternatives found.<\u002Fdiv>'}<\u002Fdiv>\n    <div class=\"row\" style=\"margin-top:14px\"><button class=\"no\" onclick=\"modalClose()\" style=\"flex:1\">Cancel<\u002Fbutton><\u002Fdiv>`;\n  document.getElementById('modal').classList.add('show');\n}\nfunction doSwap(id){\n  const def=exDef(id);if(!def)return;const cfg=cfgOf(def);\n  RN.exs[RN.exIdx]={id:def[0],name:def[1],scheme:def[2],rest:def[3]||0,cue:def[4],yt:def[5],warn:def[6],cfg,w:RN.dayW};\n  RN.setIdx=0;seedStep();modalClose();buzz();renderExercise();\n}\nfunction commitExercise(ex){\n  const cfg=ex.cfg;const n=setsOf(cfg);\n  const reps=(RN.logs[ex.id]||[]).slice(0,n).map(x=>String(x));\n  const w=(cfg.m==='b')?'':(RN.weight>0?String(RN.weight):'');\n  const prevMax=maxWeightHist(ex.id);\n  if(!DB.log[ex.id])DB.log[ex.id]=[];\n  DB.log[ex.id].push({w,reps,d:dispDate(isoToday())});\n  if(DB.log[ex.id].length>40)DB.log[ex.id]=DB.log[ex.id].slice(-40);\n  const isPR=(cfg.m!=='b')&&RN.weight>0&&RN.weight>prevMax&&prevMax>0;\n  if(isPR){RN.prs.push({name:ex.name,w:RN.weight});DB.prs.push({id:ex.id,name:ex.name,w:RN.weight,reps:reps.join('/'),iso:isoToday(),d:dispDate(isoToday())});if(DB.prs.length>200)DB.prs=DB.prs.slice(-200);}\n  saveDB();\n  ex._pr=isPR;\n}\nfunction saveActive(){\n  if(!RN||RN.recovery||RN.phase==='preview'||RN.phase==='summary')return;\n  DB.activeSession={phase:RN.ph,dayIdx:RN.i,exIdx:RN.exIdx,setIdx:RN.setIdx,elapsed:RN.elapsed,logs:RN.logs,prs:RN.prs,startedAt:RN.startAt};\n  saveDB();\n}\n\n/* ---- rest ring (timestamp-based, survives backgrounding) ---- */\nfunction startRest(){\n  const dur=curEx().rest;\n  RN.phase='rest';RN.restTotal=dur;RN.restEndAt=Date.now()+dur*1000;RN.restLeft=dur;RN.restBeeped=false;\n  stopRnTimer(); // pause working timer during rest\n  renderRest();\n  stopRestTimer();\n  restTimer=setInterval(restTick,250);\n}\nfunction restTick(){\n  if(!RN||RN.phase!=='rest')return;\n  RN.restLeft=Math.max(0,Math.round((RN.restEndAt-Date.now())/1000));\n  if(RN.restLeft<=0){if(!RN.restBeeped){RN.restBeeped=true;stopRestTimer();beep();skipRest(true);}}\n  else updateRestUI();\n}\nfunction renderRest(){\n  const ex=curEx();\n  const nextTxt='Next · Set '+(RN.setIdx+1)+' of '+setsOf(ex.cfg);\n  const C=2*Math.PI*44;\n  document.getElementById('runner').innerHTML=`\n  <div class=\"rn-screen rn-rest\">\n    <div class=\"mono\" style=\"display:flex;align-items:center;gap:8px;font-size:11px;color:var(--green);background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3);border-radius:99px;padding:8px 14px\">SET LOGGED ✓<\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n      <div class=\"mono\" style=\"font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:8px\">Rest<\u002Fdiv>\n      <div class=\"rov-ring\">\n        <svg viewBox=\"0 0 100 100\"><circle cx=\"50\" cy=\"50\" r=\"44\" fill=\"none\" stroke=\"rgba(255,255,255,.07)\" stroke-width=\"7\"><\u002Fcircle>\n        <circle id=\"rov-arc\" cx=\"50\" cy=\"50\" r=\"44\" fill=\"none\" stroke=\"var(--dawn)\" stroke-width=\"7\" stroke-linecap=\"round\" stroke-dasharray=\"${C.toFixed(1)}\" stroke-dashoffset=\"0\" style=\"filter:drop-shadow(0 0 8px rgba(255,122,60,.5))\"><\u002Fcircle><\u002Fsvg>\n        <div class=\"rov-time\" id=\"rov-time\">${fmt(RN.restLeft)}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mono\" style=\"font-size:12px;color:var(--muted);margin-top:18px\">${nextTxt}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:11px;width:100%\">\n      <button class=\"tap\" onclick=\"addRest(15)\" style=\"flex:1;border:1px solid var(--blue);background:rgba(92,168,255,.1);color:var(--blue);font-family:var(--fmono);font-weight:700;font-size:13px;border-radius:14px;padding:16px\">+15s<\u002Fbutton>\n      <button class=\"tap\" onclick=\"skipRest(false)\" style=\"flex:2;border:none;background:var(--dawn);color:#1A0E05;font-family:var(--fdisp);font-size:17px;font-weight:700;text-transform:uppercase;border-radius:14px;padding:16px\">Skip rest ▸<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction updateRestUI(){\n  const t=document.getElementById('rov-time');if(t)t.textContent=fmt(RN.restLeft);\n  const a=document.getElementById('rov-arc');if(a){const C=2*Math.PI*44,frac=RN.restTotal>0?RN.restLeft/RN.restTotal:0;a.setAttribute('stroke-dashoffset',(C*(1-frac)).toFixed(1));}\n}\nfunction addRest(s){RN.restEndAt+=s*1000;RN.restTotal+=s;RN.restLeft=Math.max(0,Math.round((RN.restEndAt-Date.now())/1000));updateRestUI();}\nfunction skipRest(auto){stopRestTimer();RN.phase='exercise';seedStepKeepWeight();startRnTimer();renderExercise();}\nfunction seedStepKeepWeight(){const ex=curEx();const cfg=ex.cfg;RN.reps=(cfg.m==='t'?Math.max(5,cfg.lo):cfg.lo)||8;/* keep weight */}\n\n/* ---- exercise complete ---- */\nfunction renderExDone(){\n  const done=curEx();const next=RN.exs[RN.exIdx+1];\n  const pr=done._pr;\n  document.getElementById('runner').innerHTML=`\n  <div class=\"rn-screen\" style=\"align-items:center;justify-content:center;text-align:center;padding:28px 22px\">\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px\">\n      <div class=\"big\" style=\"font-size:60px;color:var(--green);animation:pop .4s var(--ease) both\">✓<\u002Fdiv>\n      <div class=\"big\" style=\"font-size:26px;text-transform:uppercase\">Exercise complete<\u002Fdiv>\n      ${pr?`<div class=\"mono\" style=\"font-size:13px;color:var(--gold);background:rgba(255,200,92,.1);border:1px solid rgba(255,200,92,.4);border-radius:99px;padding:8px 16px;animation:pop .5s var(--ease) both\">🏆 NEW PR · ${RN.weight}kg<\u002Fdiv>`:''}\n      ${next?`<div class=\"card\" style=\"width:100%;text-align:left;margin-top:8px\">\n        <div class=\"clabel\">Up next<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:16px;margin-top:6px\">${esc(next.name)}<\u002Fdiv>\n        <div class=\"mono\" style=\"font-size:12px;color:var(--gold);margin-top:4px\">${next.cfg.s} × ${next.cfg.lo===next.cfg.hi?next.cfg.lo:next.cfg.lo+'–'+next.cfg.hi}<\u002Fdiv>\n        ${next.cue?`<div style=\"font-size:12.5px;color:var(--muted);margin-top:6px\">${esc(next.cue)}<\u002Fdiv>`:''}\n      <\u002Fdiv>`:''}\n    <\u002Fdiv>\n    <div class=\"rn-foot\" style=\"width:100%\">\n      <button class=\"logset tap\" onclick=\"nextExercise()\">Ready ▸<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction nextExercise(){RN.exIdx++;RN.setIdx=0;seedStep();RN.phase='exercise';renderExercise();}\n\n/* ---- stamina step ---- */\nfunction finishToStamina(){\n  const stam=staminaList(RN.ph);\n  const today=stam[0];\n  if(!today){RN.phase='summary';stopRnTimer();renderSummary();return;}\n  RN.phase='stamina';renderStamina();\n}\nfunction renderStamina(){\n  const stam=staminaList(RN.ph);\n  const item=stam[0];\n  document.getElementById('runner').innerHTML=`\n  <div class=\"rn-screen\" style=\"padding:0\">\n    ${rnHeader()}\n    <div class=\"rn-body\" style=\"justify-content:center;text-align:center;align-items:center\">\n      <div class=\"mono\" style=\"font-size:11px;letter-spacing:.24em;color:var(--blue);text-transform:uppercase\">Final step · Stamina<\u002Fdiv>\n      <div class=\"big\" style=\"font-size:30px;margin-top:14px;text-transform:uppercase;text-wrap:balance;max-width:320px\">${esc(stripTags(item?item.text:'Zone-2 walk'))}<\u002Fdiv>\n      <div style=\"color:var(--muted);font-size:13px;margin-top:14px;max-width:300px\">Post-lift · Fed +250 kcal today. Timer keeps running — tap done when you finish.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rn-foot\">\n      <button class=\"logset tap\" style=\"background:var(--blue);color:#0B1526;box-shadow:0 18px 40px -16px rgba(92,168,255,.9)\" onclick=\"staminaDone(true)\">Stamina complete ✓<\u002Fbutton>\n      <div class=\"subcap\"><button class=\"skiplink\" onclick=\"staminaDone(false)\" style=\"text-decoration:underline\">skip today<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction staminaDone(did){RN._staminaDone=did;RN.phase='summary';stopRnTimer();renderSummary();}\n\n/* ---- summary ---- */\nfunction renderSummary(){\n  let sets=0;Object.keys(RN.logs).forEach(k=>sets+=RN.logs[k].length);\n  const dur=RN.elapsed;\n  const wd=weekSessDays();const done=wd.filter(Boolean).length;\n  const wkSec=weekWorkedSec()+dur;\n  const lit=new Set();\n  Object.keys(RN.logs).forEach(id=>{const m=musclesFor(id);m.p.forEach(x=>lit.add(x));m.s.forEach(x=>lit.add(x));});\n  const labels=MORDER.filter(x=>lit.has(x)).map(x=>MLABEL[x].toLowerCase());\n  document.getElementById('runner').innerHTML=`\n  <div class=\"rn-screen\" style=\"overflow-y:auto\">\n    <div style=\"min-height:100dvh;display:flex;flex-direction:column;padding:0 0 24px\">\n    <div class=\"rn-hd\"><div style=\"width:38px\"><\u002Fdiv><div class=\"rn-center\"><div class=\"ex\" style=\"color:var(--green)\">SESSION · READY TO SAVE<\u002Fdiv><\u002Fdiv><div style=\"width:38px\"><\u002Fdiv><\u002Fdiv>\n    <div style=\"padding:8px 18px 0\">\n      <h2 style=\"font-size:34px;text-transform:uppercase\">Session<br>complete<\u002Fh2>\n      <div style=\"display:flex;gap:6px;justify-content:center;align-items:flex-start;margin:14px 0 4px\">\n        <div style=\"text-align:center\"><div class=\"mono\" style=\"font-size:8px;letter-spacing:.14em;color:var(--muted);margin-bottom:4px\">FRONT<\u002Fdiv>${anatomy('front',lit,214)}<\u002Fdiv>\n        <div style=\"text-align:center\"><div class=\"mono\" style=\"font-size:8px;letter-spacing:.14em;color:var(--muted);margin-bottom:4px\">BACK<\u002Fdiv>${anatomy('back',lit,214)}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;color:var(--muted);font-size:12px;margin-top:6px;text-wrap:pretty\">${labels.length?labels.join(' · '):'full body'}<\u002Fdiv>\n      ${radarHTML(RN.logs)}\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:18px\">\n        ${statBox(hrsmin(dur),'Worked','var(--dawn)')}\n        ${statBox(sets,'Sets','var(--green)')}\n        ${statBox(RN.prs.length,'🏆 PRs','var(--gold)')}\n      <\u002Fdiv>\n      <div class=\"card\" style=\"margin-top:14px\">\n        <div class=\"mono\" style=\"font-size:11px;color:var(--muted)\">THIS WEEK · <b style=\"color:var(--text)\">${done}/5 sessions<\u002Fb> · <b style=\"color:var(--text)\">${hrsmin(wkSec)} worked<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <textarea class=\"txtin\" id=\"sess-note\" style=\"margin-top:14px;min-height:88px;max-height:40vh\" placeholder=\"Any notes? — pain, energy, PRs…\"><\u002Ftextarea>\n      <div style=\"margin-top:12px\"><div class=\"clabel\" style=\"margin-bottom:8px\">Any pain or tweak? (optional)<\u002Fdiv><div style=\"display:flex;gap:7px;flex-wrap:wrap\" id=\"pain-chips\">${['Knee','Shoulder','Lower back','Elbow','Wrist','Hamstring'].map(a=>`<button class=\"cardio-add tap\" data-pain=\"${a}\" onclick=\"togglePain(this)\">${a}<\u002Fbutton>`).join('')}<\u002Fdiv><\u002Fdiv>\n      <button class=\"logset tap\" style=\"margin-top:16px;background:var(--green);color:#06220F;box-shadow:0 18px 40px -16px rgba(74,222,128,.9)\" onclick=\"markSessionDone()\">Mark session done ✓<\u002Fbutton>\n      <div style=\"display:flex;gap:9px;margin-top:9px\">\n        <button class=\"ghostbtn\" style=\"flex:1\" onclick=\"shareCard()\">✦ Share card<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction statBox(v,l,c){return `<div class=\"card\" style=\"text-align:center;padding:14px 8px\"><div class=\"big\" style=\"font-size:22px;color:${c}\">${v}<\u002Fdiv><div class=\"mono\" style=\"font-size:9px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:4px\">${l}<\u002Fdiv><\u002Fdiv>`;}\nconst RCATS=[['Shoulders',['shoulder-front','shoulder-side','shoulder-rear']],['Chest',['chest']],['Core',['abs','obliques']],['Legs',['quad','hamstring','glute','calf']],['Arms',['bicep','tricep','forearm']],['Back',['lat','mid-back','trap']]];\nfunction radarHTML(logs){\n  const score=RCATS.map(()=>0);const priCount={},secCount={};\n  Object.keys(logs).forEach(id=>{\n    const m=musclesFor(id);const sets=Math.max(1,(logs[id]||[]).length);\n    m.p.forEach(mu=>{priCount[mu]=(priCount[mu]||0)+sets;RCATS.forEach((c,ci)=>{if(c[1].includes(mu))score[ci]+=sets*2;});});\n    m.s.forEach(mu=>{secCount[mu]=(secCount[mu]||0)+sets;RCATS.forEach((c,ci)=>{if(c[1].includes(mu))score[ci]+=sets;});});\n  });\n  const max=Math.max(1,...score);\n  const cx=90,cy=88,R=62;\n  const pt=(i,f)=>{const a=(-90+i*60)*Math.PI/180;return [cx+Math.cos(a)*R*f,cy+Math.sin(a)*R*f];};\n  let grid='';[1,.66,.33].forEach(r=>{const p=RCATS.map((_,i)=>pt(i,r).map(n=>n.toFixed(1)).join(',')).join(' ');grid+=`<polygon points=\"${p}\" fill=\"none\" stroke=\"var(--line2)\" stroke-width=\"1\"/>`;});\n  RCATS.forEach((_,i)=>{const[x,y]=pt(i,1);grid+=`<line x1=\"${cx}\" y1=\"${cy}\" x2=\"${x.toFixed(1)}\" y2=\"${y.toFixed(1)}\" stroke=\"var(--line)\" stroke-width=\"1\"/>`;});\n  const dpts=RCATS.map((_,i)=>pt(i,Math.max(.08,score[i]/max)).map(n=>n.toFixed(1)).join(',')).join(' ');\n  let dots='';RCATS.forEach((_,i)=>{if(score[i]>0){const[x,y]=pt(i,Math.max(.08,score[i]/max));dots+=`<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"2.6\" fill=\"var(--dawn)\"/>`;}});\n  let labs='';RCATS.forEach((c,i)=>{const[x,y]=pt(i,1.3);const anc=Math.abs(x-cx)<8?'middle':(x>cx?'start':'end');const on=score[i]>0;labs+=`<text x=\"${x.toFixed(1)}\" y=\"${(y+3).toFixed(1)}\" text-anchor=\"${anc}\" font-family=\"var(--fmono)\" font-size=\"8.5\" letter-spacing=\".06em\" fill=\"${on?'var(--text)':'var(--muted)'}\">${c[0]}<\u002Ftext>`;});\n  const topP=Object.keys(priCount).sort((a,b)=>priCount[b]-priCount[a])[0];\n  const topS=Object.keys(secCount).sort((a,b)=>secCount[b]-secCount[a])[0];\n  return `<div class=\"card\" style=\"margin-top:14px\">\n    <div style=\"display:flex;align-items:center;flex-wrap:wrap;gap:8px\">\n      <h3 style=\"font-size:18px\">Muscles worked<\u002Fh3>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:11px\">\n      <span class=\"mchip pri\"><span class=\"mdot\"><\u002Fspan>Primary${topP?' · '+(MLABEL[topP]||topP):''}<\u002Fspan>\n      ${`<span class=\"mchip sec\"><span class=\"mdot\"><\u002Fspan>Secondary · ${topS?(MLABEL[topS]||topS):'—'}<\u002Fspan>`}\n    <\u002Fdiv>\n    <svg viewBox=\"0 0 180 190\" style=\"width:100%;height:auto;margin-top:8px;overflow:visible\">${grid}<polygon points=\"${dpts}\" fill=\"rgba(255,122,60,.25)\" stroke=\"var(--dawn)\" stroke-width=\"2\" stroke-linejoin=\"round\"/>${dots}${labs}<\u002Fsvg>\n  <\u002Fdiv>`;\n}\nfunction markSessionDone(){\n  const note=(document.getElementById('sess-note')||{}).value||'';\n  const key=sessKey(RN.ph,RN.i);const t=isoToday();\n  (RN._pains||[]).forEach(area=>{DB.injuries.push({area,note:'during session',iso:t,d:dispDate(t)});});\n  if(DB.injuries.length>200)DB.injuries=DB.injuries.slice(-200);\n  DB.sess=DB.sess.filter(s=>!(s.k===key&&s.d===t&&(s.duration||0)===0)); // replace any placeholder\n  DB.sess.push({k:key,d:t,n:note.trim(),duration:RN.elapsed,staminaDone:!!RN._staminaDone,pains:RN._pains||[]});\n  if(DB.sess.length>300)DB.sess=DB.sess.slice(-300);\n  DB.activeSession=null;\n  saveDB();\n  stopRnTimer();stopRestTimer();\n  document.getElementById('runner').classList.remove('show');\n  RN=null;renderAll();go('home');\n}\nfunction togglePain(btn){const a=btn.dataset.pain;if(!RN._pains)RN._pains=[];const i=RN._pains.indexOf(a);if(i<0){RN._pains.push(a);btn.style.borderColor='var(--red)';btn.style.color='var(--red)';}else{RN._pains.splice(i,1);btn.style.borderColor='';btn.style.color='';}buzz();}\n/* ---- #18 shareable session card (canvas PNG) ---- */\nfunction shareCard(){\n  const dur=RN.elapsed;let sets=0;Object.keys(RN.logs).forEach(k=>sets+=RN.logs[k].length);\n  const lit=new Set();Object.keys(RN.logs).forEach(id=>{const m=musclesFor(id);m.p.forEach(x=>lit.add(x));m.s.forEach(x=>lit.add(x));});\n  const labels=MORDER.filter(x=>lit.has(x)).map(x=>MLABEL[x]).slice(0,6);\n  const W=1080,H=1350,c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');\n  const cs=getComputedStyle(document.body);\n  const ink=cs.getPropertyValue('--page').trim()||'#05070C';const dawn=cs.getPropertyValue('--dawn').trim()||'#FF7A3C';const gold=cs.getPropertyValue('--gold').trim()||'#FFC85C';const txt=cs.getPropertyValue('--text').trim()||'#EAF0F8';const muted=cs.getPropertyValue('--muted').trim()||'#8A97AC';\n  const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0A0F1A');g.addColorStop(1,ink);x.fillStyle=g;x.fillRect(0,0,W,H);\n  // glow\n  const rg=x.createRadialGradient(W,0,0,W,0,900);rg.addColorStop(0,'rgba(255,122,60,.28)');rg.addColorStop(1,'rgba(255,122,60,0)');x.fillStyle=rg;x.fillRect(0,0,W,H);\n  x.textBaseline='alphabetic';\n  x.fillStyle=dawn;x.font='700 34px \"JetBrains Mono\",monospace';x.fillText('APEX',80,130);\n  x.fillStyle=muted;x.font='500 26px \"JetBrains Mono\",monospace';x.fillText(datestamp(),80,178);\n  x.fillStyle=txt;x.font='700 150px \"Clash Display\",\"Space Grotesk\",sans-serif';\n  x.fillText((WNAME[RN.dayW]||'Session').toUpperCase(),76,360);\n  x.fillStyle=dawn;x.fillText('DAY',76,500);\n  // stats\n  const stat=(lx,val,lab,col)=>{x.fillStyle=col;x.font='700 92px \"Clash Display\",sans-serif';x.fillText(val,lx,720);x.fillStyle=muted;x.font='500 24px \"JetBrains Mono\",monospace';x.fillText(lab,lx,760);};\n  stat(80,hrsmin(dur),'WORKED',dawn);stat(430,String(sets),'SETS','#4ADE80');stat(680,String(RN.prs.length),'PRS 🏆',gold);\n  // muscles worked (dual figures)\n  drawFig(x,'front',lit,dawn,600,820,1.9);drawFig(x,'back',lit,dawn,830,820,1.9);\n  x.fillStyle=muted;x.font='500 26px \"JetBrains Mono\",monospace';\n  wrapText(x,labels.join(' · ').toLowerCase(),80,880,440,34);\n  // footer\n  x.fillStyle=gold;x.font='700 30px \"Clash Display\",sans-serif';x.fillText('Bodyweight '+(bwNow()||'—')+'kg → 75kg goal',80,1250);\n  x.fillStyle=muted;x.font='500 22px \"JetBrains Mono\",monospace';x.fillText('Phase '+RN.ph.slice(1)+' · '+PHASES[RN.ph].title,80,1290);\n  c.toBlob(bl=>{const url=URL.createObjectURL(bl);const a=document.createElement('a');a.href=url;a.download='apex-session-'+isoToday()+'.png';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),3000);buzz([120]);},'image/png');\n}\nfunction drawFig(ctx,view,lit,dawn,ox,oy,sc){\n  // reuse anatomy() svg → rasterize via path is heavy; draw simple filled blocks matching lit groups\n  const base='#2C3542';const on=id=>lit.has(id)?dawn:base;\n  ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);\n  const box=(mx,my,w,h,col)=>{ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(mx,my,w,h,4);ctx.fill();};\n  // head/torso neutral\n  box(-8,-6,16,16,base);\n  if(view==='front'){box(-20,14,40,10,(lit.has('shoulder-front')||lit.has('shoulder-side'))?dawn:base);box(-18,26,36,26,on('chest'));box(-15,54,30,26,on('abs'));box(-16,84,14,34,on('quad'));box(2,84,14,34,on('quad'));}\n  else{box(-20,14,40,12,(lit.has('shoulder-rear')||lit.has('trap'))?dawn:base);box(-18,28,36,28,lit.has('lat')||lit.has('mid-back')?dawn:base);box(-16,58,32,16,on('glute'));box(-16,76,14,32,on('hamstring'));box(2,76,14,32,on('hamstring'));}\n  ctx.restore();\n}\nfunction wrapText(ctx,text,x,y,maxW,lh){const words=text.split(' ');let line='',yy=y;words.forEach(w=>{const t=line+w+' ';if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,yy);line=w+' ';yy+=lh;}else line=t;});ctx.fillText(line,x,yy);}\n\n/* ---- end session confirm ---- */\nfunction confirmEnd(){\n  showModal('End session now?','Your logged sets are saved. You\\'ll jump to the summary.',()=>{\n    modalClose();\n    // commit current in-progress exercise partials as-is\n    RN.phase='summary';stopRnTimer();stopRestTimer();renderSummary();\n  },'End session');\n}\n\n/* ---- recovery flow (rest day) ---- */\nfunction renderRecovery(){\n  const ph=RN.ph;const list=recoveryList(ph);\n  const t=isoToday();const checks=DB.restDays.checklists[t]||{};\n  let rows='';\n  list.forEach((item,i)=>{\n    const on=!!checks[i];\n    rows+=`<div class=\"mealrow ${on?'done':''}\" onclick=\"toggleRecovery(${i})\" style=\"cursor:pointer;margin-bottom:8px\"><span class=\"cb\">✓<\u002Fspan><span style=\"flex:1\">${esc(item)}<\u002Fspan><\u002Fdiv>`;\n  });\n  document.getElementById('runner').innerHTML=`\n  <div class=\"rn-screen\">\n    <div class=\"rn-hd\">\n      <button class=\"rn-x tap\" onclick=\"exitRecovery()\">✕<\u002Fbutton>\n      <div class=\"rn-center\"><div class=\"ex\" style=\"color:var(--blue)\">RECOVERY · REST DAY<\u002Fdiv><\u002Fdiv>\n      <div style=\"width:38px\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rn-body\">\n      <h2 style=\"font-size:34px;text-transform:uppercase\">Recovery<br>protocol<\u002Fh2>\n      <div style=\"color:var(--muted);font-size:13px;margin-top:8px\">Phase ${ph.slice(1)} · ${PHASES[ph].title}. Tick what you complete — it builds your recovery streak.<\u002Fdiv>\n      <div style=\"margin-top:20px\">${rows}<\u002Fdiv>\n      <div class=\"card\" style=\"margin-top:8px\"><div class=\"mono\" style=\"font-size:11px;color:var(--muted)\">RECOVERY STREAK · <b style=\"color:var(--gold)\">${DB.restDays.streak} days<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"rn-foot\">\n      <button class=\"logset tap\" style=\"background:var(--blue);color:#0B1526;box-shadow:0 18px 40px -16px rgba(92,168,255,.9)\" onclick=\"finishRecovery()\">Done ✓<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction recoveryList(ph){\n  const t=isoToday();\n  if(DB.restDays.checklists['_items_'+ph])return DB.restDays.checklists['_items_'+ph];\n  return PHASES[ph].rest.slice();\n}\nfunction toggleRecovery(i){\n  const t=isoToday();if(!DB.restDays.checklists[t])DB.restDays.checklists[t]={};\n  DB.restDays.checklists[t][i]=!DB.restDays.checklists[t][i];buzz();saveDB(   return `\n  <div class=\"hd\">\n    <div><div class=\"eyebrow\" style=\"color:var(--dawn)\">Phase ${ph.slice(1)} · ${PHASES[ph].title}<\u002Fdiv><h1 style=\"font-size:26px;margin-top:8px\">Manage Plan<\u002Fh1><\u002Fdiv>\n    <button class=\"spill tap\" style=\"margin-left:auto;align-self:center\" onclick=\"planReset()\">Reset phase ↺<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"daychips\" style=\"margin-top:18px\">${chips}<\u002Fdiv>\n\n  <div class=\"divider\">Warm-up · dynamic<\u002Fdiv>\n  ${W[day.w].map(x=>`<div class=\"simplecard\">${x}<\u002Fdiv>`).join('')}\n\n  <div class=\"divider\">Main work<\u002Fdiv>\n  ${mains}\n  ${addForm}\n\n  <div class=\"divider\">Cool-down · static<\u002Fdiv>\n  ${C[day.c].map(x=>`<div class=\"simplecard\">${x}<\u002Fdiv>`).join('')}\n\n  <div class=\"divider\">Stamina add-on<\u002Fdiv>\n  ${stamRows||'<div class=\"mono\" style=\"font-size:11px;color:var(--muted)\">No add-ons yet.<\u002Fdiv>'}\n  <button class=\"addbtn\" style=\"margin-top:8px\" onclick=\"stamAdd('${ph}')\">+ Add stamina add-on<\u002Fbutton>\n\n  <button class=\"resetbtn\" onclick=\"planReset()\">Reset this phase to default<\u002Fbutton>\n  `;\n}\nfunction planExRow(e,ph,i){\n  const id=e[0],editing=_planEdit===id;\n  let row=`<div class=\"mpx\"><div class=\"mpx-row\"><span class=\"nm\">${esc(e[1])}<\u002Fspan><span class=\"sc\">${esc(e[2])}<\u002Fspan><button class=\"ic\" onclick=\"planEditToggle('${id}')\">✎<\u002Fbutton><button class=\"ic del\" onclick=\"planDel('${id}','${ph}',${i})\">🗑<\u002Fbutton><\u002Fdiv>`;\n  if(editing)row+=planForm(e,ph,i,false);\n  return row+'<\u002Fdiv>';\n}\nfunction planForm(e,ph,i,isNew){\n  const cfg=e[7]||{s:3,lo:8,hi:12},pfx=isNew?'af':'mf',sw=isNew?0:startW(e[0]);\n  const adv=_planAdv[isNew?'__new':e[0]]!==false && (isNew?_planAdv['__new']:_planAdv[e[0]]);\n  const key=isNew?'__new':e[0];\n  const advOn=!!_planAdv[key];\n  return `<div class=\"mpform\">\n    <div class=\"advtoggle\"><button class=\"${!advOn?'on':''}\" onclick=\"planAdv('${key}',false)\">Simple<\u002Fbutton><button class=\"${advOn?'on':''}\" onclick=\"planAdv('${key}',true)\">Advanced<\u002Fbutton><\u002Fdiv>\n    <div class=\"mpf2\"><div class=\"mpf\"><label>Start weight kg<\u002Flabel><input id=\"${pfx}-dw\" type=\"number\" inputmode=\"decimal\" value=\"${sw||0}\"><\u002Fdiv><div class=\"mpf\"><label>Rest sec<\u002Flabel><input id=\"${pfx}-rest\" type=\"number\" inputmode=\"numeric\" value=\"${e[3]||0}\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"mpf3\"><div class=\"mpf\"><label>Sets<\u002Flabel><input id=\"${pfx}-s\" type=\"number\" inputmode=\"numeric\" value=\"${cfg.s}\"><\u002Fdiv><div class=\"mpf\"><label>Rep low<\u002Flabel><input id=\"${pfx}-lo\" type=\"number\" inputmode=\"numeric\" value=\"${cfg.lo}\"><\u002Fdiv><div class=\"mpf\"><label>Rep high<\u002Flabel><input id=\"${pfx}-hi\" type=\"number\" inputmode=\"numeric\" value=\"${cfg.hi}\"><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:${advOn?'grid':'none'};gap:9px\">\n      <div class=\"mpf\"><label>Name<\u002Flabel><input id=\"${pfx}-name\" value=\"${esc(e[1])}\"><\u002Fdiv>\n      <div class=\"mpf\"><label>Scheme text<\u002Flabel><input id=\"${pfx}-scheme\" value=\"${esc(e[2])}\" placeholder=\"auto from sets × reps\"><\u002Fdiv>\n      <div class=\"mpf\"><label>Cue / notes<\u002Flabel><input id=\"${pfx}-cue\" value=\"${esc(e[4]||'')}\"><\u002Fdiv>\n      <div class=\"mpf\"><label>YouTube search<\u002Flabel><input id=\"${pfx}-yt\" value=\"${esc(e[5]||'')}\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mpf2\"><button class=\"cancelbtn\" onclick=\"${isNew?'planAddCancel()':`planEditToggle('${e[0]}')`}\">Cancel<\u002Fbutton><button class=\"savebtn\" onclick=\"${isNew?`planAddSave('${ph}',${i})`:`planEditSave('${e[0]}')`}\">Save<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction planAdv(key,on){_planAdv[key]=on;renderScreen('plan');}\nfunction planDay(i){planDayIdx=i;_planEdit=null;_planAdd=false;renderScreen('plan');}\nfunction planEditToggle(id){_planEdit=(_planEdit===id?null:id);_planAdd=false;renderScreen('plan');}\nfunction readPForm(pfx){\n  const g=k=>document.getElementById(pfx+'-'+k);const gv=k=>{const el=g(k);return el?el.value.trim():'';};\n  return {name:gv('name'),scheme:gv('scheme'),s:clampInt((g('s')||{}).value,1,10),lo:clampInt((g('lo')||{}).value,1,99),hi:clampInt((g('hi')||{}).value,1,99),rest:clampInt((g('rest')||{}).value,0,600),dw:clampNum((g('dw')||{}).value,0,500),cue:gv('cue'),yt:gv('yt')};\n}\nfunction planEditSave(id){const f=readPForm('mf');DB.plan[id]=Object.assign({},DB.plan[id],{name:f.name||undefined,scheme:f.scheme||undefined,s:f.s,lo:f.lo,hi:f.hi,rest:f.rest,cue:f.cue,yt:f.yt,dw:f.dw});_planEdit=null;saveDB();renderScreen('plan');}\nfunction planDel(id,ph,i){\n  if(DB.customEx&&DB.customEx[id]){const dk=dayKey(ph,i);if(DB.added[dk])DB.added[dk]=DB.added[dk].filter(x=>x!==id);delete DB.customEx[id];delete DB.plan[id];}\n  else DB.removed[id]=1;\n  _planEdit=null;saveDB();renderScreen('plan');\n}\nfunction planAddOpen(){_planAdd=true;_planEdit=null;_planAdv['__new']=false;renderScreen('plan');}\nfunction planAddCancel(){_planAdd=false;renderScreen('plan');}\nfunction planAddSave(ph,i){\n  const f=readPForm('af');const nm=f.name||'New exercise';\n  const id='cust_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);\n  const scheme=f.scheme||(f.s+' × '+(f.lo===f.hi?f.lo:f.lo+'–'+f.hi));\n  DB.customEx[id]=[id,nm,scheme,f.rest,f.cue,f.yt,'',{s:f.s,lo:f.lo,hi:f.hi}];\n  if(f.dw)DB.plan[id]={dw:f.dw};\n  const dk=dayKey(ph,i);if(!DB.added[dk])DB.added[dk]=[];DB.added[dk].push(id);\n  _planAdd=false;saveDB();renderScreen('plan');\n}\nfunction planReset(){\n  const ph=DB.phase;\n  showModal('Reset Phase '+ph.slice(1)+'?','Restores all default exercises, schemes and stamina add-ons for this phase. Your logged sets stay.',()=>{\n    const ids={};\n    PHASES[ph].days.forEach((d,i)=>{d.ex.forEach(e=>ids[e[0]]=1);const dk=dayKey(ph,i);(DB.added[dk]||[]).forEach(id=>ids[id]=1);d
