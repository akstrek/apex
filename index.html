<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#05070C">
<title>APEX — Overview OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --page:#05070C; --ink:#161616; --panel:rgba(255,255,255,.035); --panel-solid:#141D2D; --panel2:#101828;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.13);
  --text:#EAF0F8; --muted:#8A97AC; --dim:#6B7789;
  --dawn:#FF7A3C; --gold:#FFC85C; --green:#4ADE80; --blue:#5CA8FF; --red:#FF8C8C;
  --fdisp:'Space Grotesk','Clash Display',sans-serif;
  --fbody:'DM Sans','Satoshi',sans-serif;
  --fmono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.22,1,.36,1);
  --navh:98px; --rad:16px;
  --neon:#C24A6B;
  --mbase:#3B434F;
}
/* ---------- LIGHT MODE ---------- */
body.light{
  --page:#EDEFF3; --ink:#F8F8FF; --panel:rgba(0,0,0,.04); --panel-solid:#F8F8FF; --panel2:#F8F8FF;
  --line:rgba(0,0,0,.09); --line2:rgba(0,0,0,.15);
  --text:#2B2B23; --muted:#5A6675; --dim:#8A94A3;
  --gold:#C8901F; --green:#16A34A; --blue:#2563EB; --red:#B00020;
  --mbase:#C3CAD4;
}
body.light{
  background:radial-gradient(920px 560px at 100% -8%,rgba(255,122,60,.06),transparent 58%),radial-gradient(760px 520px at -12% 108%,rgba(37,99,235,.04),transparent 60%),var(--page);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--page);color-scheme:dark;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  background:radial-gradient(920px 560px at 100% -8%,rgba(255,122,60,.10),transparent 58%),radial-gradient(760px 520px at -12% 108%,rgba(92,168,255,.06),transparent 60%),var(--page);
  background-attachment:fixed;color:var(--text);font-family:var(--fbody);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100dvh;
  display:flex;justify-content:center;
}
button,input,textarea,select{font-family:inherit}
button{touch-action:manipulation;cursor:pointer}
a{color:var(--dawn);text-decoration:none}
a:hover{color:var(--gold)}
::-webkit-scrollbar{width:0;height:0}
h1,h2,h3,h4{font-family:var(--fdisp);font-weight:700;letter-spacing:-.02em;line-height:1}
.mono{font-family:var(--fmono)}
.eyebrow{font-family:var(--fmono);font-size:11.8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

/* ============ APP FRAME ============ */
#app{width:min(468px,100%);min-height:100dvh;position:relative;background:linear-gradient(180deg,rgba(255,255,255,.014),transparent 26%),var(--ink);
  border-left:1px solid var(--line);border-right:1px solid var(--line);overflow:hidden;display:flex;flex-direction:column}
#screens{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom))}
.screen{display:none;padding:24px 18px 30px;animation:fade .28s var(--ease) both}
.screen.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.6);opacity:0}55%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}50%{box-shadow:0 0 16px 1px rgba(74,222,128,.5)}}
@keyframes breathe{0%,100%{box-shadow:0 22px 58px -26px rgba(255,70,50,.85),inset 0 1px 0 rgba(255,255,255,.12)}50%{box-shadow:0 24px 72px -20px rgba(255,70,50,1),inset 0 1px 0 rgba(255,255,255,.12)}}
@keyframes haloPulse{0%,100%{opacity:.3}50%{opacity:.62}}
.tap{transition:transform .08s var(--ease),filter .15s,border-color .15s,background .15s}
.tap:active{transform:translateY(1px) scale(.99)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}

/* cards */
.card{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:var(--rad);padding:16px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 26px -20px rgba(0,0,0,.65)}
.card+.card,.stack>*+*{margin-top:12px}
.clabel{font-family:var(--fmono);font-size:11.8px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.big{font-family:var(--fdisp);font-weight:700;letter-spacing:-.02em}
.divider{display:flex;align-items:center;gap:9px;font-family:var(--fmono);font-size:12.4px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin:24px 2px 12px}
.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.divider.hasbtn::after{display:none}

/* ============ HEADER ============ */
.hd{display:flex;align-items:flex-start;gap:10px}
.hd .date{font-family:var(--fmono);font-size:11.8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.hd h1{font-size:28px;margin-top:6px}
.pillstack{margin-left:auto;display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.spill{font-family:var(--fmono);font-size:10.6px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:99px;padding:5px 10px;color:var(--muted);white-space:nowrap}
.spill b{color:var(--gold)}
.spill.rec{cursor:pointer}
.spill.rec.on{background:rgba(92,168,255,.14);border-color:rgba(92,168,255,.4);color:var(--blue)}

/* segmented */
.seg{display:flex;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:4px}
.seg button{flex:1;border:none;border-radius:9px;padding:9px;font-family:var(--fmono);font-size:13px;letter-spacing:.06em;text-transform:uppercase;background:transparent;color:var(--muted);font-weight:700}
.seg button.on.train{background:var(--dawn);color:#1A0E05}
.seg button.on.rest{background:var(--blue);color:#0B1526}

/* ============ HERO ============ */
.hero{position:relative;margin-top:14px;border-radius:20px;padding:20px 20px 22px;overflow:hidden;
  background:radial-gradient(140% 120% at 0% 0%,rgba(255,70,50,.26),transparent 55%),linear-gradient(180deg,rgba(255,122,60,.13),rgba(255,122,60,.045));
  border:1px solid rgba(255,122,60,.5);animation:breathe 2.6s ease-in-out infinite}
.hero.restday{background:radial-gradient(140% 120% at 0% 0%,rgba(92,168,255,.24),transparent 55%),linear-gradient(180deg,rgba(92,168,255,.12),rgba(92,168,255,.04));border-color:rgba(92,168,255,.45);animation:none;box-shadow:0 22px 58px -30px rgba(92,168,255,.7),inset 0 1px 0 rgba(255,255,255,.12)}
.hero .halo{position:absolute;inset:-40% -20% auto -20%;height:180px;background:radial-gradient(closest-side,rgba(255,122,60,.5),transparent);filter:blur(20px);animation:haloPulse 2s ease-in-out infinite;pointer-events:none}
.hero.restday .halo{background:radial-gradient(closest-side,rgba(92,168,255,.45),transparent)}
.hero .meta{font-family:var(--fmono);font-size:13.6px;color:var(--muted);position:relative}
.hero h2{font-size:38px;text-transform:uppercase;margin-top:4px;line-height:.98;position:relative}
.hero .sub{color:#C9D2E0;font-size:13.5px;margin-top:8px;max-width:340px;text-wrap:pretty;position:relative}
body.light .hero .sub{color:var(--text)}
.begin{display:block;width:100%;text-align:center;margin-top:16px;border:none;border-radius:14px;background:var(--dawn);color:#1A0E05;
  font-family:var(--fdisp);font-weight:700;font-size:17px;text-transform:uppercase;padding:16px;position:relative;box-shadow:0 16px 34px -16px rgba(255,122,60,.95)}
.hero.restday .begin{background:var(--blue);color:#0B1526;box-shadow:0 16px 34px -16px rgba(92,168,255,.9)}

/* ============ ARC ============ */
.arc{position:relative;padding:2px 6px}
.arc .line{position:absolute;top:16px;left:14%;right:14%;height:2px;background:rgba(255,255,255,.1)}
.arc .line .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--green),var(--dawn));border-radius:99px}
.arc .nodes{position:relative;display:flex}
.anode{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0}
.anode .dot{width:32px;height:32px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-family:var(--fmono);font-size:12px;font-weight:700;border:2px solid var(--line2);background:var(--panel2);color:var(--dim);transition:all .2s var(--ease)}
.anode .nl{font-family:var(--fmono);font-size:10.6px;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;text-align:center;line-height:1.3}
.anode .nl small{display:block;color:var(--dim);font-size:9.9px}
.anode.done .dot{background:var(--green);border-color:var(--green);color:#06220F}
.anode.active .dot{background:var(--dawn);border-color:var(--dawn);color:#1A0E05;box-shadow:0 0 15px rgba(255,122,60,.7);animation:haloPulse 2s ease-in-out infinite}
.anode.locked .dot{opacity:.55}
.anode.sel .nl{color:var(--dawn)}

/* progress bars */
.pbar{height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.pbar>span{display:block;height:100%;border-radius:99px}
.pbar .grn{background:linear-gradient(90deg,var(--green),#8BEFA9)}
.pbar .dwn{background:linear-gradient(90deg,var(--dawn),var(--gold))}
.pbar .blu{background:linear-gradient(90deg,var(--blue),#9AC8FF)}
/* ============ SEGMENTED BAR (bodyweight goal) ============ */
:root{--neogreen:#4BF07A}
.segbar{display:flex;align-items:stretch;gap:2px;width:100%;height:38px}
.segbar .sg{flex:1;border-radius:1.5px;background:rgba(255,255,255,.13)}
.segbar .sg.on{background:var(--neogreen);box-shadow:0 0 5px -1px rgba(75,240,122,.6)}
body.light .segbar .sg{background:rgba(0,0,0,.13)}
body.light .segbar .sg.on{background:var(--neogreen)}
.segwrap .grow{display:flex;align-items:center;gap:5px;font-family:var(--fmono);font-size:11.8px;color:var(--muted)}
.segwrap .grow b{color:var(--neogreen)}

/* meal chips / pips */
.chip{border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);font-family:var(--fmono);font-size:12.4px;border-radius:99px;padding:6px 10px}
.chip.on{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.45);color:var(--green)}
.wkpip{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;padding:0}
.wkpip .cell{width:100%;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(255,255,255,.03);border:1px solid var(--line2);color:var(--dim)}
.wkpip.on .cell{background:var(--green);border-color:var(--green);color:#06220F}
.wkpip .lb{font-family:var(--fmono);font-size:10px;letter-spacing:.05em;color:var(--dim)}

/* ring */
.ring-wrap{position:relative;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* engine card */
.expandable summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:10px}
.expandable summary::-webkit-details-marker{display:none}
.expandable summary::after{content:"+";font-family:var(--fmono);color:var(--muted);font-size:16px;margin-left:auto}
.expandable[open] summary::after{content:"–"}
.law{display:flex;gap:10px;font-size:12.5px;color:var(--muted);padding:7px 0;border-bottom:1px dashed var(--line);line-height:1.45}
.law:last-of-type{border-bottom:none}
.law b{color:var(--text)}
.law .n{font-family:var(--fmono);color:var(--dawn);font-weight:700;flex-shrink:0}

/* recovery banner */
.recbanner{display:flex;align-items:center;gap:11px;border-radius:14px;padding:13px 15px;font-size:12.5px;line-height:1.4;
  background:linear-gradient(180deg,rgba(92,168,255,.1),rgba(92,168,255,.02));border:1px solid rgba(92,168,255,.35);color:#C9D6EA}
.recbanner.due{background:linear-gradient(180deg,rgba(255,200,92,.09),rgba(255,200,92,.02));border-color:rgba(255,200,92,.4)}
.recbanner b{color:var(--blue)}
.recbanner.due b{color:var(--gold)}
.recbanner button{margin-left:auto;border:none;border-radius:9px;background:var(--blue);color:#0B1526;font-family:var(--fmono);font-size:11.8px;font-weight:700;padding:9px 12px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.recbanner.on button{background:rgba(255,255,255,.08);color:var(--blue)}

/* generic small button */
.linkbtn{width:100%;margin-top:12px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);font-family:var(--fmono);font-size:13px;letter-spacing:.05em;text-transform:uppercase;border-radius:11px;padding:11px}
.linkbtn:hover{border-color:var(--dawn);color:var(--dawn)}
.foundcard{cursor:pointer}

/* ============ BOTTOM NAV ============ */
#nav{position:fixed;left:50%;transform:translateX(-50%);width:min(436px,calc(100vw - 32px));bottom:calc(16px + env(safe-area-inset-bottom));height:66px;
  display:flex;background:linear-gradient(180deg,rgba(144,0,32,.34),rgba(30,10,16,.7));backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid rgba(144,0,32,.55);border-radius:24px;box-shadow:0 18px 44px -14px rgba(0,0,0,.72),0 0 22px -6px rgba(144,0,32,.4),inset 0 1px 0 rgba(255,194,214,.16);z-index:40}
#nav button{position:relative;flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#D9A94F;padding:8px 0;border-radius:20px;text-shadow:0 0 6px rgba(217,169,79,.35)}
#nav button.on::before{content:"";position:absolute;top:9px;width:30px;height:3px;border-radius:99px;background:var(--neon);box-shadow:0 0 12px var(--neon)}
#nav button svg{width:25.3px;height:25.3px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
#nav button .nlab{font-family:var(--fmono);font-size:11.7px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
#nav button.on{color:var(--dawn)}

/* ============ FUEL / PROGRESS shared ============ */
.calc-out{font-family:var(--fmono);font-size:13px;color:var(--gold);text-align:right;line-height:1.5}
.calc-out small{display:block;color:var(--muted);font-size:11.8px}
.dtseg{display:flex;gap:6px;margin-top:10px}
.dtseg button{flex:1;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);border-radius:9px;font-family:var(--fmono);font-size:11.8px;font-weight:700;padding:9px 4px;text-transform:uppercase;letter-spacing:.04em}
.dtseg button.on{background:var(--green);border-color:var(--green);color:#06220F}
.mealrow{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line2);border-radius:12px;background:rgba(255,255,255,.02);font-size:13px}
.mealrow.done{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.05)}
.mealrow .cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:12px}
.mealrow.done .cb{border-color:var(--green);background:var(--green);color:#06220F}
.mealrow .pv{margin-left:auto;font-family:var(--fmono);font-size:13px;color:var(--gold);white-space:nowrap}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-family:var(--fmono);font-size:10.6px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:7px 6px;border-bottom:1px solid var(--line2)}
td{padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:top}
td:first-child{color:var(--gold);font-family:var(--fmono);font-size:11.8px;white-space:nowrap}
td.up{color:var(--green);font-family:var(--fmono);font-size:11.8px}
.scrollx{overflow-x:auto;margin:0 -2px}
#mealchart{position:relative}
.scrollx table{min-width:600px}
.chart-expand{position:absolute;top:10px;right:10px;z-index:3;width:32px;height:32px;border-radius:9px;border:1px solid var(--line2);background:rgba(20,20,20,.72);backdrop-filter:blur(8px);color:var(--muted);display:flex;align-items:center;justify-content:center}
.chart-expand:hover{border-color:var(--dawn);color:var(--dawn)}
#mealchart.expanded{position:fixed;inset:14px;z-index:95;margin:0;max-width:none;overflow:auto;display:flex;flex-direction:column;box-shadow:0 30px 70px -20px rgba(0,0,0,.85);animation:fade .22s var(--ease) both}
#mealchart.expanded .chart-expand{position:sticky;float:right;top:0}
#mealchart.expanded table{min-width:0;width:100%}
#mealchart.expanded td,#mealchart.expanded th{white-space:normal}
#chart-scrim{position:fixed;inset:0;z-index:94;background:rgba(4,6,10,.7);backdrop-filter:blur(3px);display:none}
#chart-scrim.on{display:block;animation:fade .2s ease both}
.waterbtn{flex:1;border:1px solid var(--blue);background:rgba(92,168,255,.1);color:var(--blue);font-family:var(--fmono);font-size:13px;font-weight:700;border-radius:12px;padding:15px}
.barrow{display:flex;align-items:flex-end;gap:5px;height:120px}
.barrow .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end}
.barrow .bar .col{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--dawn),rgba(255,122,60,.35));min-height:3px;transition:height .4s var(--ease)}
.barrow .bar .bl{font-family:var(--fmono);font-size:9.4px;color:var(--dim)}
.hist{font-family:var(--fmono);font-size:12px;color:var(--muted);line-height:1.85}
.hist b{color:var(--text)}
.selin{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:10px;font-family:var(--fmono);font-size:12px;padding:11px}
.txtin{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;color:var(--text);font-family:var(--fmono);font-size:13px;padding:11px;outline:none;resize:vertical;min-height:64px}
.txtin:focus,.selin:focus{border-color:var(--dawn)}
.ghostbtn{border:1px solid var(--dawn);background:transparent;color:var(--dawn);border-radius:10px;font-family:var(--fmono);font-size:13px;font-weight:700;padding:11px 14px;text-transform:uppercase;letter-spacing:.04em}
.ghostbtn:hover{background:var(--dawn);color:#1A0E05}
.gate{display:flex;gap:11px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:12px 13px;font-size:12.5px;line-height:1.4}
.gate.met{border-color:rgba(74,222,128,.45);background:rgba(74,222,128,.06)}
.gate .cb{width:18px;height:18px;border-radius:6px;border:2px solid var(--line2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px}
.gate.met .cb{border-color:var(--green);background:var(--green);color:#06220F}
.gate .autotag{margin-left:auto;font-family:var(--fmono);font-size:9.4px;letter-spacing:.06em;color:var(--blue);border:1px solid rgba(92,168,255,.5);border-radius:99px;padding:2px 7px;white-space:nowrap;align-self:center}
.gate .hint{display:block;font-family:var(--fmono);font-size:11.2px;color:var(--dim);margin-top:3px}
.advbtn{width:100%;margin-top:12px;border:none;border-radius:12px;background:var(--dawn);color:#1A0E05;font-family:var(--fmono);font-size:13px;font-weight:700;letter-spacing:.04em;padding:15px;text-transform:uppercase}
.advbtn:disabled{background:var(--panel2);color:var(--muted);border:1px solid var(--line2)}

/* PLAN editor */
.daychips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 4px}
.daychips button{flex-shrink:0;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);font-family:var(--fmono);font-size:13px;font-weight:700;padding:9px 14px;border-radius:99px;letter-spacing:.05em}
.daychips button.on{background:var(--dawn);border-color:var(--dawn);color:#1A0E05}
.mpx{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:12px 13px;margin-bottom:8px}
.mpx-row{display:flex;align-items:center;gap:9px}
.mpx-row .nm{font-weight:600;font-size:13.5px;min-width:0}
.mpx-row .sc{font-family:var(--fmono);font-size:13px;color:var(--gold);margin-left:auto;white-space:nowrap}
.ic{border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--muted);width:32px;height:32px;flex-shrink:0;border-radius:9px;font-size:14px}
.ic:hover{border-color:var(--dawn);color:var(--dawn)}
.ic.del:hover{border-color:var(--red);color:var(--red)}
.addbtn{width:100%;border:1px dashed var(--line2);background:none;color:var(--dawn);font-family:var(--fmono);font-size:13px;letter-spacing:.05em;text-transform:uppercase;border-radius:12px;padding:11px}
.addbtn:hover{border-color:var(--dawn);background:rgba(255,122,60,.06)}
.mpform{margin-top:10px;padding-top:11px;border-top:1px dashed var(--line2);display:grid;gap:9px}
.mpf{display:flex;flex-direction:column;gap:4px}
.mpf label{font-family:var(--fmono);font-size:10.6px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.mpf input,.mpf textarea{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;color:var(--text);font-size:14px;padding:10px 11px;outline:none;width:100%}
.mpf input:focus,.mpf textarea:focus{border-color:var(--dawn)}
.mpf3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mpf2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.advtoggle{display:flex;gap:6px;margin-bottom:2px}
.advtoggle button{flex:1;border:1px solid var(--line2);background:var(--panel2);color:var(--muted);font-family:var(--fmono);font-size:11.8px;padding:8px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.advtoggle button.on{background:var(--dawn);border-color:var(--dawn);color:#1A0E05;font-weight:700}
.savebtn{border:none;border-radius:10px;background:var(--dawn);color:#1A0E05;font-family:var(--fmono);font-weight:700;font-size:12px;padding:12px;text-transform:uppercase;letter-spacing:.04em}
.cancelbtn{border:1px solid var(--line2);background:none;color:var(--muted);font-family:var(--fmono);font-size:12px;padding:12px;border-radius:10px;text-transform:uppercase}
.resetbtn{width:100%;margin-top:20px;background:none;border:1px solid var(--line2);color:var(--muted);font-family:var(--fmono);font-size:13px;padding:13px;border-radius:11px;letter-spacing:.06em;text-transform:uppercase}
.resetbtn:hover{border-color:var(--red);color:var(--red)}
.simplecard{background:var(--panel2);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:10px 13px;font-size:12.5px;color:var(--muted);margin-bottom:7px;line-height:1.45}
.simplecard b{color:var(--text)}
#s-plan .simplecard,#s-plan .mpx{background:#008BCE}
#s-plan .simplecard,#s-plan .simplecard b,#s-plan .mpx,#s-plan .mpx .nm,#s-plan .mpx .sc,#s-plan .mpx .ic{color:#fff}
#s-plan .mpx svg{stroke:#fff}
#s-plan .simplecard{font-size:14.4px}
#s-plan .mpx-row .nm{font-size:15.5px}
#s-plan .mpx-row .sc{font-size:12.6px}
#s-plan .mpx .ic{font-size:16px;border-color:rgba(255,255,255,.5)}
body.light #s-plan .simplecard,body.light #s-plan .mpx{background:#D50000}
body.light #s-plan .simplecard,body.light #s-plan .simplecard b,body.light #s-plan .mpx,body.light #s-plan .mpx .nm,body.light #s-plan .mpx .sc,body.light #s-plan .mpx .ic{color:#000}
body.light #s-plan .mpx svg{stroke:#000}
body.light #s-plan .mpx .ic{border-color:rgba(0,0,0,.4)}

/* ============ FOCUS RUNNER ============ */
#runner{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:min(468px,100%);height:100dvh;z-index:60;display:none;flex-direction:column;background:linear-gradient(180deg,rgba(255,255,255,.014),transparent 26%),var(--ink)}
#runner.show{display:flex}
.rn-screen{flex:1;display:flex;flex-direction:column;min-height:0;animation:fade .25s var(--ease) both}
.rn-hd{display:flex;align-items:center;gap:12px;padding:16px 18px 10px}
.rn-x{width:38px;height:38px;border-radius:11px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);font-size:16px}
.rn-time{font-family:var(--fmono);font-size:15px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;min-width:56px}
.rn-center{text-align:center;flex:1}
.rn-center .ex{font-family:var(--fmono);font-size:12px;letter-spacing:.14em;color:var(--dawn);font-weight:700}
.rn-center .ex b{color:var(--text)}
.rn-center .mg{font-family:var(--fmono);font-size:10.6px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-top:2px}
.rn-prog{height:3px;background:rgba(255,255,255,.06);margin:0 18px;border-radius:99px;overflow:hidden}
.rn-prog>span{display:block;height:100%;background:linear-gradient(90deg,var(--dawn),var(--gold));border-radius:99px;transition:width .3s var(--ease)}
.rn-body{flex:1;display:flex;flex-direction:column;padding:18px 18px 0;min-height:0;overflow-y:auto}
.rn-body.ex-body{padding-top:8px;padding-bottom:6px;flex:0 0 auto;overflow:visible}
.rn-screen.ex-screen{overflow-y:auto}
.rn-foot{padding:14px 18px calc(16px + env(safe-area-inset-bottom))}
.logset{width:100%;border:none;border-radius:16px;background:var(--dawn);color:#1A0E05;font-family:var(--fdisp);font-weight:700;font-size:19px;text-transform:uppercase;padding:18px;box-shadow:0 18px 40px -16px rgba(255,122,60,.95)}
.logset.flash{background:var(--green);color:#06220F}
.endbtn{width:100%;margin-top:9px;border:1px solid rgba(255,140,140,.4);background:rgba(255,140,140,.06);color:var(--red);font-family:var(--fmono);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:12px;padding:12px;animation:redpulse 2.4s ease-in-out infinite}
@keyframes redpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,140,140,0)}50%{box-shadow:0 0 14px -2px rgba(255,140,140,.5)}}
.subcap{text-align:center;font-family:var(--fmono);font-size:11.8px;letter-spacing:.05em;color:var(--muted);margin-top:9px}
/* stepper */
.stepgrid{display:grid;gap:12px;margin-top:6px}
.stepgrid.two{grid-template-columns:1fr 1fr}
.stepgrid.one{grid-template-columns:1fr}
.stepcard{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:13px 10px}
.stepcard .sl{font-family:var(--fmono);font-size:12.4px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:center}
.stepctl{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:9px}
.stepbtn{width:52px;height:52px;flex-shrink:0;border-radius:14px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);font-size:26px;line-height:1}
.stepbtn.up{border-color:rgba(255,122,60,.4);background:rgba(255,122,60,.12);color:var(--dawn)}
.stepbtn:active{transform:scale(.9)}
.stepval{flex:1;font-family:var(--fdisp);font-weight:700;font-size:38px;font-variant-numeric:tabular-nums;text-align:center;letter-spacing:-.02em}
.steptabs{display:flex;gap:5px;justify-content:center;margin-bottom:9px;flex-wrap:wrap}
.steptabs button{border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);font-family:var(--fmono);font-size:12px;border-radius:9px;padding:6px 12px}
.steptabs button.on{background:rgba(255,122,60,.14);border-color:rgba(255,122,60,.4);color:var(--dawn);font-weight:700}
.setpips{display:flex;gap:5px}
.setpip{min-width:34px;height:34px;padding:0 7px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--fmono);font-size:12px;font-weight:700;background:rgba(255,255,255,.05);color:var(--muted);border:none;cursor:pointer}
.setpip.active{background:var(--dawn);color:#1A0E05;box-shadow:0 0 12px -2px rgba(255,122,60,.7)}
.setpip.done{background:var(--green);color:#06220F}
.platebox{background:rgba(255,200,92,.06);border:1px solid rgba(255,200,92,.28);border-radius:12px;padding:11px 13px;margin-bottom:12px}
.platebox .pl-h{font-family:var(--fmono);font-size:11.8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);display:flex;gap:8px}
.platebox .pl-h span{margin-left:auto;color:var(--muted)}
.platebox .pl-b{font-size:13px;color:var(--text);margin-top:7px;line-height:1.5}
.platebox .pl-b b{color:var(--gold)}
.platebox .pl-n{font-family:var(--fmono);font-size:11.2px;color:var(--dim);margin-top:7px;line-height:1.5}
.swap-opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:13px 14px;color:var(--text);font-size:14px;font-weight:600}
.swap-opt:hover{border-color:var(--dawn)}
.swap-opt span:first-child{flex:1;min-width:0}
.nudge{background:linear-gradient(180deg,rgba(74,222,128,.1),rgba(74,222,128,.03));border:1px solid rgba(74,222,128,.4);border-radius:13px;padding:13px 15px;margin-bottom:4px}
.nudge-h{font-family:var(--fmono);font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--green);text-transform:uppercase}
.nudge-b{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.nudge-b b{color:var(--text)}
.formbox{margin-top:11px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-left:3px solid var(--dawn);border-radius:0 12px 12px 0;padding:11px 13px}
.formbox-h{font-family:var(--fmono);font-size:11.8px;letter-spacing:.12em;text-transform:uppercase;color:var(--dawn);font-weight:700}
.formbox-b{font-size:13px;color:var(--muted);line-height:1.55;margin-top:6px;text-wrap:pretty}
.cardio-add{border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--text);font-family:var(--fmono);font-size:13px;border-radius:99px;padding:9px 13px;min-height:38px}
.cardio-add:hover{border-color:var(--blue);color:var(--blue)}
.cardio-row{display:flex;align-items:center;gap:8px;font-size:12.5px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
.pr-row{display:flex;align-items:center;gap:11px;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:10px 13px}
.pr-medal{font-size:19px;flex-shrink:0}
.pr-w{margin-left:auto;color:var(--gold);font-size:12px;font-weight:700;white-space:nowrap}
.empty{text-align:center;padding:26px 18px}
.empty-i{font-size:34px}
.empty-t{font-family:var(--fdisp);font-weight:700;font-size:17px;margin-top:8px}
.empty-b{color:var(--muted);font-size:12.5px;margin-top:6px;line-height:1.5;max-width:280px;margin-left:auto;margin-right:auto}
.cal-nav{width:38px;height:38px;border-radius:10px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--text);font-size:18px}
.cal-nav:disabled{opacity:.35;pointer-events:none}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-h{font-family:var(--fmono);font-size:10.6px;color:var(--dim);text-align:center;padding-bottom:2px}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;font-family:var(--fmono);font-size:13px;color:var(--muted);border-radius:8px;background:rgba(255,255,255,.03)}
.cal-d.trained{background:var(--green);color:#06220F;font-weight:700}
.cal-d.today{box-shadow:inset 0 0 0 2px var(--dawn)}
.cal-dot{position:absolute;bottom:4px;width:5px;height:5px;border-radius:99px;background:var(--blue)}
.cal-key{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:3px}
.cal-key.trained{background:var(--green)}
.cal-key.dot{background:var(--blue);border-radius:99px}
/* rest ring overlay inside runner */
.rn-rest{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 22px;text-align:center}
.rn-rest .rov-ring{position:relative;width:min(66vw,260px);height:min(66vw,260px)}
.rn-rest .rov-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.rn-rest .rov-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fdisp);font-weight:700;font-size:clamp(48px,15vw,64px);font-variant-numeric:tabular-nums}
/* ===== unified timer (holds / rest / between-exercise) ===== */
#runner .tmr{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 22px;background:#000}
.tmr-label{font-family:var(--fmono);font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:22px;min-height:15px}
.tmr-ring{position:relative;width:min(74vw,300px);height:min(74vw,300px)}
.tmr-ring svg{width:100%;height:100%;transform:rotate(-90deg);display:block}
.tmr-ring .track{fill:none;stroke:rgba(255,255,255,.13);stroke-width:5}
.tmr-ring .prog{fill:none;stroke:var(--dawn);stroke-width:5.5;stroke-linecap:round;filter:drop-shadow(0 0 9px rgba(255,122,60,.55));transition:stroke-dashoffset .28s linear}
.tmr-ring.paused .prog{stroke:var(--muted);filter:none}
.tmr-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.tmr-big{font-family:var(--fdisp);font-weight:700;font-size:clamp(52px,17vw,74px);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em;color:var(--text)}
.tmr-ring.paused .tmr-big{color:var(--muted)}
.tmr-fin{display:flex;align-items:center;gap:7px;font-family:var(--fmono);font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums}
.tmr-fin svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.tmr-set{position:absolute;top:19%;left:0;right:0;text-align:center;font-family:var(--fmono);font-size:13px;color:var(--muted)}
.tmr-edit{position:absolute;bottom:16%;left:50%;transform:translateX(-50%);background:none;border:none;color:var(--dim);font-family:var(--fmono);font-size:13px;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:5px;padding:6px}
.tmr-edit svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.tmr-btns{display:flex;gap:12px;width:100%;margin-top:34px;padding:0 4px}
.tmr-btns button{flex:1;border:none;border-radius:99px;font-family:var(--fdisp);font-weight:700;font-size:19px;padding:19px;min-height:60px}
.tmr-skip{background:var(--bg-hover,#1E1E1E);background:rgba(255,255,255,.08);color:var(--text)}
.tmr-primary{background:var(--dawn);color:#1A0E05}
.tmr-primary.resume{background:var(--dawn);color:#1A0E05}
/* scroll-wheel picker */
.wheel-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 20px;background:#000}
.wheel{display:flex;align-items:center;justify-content:center;gap:2px;position:relative;width:100%}
.wheel-band{position:absolute;left:0;right:0;top:50%;height:70px;transform:translateY(-50%);border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);pointer-events:none}
.wheel-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.wheel-hd{font-family:var(--fbody);font-size:15px;color:var(--muted);margin-bottom:6px}
.wheel-list{height:210px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-ms-overflow-style:none;width:100%;padding:70px 0;-webkit-overflow-scrolling:touch}
.wheel-list::-webkit-scrollbar{display:none}
.wheel-cell{height:70px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-family:var(--fdisp);font-weight:700;font-size:56px;color:rgba(255,255,255,.16);font-variant-numeric:tabular-nums;transition:color .15s,transform .15s}
body.light .wheel-cell{color:rgba(0,0,0,.18)}
.wheel-cell.mid{color:var(--text);transform:scale(1.02)}
.wheel-colon{font-family:var(--fdisp);font-weight:700;font-size:44px;color:var(--text);flex:0 0 auto;padding:0 2px}
.wheel-preview{font-family:var(--fmono);font-size:13px;color:var(--muted);margin:22px 0 4px}
.wheel-start{width:min(320px,90%);border:none;border-radius:99px;background:var(--dawn);color:#1A0E05;font-family:var(--fdisp);font-weight:700;font-size:20px;padding:18px;margin-top:6px}
/* muscle map summary */
.msmap{display:flex;gap:16px;justify-content:center;align-items:center;margin:8px 0}
/* warm-up / cool-down expandable cards */
.wc-card{flex-shrink:0;background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s var(--ease)}
.wc-card.open{border-color:var(--dawn)}
.wc-head{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer}
.wc-head .nm{font-weight:600;font-size:14px;min-width:0}
.wc-head .rp{font-family:var(--fmono);font-size:13px;color:var(--gold);margin-left:auto;white-space:nowrap}
.wc-head .cv{width:22px;height:22px;flex-shrink:0;border-radius:99px;border:1px solid var(--line2);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .3s var(--ease),color .2s}
.wc-card.open .wc-head .cv{transform:rotate(180deg);color:var(--dawn)}
.wc-info{display:grid;grid-template-rows:0fr;transition:grid-template-rows .32s var(--ease)}
.wc-card.open .wc-info{grid-template-rows:1fr}
.wc-info>div{overflow:hidden;min-height:0}
.wc-inner{padding:0 14px 13px;font-size:12.5px;color:var(--muted);line-height:1.5}
.wc-inner .rampline{font-family:var(--fmono);font-size:12.4px;color:var(--dim);border-top:1px dashed var(--line2);padding-top:9px;margin-top:9px}
.wc-yt{display:inline-flex;align-items:center;gap:7px;margin-top:11px;font-family:var(--fmono);font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--dawn);border:1px solid rgba(255,122,60,.4);background:rgba(255,122,60,.08);border-radius:99px;padding:8px 13px}
.wc-yt:hover{background:var(--dawn);color:#1a0e05}
.msmap svg{height:200px;width:auto}

/* toast / logged flash */
#flash{position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(6,9,14,.72);backdrop-filter:blur(3px)}
#flash.show{display:flex;animation:fade .2s ease both}
#flash .inner{font-family:var(--fdisp);font-weight:700;font-size:34px;color:var(--green);text-transform:uppercase;animation:pop .4s var(--ease) both;text-align:center}
#flash .pr{display:block;font-family:var(--fmono);font-size:14px;color:var(--gold);margin-top:8px;letter-spacing:.1em}

/* ============ BODYWEIGHT OVERLAY ============ */
#bwov{position:absolute;inset:0;z-index:70;display:none}
#bwov.show{display:block}
#bwov .scrim{position:absolute;inset:0;background:rgba(6,9,14,.7);backdrop-filter:blur(4px)}
#bwov .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--panel-solid);border-top:1px solid var(--line2);border-radius:22px 22px 0 0;padding:24px 22px calc(24px + env(safe-area-inset-bottom));animation:slideup .3s var(--ease) both}
#bwov.full .sheet{top:0;bottom:auto;height:100%;border-radius:0;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(180deg,rgba(255,122,60,.06),transparent 30%),var(--ink)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
#bwov h3{font-size:26px;text-transform:uppercase}
.bwin{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:14px;color:var(--text);font-family:var(--fdisp);font-weight:700;font-size:40px;text-align:center;padding:16px;outline:none;margin:16px 0}
.bwin:focus{border-color:var(--dawn)}
.skiplink{display:inline-block;margin-top:14px;font-family:var(--fmono);font-size:13px;color:var(--muted);text-decoration:underline;background:none;border:none}

/* modal confirm */
#modal{position:absolute;inset:0;z-index:75;display:none;align-items:center;justify-content:center;padding:24px}
#modal.show{display:flex}
#modal .scrim{position:absolute;inset:0;background:rgba(6,9,14,.72);backdrop-filter:blur(4px)}
#modal .box{position:relative;background:var(--panel-solid);border:1px solid var(--line2);border-radius:18px;padding:22px;max-width:340px;width:100%;animation:pop .3s var(--ease) both}
#modal h4{font-size:20px;text-transform:uppercase}
#modal p{color:var(--muted);font-size:13px;margin-top:8px}
#modal .row{display:flex;gap:9px;margin-top:18px}

/* tooltip */
#tip{position:absolute;z-index:78;max-width:260px;background:var(--panel-solid);border:1px solid var(--line2);border-radius:12px;padding:12px 14px;font-size:12px;color:#C9D2E0;line-height:1.5;box-shadow:0 18px 40px -18px #000;display:none}
#tip.show{display:block;animation:fade .18s ease both}

/* ============ ONBOARDING ============ */
#onboard{position:absolute;inset:0;z-index:90;display:none}

.ob-step{font-family:var(--fmono);font-size:13px;letter-spacing:.2em;color:var(--dawn);text-transform:uppercase}

.ob-foot{padding:6px 28px calc(24px + env(safe-area-inset-bottom))}
.ob-in{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:14px;color:var(--text);font-family:var(--fdisp);font-weight:700;font-size:34px;text-align:center;padding:16px;outline:none;margin-top:20px}
.ob-in:focus{border-color:var(--dawn)}
.ob-phase{display:flex;flex-direction:column;gap:9px;margin-top:20px}
.ob-phase button{text-align:left;border:1px solid var(--line2);background:var(--panel2);border-radius:13px;padding:14px 16px;color:var(--text)}
.ob-phase button.on{border-color:var(--dawn);background:rgba(255,122,60,.08)}
.ob-phase button .pt{font-family:var(--fdisp);font-weight:700;font-size:16px}
.ob-phase button .pd{font-size:12px;color:var(--muted);margin-top:3px}

.saved{color:var(--green);font-family:var(--fmono);font-size:13px}

.wxcond{font-size:11.2px!important}
.themetgl{width:38px;height:38px;flex-shrink:0;border-radius:11px;border:1px solid var(--line2);background:var(--panel);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--dawn);display:flex;align-items:center;justify-content:center;transition:transform .15s var(--ease),border-color .2s}

.mband{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
.mband-side{display:flex;flex-direction:column;align-items:center;gap:12px}

function isoToday(){return new Date().toISOString().slice(0,10);}
function todayStr(){return new Date().toDateString();}
function dispDate(iso){try{return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short'});}catch(e){return iso;}}
function shortDay(iso){try{return new Date(iso).toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();}catch(e){return '';}}
function fmt(s){s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function hrsmin(sec){const m=Math.round(sec/60);const h=Math.floor(m/60);return h>0?(h+'h '+String(m%60).padStart(2,'0')+'m'):(m+'m');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stripTags(s){return String(s==null?'':s).replace(/<[^>]*>/g,'');}
function clampInt(v,mn,mx){v=parseInt(v,10);if(isNaN(v))v=mn;return Math.max(mn,Math.min(mx,v));}
function clampNum(v,mn,mx){v=parseFloat(v);if(isNaN(v))v=mn;return Math.max(mn,Math.min(mx,Math.round(v*100)/100));}
function buzz(pattern){if(DB.settings.haptics!==false&&navigator.vibrate)navigator.vibrate(pattern||16);}
function beep(){
  if(DB.settings.haptics===false)return;
  buzz([250,120,250]);
  try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.13;o.start();
  o.frequency.setValueAtTime(660,a.currentTime+.18);o.stop(a.currentTime+.4);}catch(e){}
  restNotify();
}
function restNotify(){
  // fires only when the app is backgrounded, so you hear it mid-set with the phone down
  try{if(document.visibilityState==='visible')return;if(!('Notification'in window)||Notification.permission!=='granted')return;
    const ex=(RN&&RN.exs&&RN.exs[RN.exIdx])?RN.exs[RN.exIdx].name:'';
    const n=new Notification('Rest done — next set',{body:ex?('Back to '+ex):'Tap to continue your session',tag:'apex-rest',silent:false});
    setTimeout(()=>{try{n.close();}catch(e){}},8000);
  }catch(e){}
}
function askNotify(){try{if('Notification'in window&&Notification.permission==='default')Notification.requestPermission().catch(()=>{});}catch(e){}}

const actIdx=()=>ORDER.indexOf(DB.phase);
function weekOf(ph){if(!DB.start[ph])return 0;return Math.floor((Date.now()-new Date(DB.start[ph]).getTime())/604800000)+1;}
function startPhase(ph){DB.start[ph]=isoToday();saveDB();renderAll();}
function bwNow(){return DB.bw.length?DB.bw[DB.bw.length-1].w:0;}
function gateMet(ph,i){if(i===0)return bwNow()>=BWGATE[ph];return !!DB.gates[ph][i];}
function gateToggle(ph,i){DB.gates[ph][i]=DB.gates[ph][i]?0:1;saveDB();renderScreen('progress');}
function allMet(ph){return PHASES[ph].exit.every((_,i)=>gateMet(ph,i));}
function advance(ph){
  if(!allMet(ph))return;
  DB.advanced[ph]=isoToday();
  const nxt=ORDER[ORDER.indexOf(ph)+1];
  if(nxt){DB.phase=nxt;DB.start[nxt]=DB.start[nxt]||isoToday();}
  selPhase=actIdx();saveDB();renderAll();
}
const recoveryDue=()=>{const wk=weekOf(DB.phase);return !DB.deload && wk>=6;};
function toggleDeload(){DB.deload=!DB.deload;DB.deloadStart=DB.deload?isoToday():'';saveDB();renderAll();}
function deloadAutoClear(){if(DB.deload&&DB.deloadStart){const days=Math.floor((Date.now()-new Date(DB.deloadStart).getTime())/86400000);if(days>=7){DB.deload=false;DB.deloadStart='';}}}

/* ---------- exercise resolver ---------- */
function cfgOf(e){return e[7]||{s:3,lo:8,hi:12};}
const BASE_IDX={};
(function(){for(const p of Object.values(PHASES))for(const d of p.days)for(const e of d.ex)BASE_IDX[e[0]]=e;})();
function rawDef(id){return BASE_IDX[id]||((DB.customEx&&DB.customEx[id])?DB.customEx[id]:null);}
function exDef(id){
  const base=rawDef(id);if(!base)return null;
  const o=(DB.plan&&DB.plan[id])||null;if(!o)return base;
  const cfg=Object.assign({},base[7]||{s:3,lo:8,hi:12});
  if(o.s!=null)cfg.s=o.s;if(o.lo!=null)cfg.lo=o.lo;if(o.hi!=null)cfg.hi=o.hi;
  return [base[0],o.name??base[1],o.scheme??base[2],o.rest??base[3],o.cue??base[4],o.yt??base[5],base[6],cfg];
}
function dayKey(ph,i){return ph+'-'+i;}
function baseExArr(ph,i){return (PHASES[ph]&&PHASES[ph].days[i])?PHASES[ph].days[i].ex:[];}
function effExList(ph,i){
  const removed=DB.removed||{};const out=[];
  baseExArr(ph,i).forEach(e=>{if(!removed[e[0]])out.push(exDef(e[0]));});
  const add=(DB.added&&DB.added[dayKey(ph,i)])||[];
  add.forEach(id=>{if(!removed[id]){const e=exDef(id);if(e)out.push(e);}});
  return out;
}
function startW(id){if(DB.plan&&DB.plan[id]&&DB.plan[id].dw!=null)return DB.plan[id].dw;return SEED[id]||0;}
function findCfg(id){const e=exDef(id);return e?cfgOf(e):null;}
function dlSets(s){return Math.max(1,Math.round(s*0.6));}
function setsOf(cfg){return DB.deload?dlSets(cfg.s):cfg.s;}
function weightStepFor(id){const cfg=findCfg(id);const def=(cfg&&(cfg.lo<=8))?2.5:1.25;return DB.settings.weightStep[id]||def;}

function sessKey(ph,i){return ph+'-'+i;}
function doneToday(ph,i){const t=isoToday();return DB.sess.some(s=>s.k===sessKey(ph,i)&&s.d===t);}
function weekCount(){const now=Date.now();return DB.sess.filter(s=>now-new Date(s.d).getTime()<604800000).length;}
function weekSessDays(){
  // returns array over Tue..Sat: done boolean
  const now=new Date();const out=[false,false,false,false,false];
  DB.sess.forEach(s=>{const d=new Date(s.d);if(now-d.getTime()<604800000){const dow=d.getDay();if(dow>=2&&dow<=6)out[dow-2]=true;}});
  return out;
}
function weekWorkedSec(){const now=Date.now();return DB.sess.filter(s=>now-new Date(s.d).getTime()<604800000).reduce((a,s)=>a+(s.duration||0),0);}
function staminaWeek(){
  // planned stamina this phase per training week vs done (sessions + ad-hoc cardio)
  const now=Date.now();let done=0;
  DB.sess.forEach(s=>{if(now-new Date(s.d).getTime()<604800000 && s.staminaDone)done++;});
  done+=cardioWeek();
  const planned=staminaList(DB.phase).length||2;
  return {done,planned:Math.max(planned,done)};
}
function cardioWeek(){const now=Date.now();return DB.cardio.filter(c=>now-new Date(c.iso).getTime()<604800000).length;}
function footballWeek(){const now=Date.now();return DB.cardio.filter(c=>c.type==='football'&&now-new Date(c.iso).getTime()<604800000).length;}
function logCardio(type,mins,note){DB.cardio.push({type,mins:mins||0,note:note||'',iso:isoToday(),d:dispDate(isoToday())});if(DB.cardio.length>400)DB.cardio=DB.cardio.slice(-400);buzz([90]);saveDB();}
function delCardio(iso,idx){let c=0;DB.cardio=DB.cardio.filter(x=>{if(x.iso===iso){if(c===idx){c++;return false;}c++;}return true;});saveDB();}
function weeklyWorked(nWeeks){
  const out=[];const now=new Date();
  for(let w=nWeeks-1;w>=0;w--){
    const end=now.getTime()-w*604800000;const start=end-604800000;
    let sec=0;DB.sess.forEach(s=>{const t=new Date(s.d).getTime();if(t>=start&&t<end)sec+=(s.duration||0);});
    out.push(sec);
  }
  return out;
}
function monthWorked(offset){
  const now=new Date();const m=now.getMonth()-offset,y=now.getFullYear();
  const d=new Date(y,m,1);const mm=d.getMonth(),yy=d.getFullYear();
  let sec=0;DB.sess.forEach(s=>{const t=new Date(s.d);if(t.getMonth()===mm&&t.getFullYear()===yy)sec+=(s.duration||0);});
  return sec;
}

function readyToProgress(list){
  const out=[];list.forEach(ex=>{const cfg=ex.cfg;if(cfg.hi>=99||cfg.m==='b'||cfg.m==='t')return;const h=DB.log[ex.id];if(!h||!h.length)return;const last=h[h.length-1];const reps=(last.reps||[]).map(r=>parseInt(r,10)||0);if(reps.length&&reps.every(r=>r>=cfg.hi))out.push(ex.name);});
  return out;
}

function greeting(){const h=new Date().getHours();if(h<5)return 'Still up';if(h<12)return 'Good morning';if(h<17)return 'Good afternoon';if(h<21)return 'Good evening';return 'Wind down';}
function datestamp(){const d=new Date();return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short',year:'numeric'}).toUpperCase().replace(/,/g,' ·');}
function weatherLabel(code){if(code===0)return 'Clear';if(code<=3)return 'Partly cloudy';if(code<=48)return 'Fog';if(code<=67)return 'Rain';if(code<=77)return 'Snow';if(code<=82)return 'Showers';return 'Thunderstorm';}
function weatherIcon(code){
  const s='fill="none" stroke="var(--dawn)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"';
  const wrap=inner=>`<svg viewBox="0 0 24 24" width="32" height="32" ${s}>${inner}</svg>`;
  if(code===0)return wrap('<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/>');
  if(code<=3)return wrap('<circle cx="8" cy="7.5" r="3"/><path d="M8 2v1.4M2.5 7.5H4M4 3.5l1 1"/><path d="M7 18h9a3 3 0 0 0 0-6 4 4 0 0 0-7.7-1"/>');
  if(code<=48)return wrap('<path d="M3 8h18M5 12h14M3 16h18"/>');
  if(code<=67)return wrap('<path d="M6 13h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 13z"/><path d="M8 17l-1 3M12 17l-1 3M16 17l-1 3"/>');
  if(code<=77)return wrap('<path d="M6 12h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 12z"/><path d="M9 16v.01M9 19v.01M13 17v.01M16 16v.01M16 19v.01"/>');
  if(code<=82)return wrap('<path d="M6 12h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 12z"/><path d="M8 15l-2 5M13 15l-2 5M18 15l-2 5"/>');
  return wrap('<path d="M6 12h11a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9.6-1.3A3.5 3.5 0 0 0 6 12z"/><path d="M13 13l-3 4h4l-3 4"/>');
}
let _weatherFetching=false;
function fetchWeather(){
  if(_weatherFetching)return;
  if(DB.weather.temp!=null && (Date.now()-DB.weather.fetchedAt)<1800000)return;
  _weatherFetching=true;
  const go=(lat,lon)=>{
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code&temperature_unit=celsius')
      .then(r=>r.json()).then(d=>{
        const c=d.current;
        DB.weather={lat,lon,temp:Math.round(c.temperature_2m),code:c.weather_code,condition:weatherLabel(c.weather_code),fetchedAt:Date.now()};
        saveDB();_weatherFetching=false;if(curScreen==='home')renderScreen('home');
      }).catch(()=>{_weatherFetching=false;});
  };
  const fallback=()=>go(19.2437,73.1355);
  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>go(pos.coords.latitude,pos.coords.longitude),fallback,{timeout:8000,maximumAge:1800000});}
  else fallback();
}

function sparkline(arr){
  if(arr.length<2)return '<span class="mono" style="font-size:11.8px;color:var(--dim)">log to chart</span>';
  const mn=Math.min(...arr)-0.2,mx=Math.max(...arr)+0.2,Wd=150,Hd=48,n=arr.length;
  const pt=arr.map((v,i)=>[(i/(n-1)*Wd),(Hd-((v-mn)/(mx-mn))*(Hd-6)-3)]);
  const line='M'+pt.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L');
  const area=line+` L${Wd} ${Hd} L0 ${Hd} Z`;
  return `<svg viewBox="0 0 ${Wd} ${Hd}" width="${Wd}" height="${Hd}" style="overflow:visible"><path d="${area}" fill="rgba(255,122,60,.12)"></path><path d="${line}" fill="none" stroke="var(--dawn)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="${pt[n-1][0].toFixed(1)}" cy="${pt[n-1][1].toFixed(1)}" r="3.5" fill="var(--dawn)"></circle></svg>`;
}

function segBar(pct,n){

/* ============================================================
   FOCUS RUNNER  (full-screen state machine)
   ============================================================ */
let RN=null;  // runtime session
let rnTimer=null,restTimer=null;

function buildSession(resume){
  const ph=DB.phase,i=todayIdx()>=0?todayIdx():0;
  const list=effExList(ph,i);
  const exs=list.map(e=>{
    const cfg=cfgOf(e);const n=setsOf(cfg);
    return {id:e[0],name:e[1],scheme:e[2],rest:e[3]||0,cue:e[4],yt:e[5],warn:e[6],cfg,w:e[0]&&PHASES[ph].days[i]?PHASES[ph].days[i].w:'push'};
  });
  const dayW=PHASES[ph].days[i].w;
  return {ph,i,dayW,exs,exIdx:0,setIdx:0,logs:{},weight:0,reps:0,elapsed:0,startAt:Date.now(),prs:[],phase:'preview'};
}
function enterRunner(){
  RN=buildSession();
  seedStep();
  document.getElementById('runner').classList.add('show');
  renderRunner();
}
function enterRecovery(){
  RN={ph:DB.phase,recovery:true};
  document.getElementById('runner').classList.add('show');
  renderRecovery();
}
function exitRunner(saveResume){
  stopRnTimer();stopRestTimer();
  if(saveResume)saveActive(); else if(RN&&!RN.recovery){DB.activeSession=null;saveDB();}
  document.getElementById('runner').classList.remove('show');
  RN=null;renderAll();go(curScreen);
}
function startRnTimer(){stopRnTimer();if(RN._elapsedBase==null)RN._elapsedBase=RN.elapsed||0;RN._runFrom=Date.now();rnTimer=setInterval(rnTick,500);}
function rnTick(){if(!RN||RN._runFrom==null)return;RN.elapsed=(RN._elapsedBase||0)+Math.floor((Date.now()-RN._runFrom)/1000);const el=document.getElementById('rn-elapsed');if(el)el.textContent=fmt(RN.elapsed);}
function stopRnTimer(){if(RN&&RN._runFrom!=null){RN._elapsedBase=(RN._elapsedBase||0)+Math.floor((Date.now()-RN._runFrom)/1000);RN.elapsed=RN._elapsedBase;RN._runFrom=null;}if(rnTimer){clearInterval(rnTimer);rnTimer=null;}}
function stopRestTimer(){if(restTimer){clearInterval(restTimer);restTimer=null;}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&RN){if(RN.phase==='timer')tmrTick();else if(RN._runFrom!=null)rnTick();}});
window.addEventListener('focus',()=>{if(RN){if(RN.phase==='timer')tmrTick();else if(RN._runFrom!=null)rnTick();}});

function curEx(){return RN.exs[RN.exIdx];}
function seedStep(){
  const ex=curEx();const cfg=ex.cfg;
  const h=DB.log[ex.id];
  const lw=(h&&h.length)?(parseFloat(h[h.length-1].w)||0):startW(ex.id);
  RN.weight=lw;
  RN.reps=(cfg.m==='t'?Math.max(5,cfg.lo):cfg.lo)||8;
}
function sessDoneSets(){let t=0,d=0;RN.exs.forEach(ex=>{t+=setsOf(ex.cfg);d+=(RN.logs[ex.id]||[]).length;});return{t,d};}

function renderRunner(){
  if(!RN)return;
  if(RN.phase==='preview')return renderPreview();
  if(RN.phase==='exercise')return renderExercise();
  if(RN.phase==='timer')return renderTimer();
  if(RN.phase==='wheel')return renderWheel();
  if(RN.phase==='rest')return renderExercise();
  if(RN.phase==='exdone')return renderExDone();
  if(RN.phase==='stamina')return renderStamina();
  if(RN.phase==='cooldown')return renderCooldown();
  if(RN.phase==='summary')return renderSummary();
}

function renderExercise(){
  const ex=curEx();const cfg=ex.cfg;const n=setsOf(cfg);
  if(RN.setIdx>=n)RN.setIdx=n-1;
  const isT=cfg.m==='t';const noW=cfg.m==='b'||isT;const timed=isTimed(cfg);
  const kgLabel=cfg.m==='w'?'Added · kg':(ex.id==='p1ch'||ex.id==='p2ch')?'Assist · kg':'Weight · kg';
  const scheme=cfg.s+' × '+(cfg.lo===cfg.hi?cfg.lo:cfg.lo+'–'+cfg.hi);
  const logged=RN.logs[ex.id]||[];
  let pips='';for(let i=0;i<n;i++){const st=i<RN.setIdx?'done':(i===RN.setIdx?'active':'');pips+=`<button class="setpip ${st}" onclick="editSet(${i})" aria-label="Set ${i+1}">${logged[i]!=null?logged[i]:'S'+(i+1)}</button>`;}
  const step=weightStepFor(ex.id);
  const steptabs=noW?'':`<div class="steptabs">${[0.5,1,1.25,2,2.5,5].map(v=>`<button class="${v===step?'on':''}" onclick="setStep('${ex.id}',${v})">${v}</button>`).join('')}</div>`;
  const wcard=noW?'':`<div class="stepcard">
    ${steptabs}
    <div class="sl">${kgLabel}</div>
    <div class="stepctl"><button class="stepbtn tap" onclick="stepW(-1)">−</button><span class="stepval">${RN.weight||0}</span><button class="stepbtn up tap" onclick="stepW(1)">+</button></div>
  </div>`;
  const rcard=`<div class="stepcard">
    <div class="sl">${isT?'Seconds':'Reps'}</div>
    <div class="stepctl"><button class="stepbtn tap" onclick="stepR(-1)">−</button><span class="stepval">${RN.reps}</span><button class="stepbtn up tap" onclick="stepR(1)">+</button></div>
  </div>`;
  const holdCard=`<div class="stepcard" style="text-align:center"><div class="sl">Hold target</div><div class="stepval" style="margin-top:4px">${fmt(RN.reps||cfg.lo)}</div><div class="mono" style="font-size:11.8px;color:var(--dim);margin-top:4px">countdown auto-logs the hold</div></div>`;
  const h=DB.log[ex.id];
  const prevSet=RN.setIdx>0?logged[RN.setIdx-1]:null;
  let lastTxt;
  if(RN.setIdx>0)lastTxt='Last set · '+(noW?'':RN.weight+'kg × ')+prevSet;
  else if(h&&h.length){const L=h[h.length-1];lastTxt='Last: '+(L.w?L.w+'kg × ':'')+L.reps.join('/');}
  else lastTxt='Last: first set';
  const atTop=!isT&&cfg.hi<99&&RN.reps>=cfg.hi;
  const target='Target '+(cfg.lo===cfg.hi?cfg.lo:cfg.lo+'–'+cfg.hi)+(isT?' sec':' reps');
  document.getElementById('runner').innerHTML=`
  <div class="rn-screen ex-screen">
    ${rnHeader()}
    <div class="rn-body ex-body">
      <h2 style="font-size:29px;margin-top:6px">${esc(ex.name)}</h2>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:8px;flex-wrap:wrap">
        <span class="mono" style="font-size:14px;color:var(--gold);font-weight:700">${scheme}</span>
        ${ex.cue?`<span style="font-size:14px;color:var(--muted)">${esc(ex.cue)}</span>`:''}
      </div>
      ${ex.warn?`<div class="mono" style="margin-top:9px;font-size:13px;color:var(--red);background:rgba(255,140,140,.07);border:1px solid rgba(255,140,140,.3);border-radius:10px;padding:8px 11px">${esc(ex.warn)}</div>`:''}
      ${ex.yt?`<a class="mono" style="display:inline-block;margin-top:9px;font-size:12px" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.yt)}" target="_blank" rel="noopener">▶ YT: "${esc(ex.yt)}"</a>`:''}
      <div class="formbox"><div class="formbox-h">✦ How to perform it</div><div class="formbox-b">${esc(exForm(ex))}</div></div>
      <div style="display:flex;align-items:flex-start;justify-content:center;padding:12px 0 4px">${muscleBand(ex)}</div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:20px;margin-bottom:12px">
        <span class="mono" style="font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:700">Set ${RN.setIdx+1} of ${n}</span>
        <div class="setpips" style="margin-left:auto">${pips}</div>
      </div>
      ${timed?`<div class="stepgrid one">${holdCard}</div>`:(noW?`<div class="stepgrid one">${rcard}</div>`:`<div class="stepgrid one" style="margin-bottom:12px">${wcard}</div>${plateHTML(ex)}<div class="stepgrid one">${rcard}</div>`)}
      <div style="display:flex;align-items:center;gap:10px;margin-top:11px;min-height:22px">
        <span class="mono" style="font-size:12px;color:var(--green)">↳ ${lastTxt}</span>
        ${atTop?'<span class="mono" style="margin-left:auto;font-size:11.8px;color:var(--green);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.4);border-radius:99px;padding:4px 9px">▲ top of range — add weight</span>':''}
      </div>
    </div>
    <div class="rn-foot">
      ${timed?`<button class="logset tap" onclick="startHold()">Start ${fmt(RN.reps||cfg.lo)} hold ▸</button><div class="subcap">Auto-logs on completion · <button class="skiplink" style="text-decoration:underline" onclick="openSwap()">swap</button></div>`:`<button class="logset tap" id="logbtn" onclick="logSet()">${RN.setIdx<logged.length?'Update set ✓':'Log set ✓'}</button><div class="subcap">${target} · <button class="skiplink" style="text-decoration:underline" onclick="openSwap()">swap exercise</button></div>`}
      <button class="endbtn" onclick="confirmEnd()">End session</button>
    </div>
  </div>`;
}
function setStep(id,v){DB.settings.weightStep[id]=v;saveDB();renderExercise();}
function isBarbell(ex){return /barbell|bench press|\brow\b/i.test(ex.name)&&/barbell|bench|row/i.test(ex.name)&&/barbell/i.test(ex.name);}
const PLATES=[20,15,10,5,2.5,1.25];
function plateMath(total,bar){
  bar=bar||20;if(total<=bar)return {ok:false,bar};
  let perSide=(total-bar)/2,rem=perSide,out=[];
  PLATES.forEach(p=>{let c=0;while(rem>=p-1e-6){rem=Math.round((rem-p)*100)/100;c++;}if(c)out.push(c+'×'+p);});
  return {ok:true,bar,perSide:Math.round(perSide*100)/100,plates:out,leftover:Math.round(rem*100)/100};
}
function plateHTML(ex){
  if(!/barbell/i.test(ex.name))return '';
  const pm=plateMath(RN.weight,20);
  let body;
  if(!pm.ok)body=`Just the <b>20kg bar</b>${RN.weight<20?' (or empty/lighter)':''}.`;
  else body=`<b>20kg bar</b> + <b>${pm.plates.join(' + ')||'—'}</b> per side <span style="color:var(--dim)">= ${pm.perSide}kg/side${pm.leftover?', '+pm.leftover+'kg short':''}</span>`;
  return `<div class="platebox"><div class="pl-h">🏋 Plate math <span>${RN.weight||0}kg total</span></div><div class="pl-b">${body}</div><div class="pl-n">Total = bar (20kg) + plates × 2 sides. Load the biggest plates first, mirror both ends.</div></div>`;
}
function muscleBand(ex){
  const m=musclesFor(ex.id);
  const view=(RN.view&&RN.view[ex.id])||m.v;
  const lit=new Set([...m.p,...m.s]);
  const chip=(id,pri)=>`<div class="mchip ${pri?'pri':'sec'}"><span class="mdot"></span>${MLABEL[id]||id}</div>`;
  let chips='';m.p.slice(0,6).forEach(id=>chips+=chip(id,true));
  m.s.slice(0,Math.max(0,6-Math.min(m.p.length,6))).forEach(id=>chips+=chip(id,false));
  return `<div class="mband">
    <div class="mfig">${anatomy(view,lit,160)}</div>
    <div class="mtoggle"><button class="${view==='front'?'on':''}" onclick="setMuscleView('${ex.id}','front')">FRONT</button><button class="${view==='back'?'on':''}" onclick="setMuscleView('${ex.id}','back')">BACK</button></div>
    <div class="mchips">${chips}</div>
  </div>`;
}
function setMuscleView(id,v){if(!RN.view)RN.view={};RN.view[id]=v;renderExercise();}function stepW(dir){const step=weightStepFor(curEx().id);RN.weight=Math.max(0,Math.round((RN.weight+dir*step)*100)/100);buzz();renderExercise();}
function stepR(dir){const cfg=curEx().cfg;const s=cfg.m==='t'?5:1,mn=cfg.m==='t'?5:1;RN.reps=Math.max(mn,RN.reps+dir*s);buzz();renderExercise();}

function logSet(){
  const ex=curEx();const cfg=ex.cfg;const n=setsOf(cfg);
  if(!RN.logs[ex.id])RN.logs[ex.id]=[];
  const editing=RN._editing!=null;
  RN.logs[ex.id][RN.setIdx]=RN.reps;
  buzz([120]);
  saveActive(); // #2 autosave every set
  if(editing){RN._editing=null;const done=(RN.logs[ex.id]||[]).filter(x=>x!=null).length;RN.setIdx=Math.min(done,n-1);seedStepKeepWeight();renderExercise();return;}
  afterSetLogged();
}
function editSet(i){const ex=curEx();const logged=RN.logs[ex.id]||[];if(logged[i]==null&&i!==RN.setIdx)return;RN._editing=(logged[i]!=null)?i:null;RN.setIdx=i;if(logged[i]!=null)RN.reps=logged[i];buzz();renderExercise();}
function swapCandidates(){
  const cur=new Set(RN.exs.map(e=>e.id));const w=RN.dayW;const out=[];const seen=new Set();
  ORDER.forEach(ph=>{PHASES[ph].days.forEach(d=>{if(d.w===w)d.ex.forEach(e=>{if(!cur.has(e[0])&&!seen.has(e[1])){seen.add(e[1]);const def=exDef(e[0]);out.push({id:e[0],name:def[1],scheme:def[2]});}});});});
  return out.slice(0,14);
}
function openSwap(){
  const cands=swapCandidates();
  const rows=cands.map(c=>`<button class="swap-opt tap" onclick="doSwap('${c.id}')"><span>${esc(c.name)}</span><span class="mono" style="color:var(--gold);font-size:13px">${esc(c.scheme)}</span></button>`).join('');
  document.getElementById('modal-box').innerHTML=`<h4>Swap exercise</h4><p>Machine taken? Pick a same-muscle alternative — your logged sets so far stay.</p>
    <div style="max-height:46vh;overflow-y:auto;margin-top:14px;display:flex;flex-direction:column;gap:8px">${rows||'<div class="mono" style="font-size:12px;color:var(--muted)">No alternatives found.</div>'}</div>
    <div class="row" style="margin-top:14px"><button class="no" onclick="modalClose()" style="flex:1">Cancel</button></div>`;
  document.getElementById('modal').classList.add('show');
}
function doSwap(id){
  const def=exDef(id);if(!def)return;const cfg=cfgOf(def);
  RN.exs[RN.exIdx]={id:def[0],name:def[1],scheme:def[2],rest:def[3]||0,cue:def[4],yt:def[5],warn:def[6],cfg,w:RN.dayW};
  RN.setIdx=0;seedStep();modalClose();buzz();renderExercise();
}
function commitExercise(ex){
  const cfg=ex.cfg;const n=setsOf(cfg);
  const reps=(RN.logs[ex.id]||[]).slice(0,n).map(x=>String(x));
  const w=(cfg.m==='b')?'':(RN.weight>0?String(RN.weight):'');
  const prevMax=maxWeightHist(ex.id);
  if(!DB.log[ex.id])DB.log[ex.id]=[];
  DB.log[ex.id].push({w,reps,d:dispDate(isoToday())});
  if(DB.log[ex.id].length>40)DB.log[ex.id]=DB.log[ex.id].slice(-40);
  const isPR=(cfg.m!=='b')&&RN.weight>0&&RN.weight>prevMax&&prevMax>0;
  if(isPR){RN.prs.push({name:ex.name,w:RN.weight});DB.prs.push({id:ex.id,name:ex.name,w:RN.weight,reps:reps.join('/'),iso:isoToday(),d:dispDate(isoToday())});if(DB.prs.length>200)DB.prs=DB.prs.slice(-200);}
  saveDB();
  ex._pr=isPR;
}
function saveActive(){
  if(!RN||RN.recovery||RN.phase==='preview'||RN.phase==='summary')return;
  DB.activeSession={phase:RN.ph,dayIdx:RN.i,exIdx:RN.exIdx,setIdx:RN.setIdx,elapsed:RN.elapsed,logs:RN.logs,prs:RN.prs,startedAt:RN.startAt};
  saveDB();
}

/* ============ UNIFIED TIMER (holds · rest · between-exercise) ============ */
function isTimed(cfg){return cfg&&cfg.m==='t'&&cfg.lo>=15;}
function clockAt(sec){const d=new Date(Date.now()+sec*1000);return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}
function interRest(next){if(!next)return 0;return Math.max(45,Math.min(90,next.rest||60));}
function afterSetLogged(){
  const ex=curEx();const cfg=ex.cfg;const n=setsOf(cfg);
  const lastSet=RN.setIdx>=n-1,lastEx=RN.exIdx>=RN.exs.length-1;
  if(lastSet){commitExercise(ex);if(lastEx){finishToCooldown();}else{RN.phase='exdone';renderRunner();}}
  else{RN.setIdx++;if(ex.rest>0)startTimer(ex.rest,'rest','Next · Set '+(RN.setIdx+1)+' of '+n,'nextset');else{seedStepKeepWeight();renderExercise();}}
}
function startTimer(total,mode,label,next){
  RN.phase='timer';
  RN.tmr={total,mode,label,next,endAt:Date.now()+total*1000,left:total,paused:false,pausedLeft:total,beeped:false};
  stopRnTimer();stopRestTimer();
  renderTimer();
  restTimer=setInterval(tmrTick,250);
}
function tmrTick(){
  if(!RN||RN.phase!=='timer'||!RN.tmr||RN.tmr.paused)return;
  RN.tmr.left=Math.max(0,Math.round((RN.tmr.endAt-Date.now())/1000));
  if(RN.tmr.left<=0){if(!RN.tmr.beeped){RN.tmr.beeped=true;stopRestTimer();beep();resolveTimer(true);}}
  else updateTimerUI();
}
function pauseTimer(){if(!RN.tmr)return;RN.tmr.paused=true;RN.tmr.pausedLeft=RN.tmr.left;buzz();renderTimer();}
function resumeTimer(){if(!RN.tmr)return;RN.tmr.paused=false;RN.tmr.endAt=Date.now()+RN.tmr.pausedLeft*1000;buzz();renderTimer();}
function skipTimer(){stopRestTimer();resolveTimer(false);}
function resolveTimer(auto){
  stopRestTimer();
  const m=RN.tmr;RN.tmr=null;RN.phase='exercise';
  if(m&&m.mode==='hold'){
    const secs=auto?m.total:Math.max(1,m.total-m.left);
    const ex=curEx();if(!RN.logs[ex.id])RN.logs[ex.id]=[];
    RN.logs[ex.id][RN.setIdx]=secs;RN.reps=secs;
    buzz([120]);saveActive();startRnTimer();afterSetLogged();return;
  }
  seedStepKeepWeight();startRnTimer();renderExercise();
}
function renderTimer(){
  const m=RN.tmr;const C=2*Math.PI*46;
  const frac=m.total>0?Math.max(0,m.left/m.total):0;
  const paused=m.paused;
  const setLine=(m.mode==='hold')?`<div class="tmr-set">Hold · set ${RN.setIdx+1} of ${setsOf(curEx().cfg)}</div>`:'';
  document.getElementById('runner').innerHTML=`
  <div class="tmr ${paused?'':''}">
    <div class="tmr-label">${esc(m.label||'')}</div>
    <div class="tmr-ring ${paused?'paused':''}">
      <svg viewBox="0 0 100 100"><circle class="track" cx="50" cy="50" r="46"></circle><circle class="prog" id="tmr-arc" cx="50" cy="50" r="46" stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${(C*(1-frac)).toFixed(2)}"></circle></svg>
      ${setLine}
      <div class="tmr-center">
        <div class="tmr-big" id="tmr-big">${fmt(m.left)}</div>
        <div class="tmr-fin" id="tmr-fin"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>${paused?'paused':'ends '+clockAt(m.left)}</div>
      </div>
      <button class="tmr-edit" onclick="editTimer()" aria-label="Edit timer"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Edit</button>
    </div>
    <div class="tmr-btns">
      <button class="tmr-skip tap" onclick="skipTimer()">${m.mode==='hold'?'Finish':'Skip'}</button>
      <button class="tmr-primary ${paused?'resume':''} tap" onclick="${paused?'resumeTimer()':'pauseTimer()'}">${paused?'Resume':'Pause'}</button>
    </div>
  </div>`;
}
function updateTimerUI(){
  const m=RN.tmr;if(!m)return;
  const big=document.getElementById('tmr-big');if(big)big.textContent=fmt(m.left);
  const fin=document.getElementById('tmr-fin');if(fin&&!m.paused)fin.innerHTML='<svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>ends '+clockAt(m.left);
  const a=document.getElementById('tmr-arc');if(a){const C=2*Math.PI*46,frac=m.total>0?m.left/m.total:0;a.setAttribute('stroke-dashoffset',(C*(1-frac)).toFixed(2));}
}
function seedStepKeepWeight(){const ex=curEx();const cfg=ex.cfg;RN.reps=(cfg.m==='t'?Math.max(5,cfg.lo):cfg.lo)||8;}
/* ---- scroll-wheel picker (set / edit a duration) ---- */
function openWheel(secs,action,title){
  RN.wheel={h:Math.floor(secs/3600),m:Math.floor((secs%3600)/60),s:secs%60,action,title:title||'Set timer'};
  RN.phase='wheel';renderWheel();
}
function renderWheel(){
  const w=RN.wheel;
  const col=(unit,max,val)=>{
    let cells='';for(let i=0;i<=max;i++)cells+=`<div class="wheel-cell" data-v="${i}">${String(i).padStart(2,'0')}</div>`;
    return `<div class="wheel-col"><div class="wheel-hd">${unit}</div><div class="wheel-list" id="wl-${unit[0].toLowerCase()}" data-unit="${unit[0].toLowerCase()}" data-max="${max}">${cells}</div></div>`;
  };
  document.getElementById('runner').innerHTML=`
  <div class="wheel-wrap">
    <div class="tmr-label" style="margin-bottom:6px">${esc(w.title)}</div>
    <div class="wheel">
      <div class="wheel-band"></div>
      ${col('Hours',23,w.h)}<span class="wheel-colon">:</span>${col('Minutes',59,w.m)}<span class="wheel-colon">:</span>${col('Seconds',59,w.s)}
    </div>
    <div class="wheel-preview" id="wheel-prev">${wheelTotal()} total</div>
    <button class="wheel-start tap" onclick="wheelStart()">${w.action==='edit'?'Update ▸':'Start ▸'}</button>
    <button class="skiplink" style="margin-top:10px" onclick="wheelCancel()">cancel</button>
  </div>`;
  setTimeout(()=>{initWheelCol('h',w.h);initWheelCol('m',w.m);initWheelCol('s',w.s);},30);
}
function initWheelCol(u,val){
  const el=document.getElementById('wl-'+u);if(!el)return;const H=70;
  el.scrollTop=val*H;markWheel(el);
  el.onscroll=()=>{clearTimeout(el._t);markWheel(el);el._t=setTimeout(()=>{const i=Math.round(el.scrollTop/H);RN.wheel[u]=Math.max(0,Math.min(+el.dataset.max,i));const p=document.getElementById('wheel-prev');if(p)p.textContent=wheelTotal()+' total';buzz(8);},90);};
}
function markWheel(el){const H=70;const mid=Math.round(el.scrollTop/H);[...el.children].forEach((c,i)=>c.classList.toggle('mid',i===mid));}
function wheelTotal(){const w=RN.wheel;return fmt(w.h*3600+w.m*60+w.s);}
function wheelSecs(){const w=RN.wheel;return w.h*3600+w.m*60+w.s;}
function wheelStart(){
  const secs=Math.max(1,wheelSecs());const w=RN.wheel;
  if(w.action==='edit'&&RN._editTmr){const t=RN._editTmr;RN._editTmr=null;startTimer(secs,t.mode,t.label,t.next);return;}
  startTimer(secs,'hold',curEx().name,'timedlog');
}
function wheelCancel(){
  if(RN.wheel&&RN.wheel.action==='edit'&&RN._editTmr){const t=RN._editTmr;RN._editTmr=null;startTimer(t.left||t.total,t.mode,t.label,t.next);return;}
  RN.phase='exercise';startRnTimer();renderExercise();
}
function editTimer(){const m=RN.tmr;stopRestTimer();RN._editTmr={mode:m.mode,label:m.label,next:m.next,total:m.total};openWheel(m.left,'edit','Adjust timer');}
function startHold(){openWheel(RN.reps||curEx().cfg.lo,'hold',curEx().name);}

/* ---- exercise complete ---- */
function renderExDone(){
  const done=curEx();const next=RN.exs[RN.exIdx+1];
  const pr=done._pr;
  document.getElementById('runner').innerHTML=`
  <div class="rn-screen" style="align-items:center;justify-content:center;text-align:center;padding:28px 22px">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
      <div class="big" style="font-size:60px;color:var(--green);animation:pop .4s var(--ease) both">✓</div>
      <div class="big" style="font-size:26px;text-transform:uppercase">Exercise complete</div>
      ${pr?`<div class="mono" style="font-size:13px;color:var(--gold);background:rgba(255,200,92,.1);border:1px solid rgba(255,200,92,.4);border-radius:99px;padding:8px 16px;animation:pop .5s var(--ease) both">🏆 NEW PR · ${RN.weight}kg</div>`:''}
      ${next?`<div class="card" style="width:100%;text-align:left;margin-top:8px">
        <div class="clabel">Up next</div>
        <div style="font-weight:700;font-size:16px;margin-top:6px">${esc(next.name)}</div>
        <div class="mono" style="font-size:12px;color:var(--gold);margin-top:4px">${next.cfg.s} × ${next.cfg.lo===next.cfg.hi?next.cfg.lo:next.cfg.lo+'–'+next.cfg.hi}</div>
        ${next.cue?`<div style="font-size:12.5px;color:var(--muted);margin-top:6px">${esc(next.cue)}</div>`:''}
      </div>`:''}

    </div>

}
function nextExercise(){
  RN.exIdx++;RN.setIdx=0;seedStep();
  const next=curEx();const irest=interRest(next);
  if(irest>0)startTimer(irest,'interex','Next up · '+next.name,'toexercise');
  else{RN.phase='exercise';renderExercise();}
}

/* ---- cool-down step ---- */
function finishToCooldown(){
  const hd=PHASES[RN.ph].days[RN.i];
  const cool=(C[hd.c]||[]);
  if(!cool.length){finishToStamina();return;}
  RN.phase='cooldown';stopRestTimer();renderCooldown();
}
function renderCooldown(){
  const hd=PHASES[RN.ph].days[RN.i];
  const cool=(C[hd.c]||[]).map(wcCard).join('');
  document.getElementById('runner').innerHTML=`
  <div class="rn-screen ex-screen">
    ${rnHeader()}
    <div class="rn-body">
      <div class="mono" style="font-size:13px;letter-spacing:.24em;color:var(--green);text-transform:uppercase">Wind down · Cool-down</div>
      <h2 style="font-size:29px;margin-top:10px">Cool-down</h2>
      <div style="color:var(--muted);font-size:13px;margin-top:8px;max-width:340px">Ease out with these static holds — strong work today. Tap done when you've stretched.</div>
      <div style="margin-top:18px">${cool}</div>

function statBox(v,l,c){return `<div class="card" style="text-align:center;padding:14px 8px"><div class="big" style="font-size:22px;color:${c}">${v}</div><div class="mono" style="font-size:10.6px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:4px">${l}</div></div>`;}
const RCATS=[['Shoulders',['shoulder-front','shoulder-side','shoulder-rear']],['Chest',['chest']],['Core',['abs','obliques']],['Legs',['quad','hamstring','glute','calf']],['Arms',['bicep','tricep','forearm']],['Back',['lat','mid-back','trap']]];
function radarHTML(logs){
  const score=RCATS.map(()=>0);const priCount={},secCount={};
  Object.keys(logs).forEach(id=>{
    const m=musclesFor(id);const sets=Math.max(1,(logs[id]||[]).length);
    m.p.forEach(mu=>{priCount[mu]=(priCount[mu]||0)+sets;RCATS.forEach((c,ci)=>{if(c[1].includes(mu))score[ci]+=sets*2;});});
    m.s.forEach(mu=>{secCount[mu]=(secCount[mu]||0)+sets;RCATS.forEach((c,ci)=>{if(c[1].includes(mu))score[ci]+=sets;});});
  });
  const max=Math.max(1,...score);
  const cx=90,cy=88,R=62;
  const pt=(i,f)=>{const a=(-90+i*60)*Math.PI/180;return [cx+Math.cos(a)*R*f,cy+Math.sin(a)*R*f];};
  let grid='';[1,.66,.33].forEach(r=>{const p=RCATS.map((_,i)=>pt(i,r).map(n=>n.toFixed(1)).join(',')).join(' ');grid+=`<polygon points="${p}" fill="none" stroke="var(--line2)" stroke-width="1"/>`;});
  RCATS.forEach((_,i)=>{const[x,y]=pt(i,1);grid+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;});
  const dpts=RCATS.map((_,i)=>pt(i,Math.max(.08,score[i]/max)).map(n=>n.toFixed(1)).join(',')).join(' ');
  let dots='';RCATS.forEach((_,i)=>{if(score[i]>0){const[x,y]=pt(i,Math.max(.08,score[i]/max));dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.6" fill="var(--dawn)"/>`;}});
  let labs='';RCATS.forEach((c,i)=>{const[x,y]=pt(i,1.3);const anc=Math.abs(x-cx)<8?'middle':(x>cx?'start':'end');const on=score[i]>0;labs+=`<text x="${x.toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="${anc}" font-family="var(--fmono)" font-size="8.5" letter-spacing=".06em" fill="${on?'var(--text)':'var(--muted)'}">${c[0]}</text>`;});
  const topP=Object.keys(priCount).sort((a,b)=>priCount[b]-priCount[a])[0];
  const topS=Object.keys(secCount).sort((a,b)=>secCount[b]-secCount[a])[0];
  return `<div class="card" style="margin-top:14px">
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
      <h3 style="font-size:18px">Muscles worked</h3>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:11px">
      <span class="mchip pri"><span class="mdot"></span>Primary${topP?' · '+(MLABEL[topP]||topP):''}</span>
      ${`<span class="mchip sec"><span class="mdot"></span>Secondary · ${topS?(MLABEL[topS]||topS):'—'}</span>`}
    </div>
    <svg viewBox="0 0 180 190" style="width:100%;height:auto;margin-top:8px;overflow:visible">${grid}<polygon points="${dpts}" fill="rgba(255,122,60,.25)" stroke="var(--dawn)" stroke-width="2" stroke-linejoin="round"/>${dots}${labs}</svg>
  </div>`;
}

function drawFig(ctx,view,lit,dawn,ox,oy,sc){
  // reuse anatomy() svg → rasterize via path is heavy; draw simple filled blocks matching lit groups
  const base='#2C3542';const on=id=>lit.has(id)?dawn:base;
  ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);
  const box=(mx,my,w,h,col)=>{ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(mx,my,w,h,4);ctx.fill();};
  // head/torso neutral
  box(-8,-6,16,16,base);
  if(view==='front'){box(-20,14,40,10,(lit.has('shoulder-front')||lit.has('shoulder-side'))?dawn:base);box(-18,26,36,26,on('chest'));box(-15,54,30,26,on('abs'));box(-16,84,14,34,on('quad'));box(2,84,14,34,on('quad'));}
  else{box(-20,14,40,12,(lit.has('shoulder-rear')||lit.has('trap'))?dawn:base);box(-18,28,36,28,lit.has('lat')||lit.has('mid-back')?dawn:base);box(-16,58,32,16,on('glute'));box(-16,76,14,32,on('hamstring'));box(2,76,14,32,on('hamstring'));}
  ctx.restore();
}
function wrapText(ctx,text,x,y,maxW,lh){const words=text.split(' ');let line='',yy=y;words.forEach(w=>{const t=line+w+' ';if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,yy);line=w+' ';yy+=lh;}else line=t;});ctx.fillText(line,x,yy);}

function sumBetween(a,b){let s=0;DB.sess.forEach(x=>{const t=new Date(x.d).getTime();if(t>=a&&t<b)s+=(x.duration||0);});return s;}
function weekStart(off){const d=new Date();const dow=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-dow-7*off);return d;}
function timeData(f){
  const D=86400000;
  if(f==='week'){
    const s=weekStart(0).getTime();
    return {label:'This week',cmp:'VS LAST WEEK',pods:[{v:sumBetween(s,s+3*D),l:'Mon–Wed'},{v:sumBetween(s+3*D,s+5*D),l:'Thu–Fri'},{v:sumBetween(s+5*D,s+7*D),l:'Sat–Sun'}],cur:sumBetween(s,s+7*D),prev:sumBetween(s-7*D,s)};
  }
  if(f==='month'){
    const n=new Date(),y=n.getFullYear(),m=n.getMonth();
    const a=new Date(y,m,1).getTime(),m2=new Date(y,m,15).getTime(),m3=new Date(y,m,22).getTime(),end=new Date(y,m+1,1).getTime(),pa=new Date(y,m-1,1).getTime();
    return {label:'This month',cmp:'VS LAST MONTH',pods:[{v:sumBetween(a,m2),l:'Wk 1–2'},{v:sumBetween(m2,m3),l:'Wk 3'},{v:sumBetween(m3,end),l:'Wk 4+'}],cur:sumBetween(a,end),prev:sumBetween(pa,a)};
  }
  const n=new Date(),y=n.getFullYear(),q=Math.floor(n.getMonth()/3);
  const pods=[q-2,q-1,q].map(qq=>{const yy=y+(qq<0?-1:0),qi=((qq%4)+4)%4;return {v:sumBetween(new Date(yy,qi*3,1).getTime(),new Date(yy,qi*3+3,1).getTime()),l:'Q'+(qi+1)};});
  const ys=new Date(y,0,1).getTime(),ye=new Date(y+1,0,1).getTime(),pys=new Date(y-1,0,1).getTime();
  return {label:'This year',cmp:'VS LAST YEAR',pods,cur:sumBetween(ys,ye),prev:sumBetween(pys,ys)};
}
function podPattern(i){
  const c='rgba(255,122,60,.3)';
  if(i===0)return `<svg viewBox="0 0 60 60" preserveAspectRatio="none"><path d="M0 44 Q10 36 20 44 T40 44 T60 44" fill="none" stroke="${c}" stroke-width="1.4"/><path d="M0 52 Q10 44 20 52 T40 52 T60 52" fill="none" stroke="${c}" stroke-width="1.4"/></svg>`;
  if(i===1){let d='';for(let y=8;y<60;y+=9)for(let x=8;x<60;x+=9)d+=`<circle cx="${x}" cy="${y}" r="1.4" fill="${c}"/>`;return `<svg viewBox="0 0 60 60" preserveAspectRatio="none">${d}</svg>`;}
  return `<svg viewBox="0 0 60 60" preserveAspectRatio="none"><defs><linearGradient id="pg" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="rgba(255,122,60,.32)"/><stop offset="1" stop-color="rgba(255,122,60,0)"/></linearGradient></defs><rect width="60" height="60" fill="url(#pg)"/></svg>`;
}

function lineChart(arr){

  const area=line+` L${Wd-pad} ${Hd} L${pad} ${Hd} Z`;
  let dots=pt.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="var(--dawn)"/>`).join('');
  return `<svg viewBox="0 0 ${Wd} ${Hd}" style="width:100%;height:auto;overflow:visible"><path d="${area}" fill="rgba(255,122,60,.1)"/><path d="${line}" fill="none" stroke="var(--dawn)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
