  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n<header>\n  <div class=\"eyebrow\">Amritanshu · 5'11\" · 62.5→75kg · Tue–Sat dawn<\u002Fdiv>\n  <h1>Apex — <span class=\"accent\">The Reference<\u002Fspan><\u002Fh1>\n  <p class=\"sub\">One artifact, whole journey. <b>Start each phase with its button<\u002Fb> — the week clock, today's session, diet targets and deload alerts all follow your active phase. <b>Advance only through the gate.<\u002Fb><\u002Fp>\n  <div class=\"bwbar\">\n    <span class=\"lbl\">BODYWEIGHT<\u002Fspan>\n    <input id=\"bw-in\" type=\"number\" inputmode=\"decimal\" placeholder=\"kg today\">\n    <button onclick=\"logBW()\">LOG<\u002Fbutton>\n    <span class=\"bwstat\" id=\"bw-stat\">—<small>log weekly, Sunday morning<\u002Fsmall><\u002Fspan>\n    <span class=\"bwspark\" id=\"bw-spark\" aria-hidden=\"true\"><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"status\" id=\"status\"><\u002Fdiv>\n<\u002Fheader>\n\n<nav class=\"rail\"><div class=\"rail-track\" id=\"railtrack\">\n    <button data-t=\"p1\">PHASE 1<small>M0–3<\u002Fsmall><\u002Fbutton>\n    <button data-t=\"p2\">PHASE 2<small>M3–6<\u002Fsmall><\u002Fbutton>\n    <button data-t=\"p3\">PHASE 3<small>M6–12<\u002Fsmall><\u002Fbutton>\n    <button data-t=\"p4\">PHASE 4<small>M12–24<\u002Fsmall><\u002Fbutton>\n    <button data-t=\"cond\">STAMINA<small>ENGINE<\u002Fsmall><\u002Fbutton>\n    <button data-t=\"diet\">FUEL<small>DIET<\u002Fsmall><\u002Fbutton>\n    <button data-t=\"prog\">PROGRESS<small>LOGS<\u002Fsmall><\u002Fbutton>\n<\u002Fdiv><\u002Fnav>\n\n<section id=\"p1\"><\u002Fsection>\n<section id=\"p2\"><\u002Fsection>\n<section id=\"p3\"><\u002Fsection>\n<section id=\"p4\"><\u002Fsection>\n\n<section id=\"cond\">\n  <h2>Stamina — The Engine Rules<\u002Fh2>\n  <p class=\"phase-meta\">Cardio and muscle growth coexist only when dosed, sequenced, and fed.<\u002Fp>\n  <div class=\"note blue\"><b>Interference law:<\u002Fb> endurance signals compete with growth signals. For an under-eating ectomorph, excess cardio = stalled gains.<\u002Fdiv>\n  <h3>The five laws<\u002Fh3>\n  <table>\n    <tbody><tr><th>#<\u002Fth><th>Law<\u002Fth><th>Reason<\u002Fth><\u002Ftr>\n    <tr><td>1<\u002Ftd><td><b>Lift first, cardio after<\u002Fb> — or separate days<\u002Ftd><td>Cardio-first cuts force output<\u002Ftd><\u002Ftr>\n    <tr><td>2<\u002Ftd><td><b>+200–300 kcal every conditioning day<\u002Fb> (Fuel calculator)<\u002Ftd><td>Cardio unfed = accidental cut<\u002Ftd><\u002Ftr>\n    <tr><td>3<\u002Ftd><td><b>Zone 2 base + sprint peak, nothing between<\u002Fb><\u002Ftd><td>Mid-intensity = fatigue without fitness<\u002Ftd><\u002Ftr>\n    <tr><td>4<\u002Ftd><td><b>Football = a conditioning session<\u002Fb><\u002Ftd><td>Never stack sprints + match same day<\u002Ftd><\u002Ftr>\n    <tr><td>5<\u002Ftd><td><b>Legs dead 48h+ → cut one cardio, add one meal<\u002Fb><\u002Ftd><td>Recovery is the referee<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n  <h3>Dose by phase<\u002Fh3>\n  <table>\n    <tbody><tr><th>Phase<\u002Fth><th>Weekly conditioning<\u002Fth><th>Pitch capacity<\u002Fth><\u002Ftr>\n    <tr><td>P1<\u002Ftd><td>2× 20-min LISS post-lift (Tue/Fri)<\u002Ftd><td>60–75 min casual<\u002Ftd><\u002Ftr>\n    <tr><td>P2<\u002Ftd><td>2× LISS + bike intervals 8×30s/90s (Sat)<\u002Ftd><td>90 min comfortable<\u002Ftd><\u002Ftr>\n    <tr><td>P3<\u002Ftd><td>1× LISS + sprints 6–8×40m + cone shuffles<\u002Ftd><td>Real pace + cutting<\u002Ftd><\u002Ftr>\n    <tr><td>P4<\u002Ftd><td>LISS + sprints/5-10-5 shuttles · deload lighter<\u002Ftd><td>Late-game sprints intact<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n  <h3>Sprint warm-up — never skip<\u002Fh3>\n  <ul class=\"simple\"><li><b>3–5 min easy jog<\u002Fb><\u002Fli><li><b>Leg swings<\u002Fb> — 10 front-back + 10 side each leg<\u002Fli><li><b>3 build-up runs<\u002Fb> — 20m @ 50% → 70% → 85%<\u002Fli><\u002Ful>\n  <div class=\"note red\"><b>Hamstring rule:<\u002Fb> any mid-session tightness = done for the day. A strain costs 6 weeks.<\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"diet\">\n  <h2>Fuel — Diet, Checklist &amp; Calculator<\u002Fh2>\n  <p class=\"phase-meta\">Indian household · veg at home, non-veg outside · <b>Water: 3L+ daily, +500ml conditioning days<\u002Fb><\u002Fp>\n  <h3>Today's targets — phase auto-set, day type yours<\u002Fh3>\n  <div class=\"calc\">\n    <select id=\"calc-phase\" onchange=\"calcUpdate()\">\n      <option value=\"0\">PHASE 1<\u002Foption><option value=\"1\">PHASE 2<\u002Foption>\n      <option value=\"2\">PHASE 3<\u002Foption><option value=\"3\">PHASE 4<\u002Foption>\n    <\u002Fselect>\n    <button class=\"dt-btn on\" data-d=\"0\" onclick=\"dayType(0)\">TRAINING<\u002Fbutton>\n    <button class=\"dt-btn\" data-d=\"1\" onclick=\"dayType(1)\">CONDITIONING<\u002Fbutton>\n    <button class=\"dt-btn\" data-d=\"2\" onclick=\"dayType(2)\">REST<\u002Fbutton>\n    <div class=\"calc-out\" id=\"calc-out\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"note\"><b>Rest-day rule:<\u002Fb> same meals, shake becomes evening snack, drop the extra banana (−150 kcal). Protein never drops.<\u002Fdiv>\n\n  <h3>Daily protein checklist<\u002Fh3>\n  <div class=\"ptotal\">\n    <span class=\"pring\"><svg viewBox=\"0 0 44 44\"><circle class=\"pring-bg\" cx=\"22\" cy=\"22\" r=\"18\"><\u002Fcircle><circle class=\"pring-fg\" id=\"p-ringc\" cx=\"22\" cy=\"22\" r=\"18\" stroke-dasharray=\"113.1\" stroke-dashoffset=\"113.1\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n    <span>PROTEIN<\u002Fspan><span class=\"big\" id=\"p-big\">0g<\u002Fspan><span id=\"p-floor\"><\u002Fspan>\n    <span class=\"streak\" id=\"p-streak\"><\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"chk\" id=\"chk\"><\u002Fdiv>\n\n  <h3>Master meal chart — quantities per phase<\u002Fh3>\n  <div class=\"dietwrap\"><table>\n    <tbody><tr><th>Meal · Time<\u002Fth><th>P1 (3,000)<\u002Fth><th>P2 (3,150)<\u002Fth><th>P3 (3,350)<\u002Fth><th>P4 (3,400/3,000 deload)<\u002Fth><\u002Ftr>\n    <tr><td>BREAKFAST 7:30<\u002Ftd><td>3 eggs + besan chilla 60g + milk 250ml <b>~34g<\u002Fb><\u002Ftd><td class=\"up\">4 eggs ~38g<\u002Ftd><td class=\"up\">4 eggs + chilla 80g ~42g<\u002Ftd><td class=\"up\">5 eggs / 4+paneer 40g ~46g<\u002Ftd><\u002Ftr>\n    <tr><td>MID-AM 10:30<\u002Ftd><td>Sattu 50g OR curd 200g + peanuts <b>~20g<\u002Fb><\u002Ftd><td class=\"up\">same<\u002Ftd><td class=\"up\">+1 fruit ~22g<\u002Ftd><td class=\"up\">sattu 60g / scoop ~25g<\u002Ftd><\u002Ftr>\n    <tr><td>LUNCH 13:30<\u002Ftd><td>Dal 1.5k + paneer 100g + rice 200g + curd <b>~40g<\u002Fb><\u002Ftd><td class=\"up\">rice 250g ~41g<\u002Ftd><td class=\"up\">chicken 150g 3–4×/wk ~45g<\u002Ftd><td class=\"up\">chicken 4×/wk + rice 300g ~45g<\u002Ftd><\u002Ftr>\n    <tr><td>POST-WKT<\u002Ftd><td>Scoop/sattu 50g + banana + milk 300ml + PB + <b>creatine 5g<\u002Fb> <b>~30g<\u002Fb><\u002Ftd><td class=\"up\">+2nd banana ~30g<\u002Ftd><td class=\"up\">scoop + sattu 25g ~35g<\u002Ftd><td class=\"up\">same · deload −banana ~35g<\u002Ftd><\u002Ftr>\n    <tr><td>DINNER 20:30<\u002Ftd><td>3 roti + dal + paneer/tofu 80g <b>~30g<\u002Fb><\u002Ftd><td class=\"up\">4 roti ~32g<\u002Ftd><td class=\"up\">paneer 100g ~34g<\u002Ftd><td class=\"up\">+ghee 1tsp train-days ~34g<\u002Ftd><\u002Ftr>\n    <tr><td>BED 22:30<\u002Ftd><td>Milk 200ml <b>~7g<\u002Fb><\u002Ftd><td class=\"up\">250ml ~8g<\u002Ftd><td class=\"up\">+4 almonds ~9g<\u002Ftd><td class=\"up\">same ~9g<\u002Ftd><\u002Ftr>\n    <tr><td><b>TOTALS<\u002Fb><\u002Ftd><td><b>~3,000 · 161g<\u002Fb><\u002Ftd><td><b>~3,150 · 169g<\u002Fb><\u002Ftd><td><b>~3,350 · 187g<\u002Fb><\u002Ftd><td><b>~3,400 · 194g<\u002Fb><\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <div class=\"note green\"><b>Gear-shift triggers:<\u002Fb> cross 66kg → P2 · cross 69kg → P3 · flat 2 weeks → jump early · &gt;1kg/week → −150 kcal.<\u002Fdiv>\n  <h3>Supplements — complete stack<\u002Fh3>\n  <table>\n    <tbody><tr><th>Item<\u002Fth><th>Dose<\u002Fth><th>Note<\u002Fth><\u002Ftr>\n    <tr><td>CREATINE<\u002Ftd><td>5g daily forever<\u002Ftd><td>Monohydrate ~₹500–700/250g<\u002Ftd><\u002Ftr>\n    <tr><td>PLANT PROTEIN<\u002Ftd><td>1–2 scoops<\u002Ftd><td>Pea+rice ~₹1.5–2k/kg · budget: sattu 2×50g<\u002Ftd><\u002Ftr>\n    <tr><td>D3 / B12 / ALGAE Ω-3<\u002Ftd><td>2000 IU · 500mcg · 500mg<\u002Ftd><td>Continue ✓<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n  <div class=\"note\"><b>Never buy:<\u002Fb> mass gainers, BCAAs, fat burners, pre-workouts.<\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"prog\">\n  <h2>Progress — Logs, Adherence &amp; Backup<\u002Fh2>\n  <p class=\"phase-meta\">Numbers going up = plan working.<\u002Fp>\n  <h3>Bodyweight trend<\u002Fh3>\n  <div class=\"hist\" id=\"bw-hist\">No entries yet.<\u002Fdiv>\n  <h3>Session adherence — recent<\u002Fh3>\n  <div class=\"hist\" id=\"sess-hist\">Mark sessions done from each day's button.<\u002Fdiv>\n  <h3>Lift history<\u002Fh3>\n  <select class=\"prog-sel\" id=\"prog-sel\" onchange=\"progShow()\"><option value=\"\">— exercises you've logged —<\u002Foption><\u002Fselect>\n  <div class=\"hist\" id=\"prog-hist\">Log sets and they appear here.<\u002Fdiv>\n  <h3>Backup &amp; restore<\u002Fh3>\n  <button class=\"exportbtn\" onclick=\"exportLog()\">COPY BACKUP (JSON)<\u002Fbutton>\n  <span id=\"exp-ok\" class=\"saved\" style=\"margin-left:10px\"><\u002Fspan>\n  <textarea class=\"impbox\" id=\"impbox\" placeholder=\"Paste a backup JSON here to restore…\"><\u002Ftextarea>\n  <button class=\"exportbtn\" onclick=\"importLog()\">IMPORT BACKUP<\u002Fbutton>\n  <span id=\"imp-ok\" class=\"saved\" style=\"margin-left:10px\"><\u002Fspan>\n  <div class=\"note\" style=\"margin-top:12px\"><b>Data lives on this device.<\u002Fb> Copy the backup into Notes/WhatsApp weekly.<\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <b>The loop:<\u002Fb> start the phase → open today → log every set → mark session done → tick every meal → pass the gate. <b>Deload valve:<\u002Fb> week 6+ or 2 weak sessions in a row → toggle DELOAD for one week (60% sets, no sprints), then resume.\n<\u002Ffooter>\n<\u002Fdiv>\n\n<script>\n/* ============ STATIC DATA ============ */\nconst W={push:[\"<b>Arm circles<\u002Fb> — 20 each way\",\"<b>Wall push-ups<\u002Fb> — 15 slow\",\"<b>Towel shoulder dislocates<\u002Fb> — 10 wide-grip\",\"<b>Side-lying external rotation<\u002Fb> — 1×12/side, 2–3kg DB\"],\npull:[\"<b>Cat-cow<\u002Fb> — 10\",\"<b>Scapular retractions<\u002Fb> — 15, 2s squeeze\",\"<b>Dead hang<\u002Fb> — 30s\"],\nlegs:[\"<b>Bodyweight squats<\u002Fb> — 15 slow, full depth\",\"<b>Walking lunges<\u002Fb> — 10 total\",\"<b>Leg swings<\u002Fb> — 10 front-back each leg\"],\nsho:[\"<b>Arm circles<\u002Fb> — 20 each way\",\"<b>Wall angels<\u002Fb> — 12 slow\",\"<b>Pike push-ups<\u002Fb> — 8\",\"<b>Side-lying external rotation<\u002Fb> — 1×12/side light\"],\nvol:[\"<b>Arm circles<\u002Fb> — 20 each way\",\"<b>Scapular push-ups<\u002Fb> — 12\",\"<b>Cat-cow<\u002Fb> — 10\"]};\nconst C={push:[\"Doorframe chest stretch — 30s/side\",\"Overhead tricep stretch — 30s/arm\",\"Cross-body shoulder stretch — 30s/arm\"],\npull:[\"Doorframe lat stretch — 30s/side\",\"Bicep wall stretch — 30s/arm\",\"Thread-the-needle — 30s/side\"],\nlegs:[\"Standing quad stretch — 30s/leg\",\"Standing hamstring fold — 30s\",\"Pigeon pose — 45s/side\"],\nsho:[\"Cross-body shoulder stretch — 30s/arm\",\"Overhead tricep stretch — 30s/arm\",\"Neck side stretch — 20s/side\"],\nvol:[\"Doorframe chest stretch — 30s/side\",\"Doorframe lat stretch — 30s/side\",\"Seated forward fold — 45s\"]};\nconst RAMP=\"RAMP: empty/light ×10 → 50% ×6 → 75% ×3 → work sets\";\nconst ORDER=['p1','p2','p3','p4'];\nconst BWGATE={p1:66,p2:68.5,p3:70,p4:72};\n\nconst PHASES={\np1:{title:\"Phase 1 — Foundation\",meta:\"Months 0–3 · <b>Goal:<\u002Fb> movement mastery, eating habit, first strength · <b>Conditioning:<\u002Fb> 2× LISS\",\nnote:\"<b>Why this phase ll};\n  const btn=document.getElementById('t-'+id);if(btn){btn.classList.add('run');btn.textContent=fmt(sec);}\n  if(typeof restOvOpen==='function')restOvOpen(id,sec);\n  _rest.timer=setInterval(()=>{\n    if(!_rest)return;_rest.left--;\n    const b=document.getElementById('t-'+_rest.id);\n    if(_rest.left<=0){\n      clearInterval(_rest.timer);const rid=_rest.id;_rest=null;buzz();\n      if(b){b.classList.remove('run');b.textContent='GO — LIFT';setTimeout(()=>{const b2=document.getElementById('t-'+rid);if(b2)b2.textContent='REST '+fmt(sec);},2500);}\n      if(typeof restOvGo==='function')restOvGo();\n    }else{ if(b)b.textContent=fmt(_rest.left); if(typeof restOvTick==='function')restOvTick(_rest.left,_rest.total); }\n  },1000);\n}\nfunction clearRest(){ if(_rest&&_rest.timer)clearInterval(_rest.timer); if(_rest){const b=document.getElementById('t-'+_rest.id);if(b){b.classList.remove('run');b.textContent='REST '+fmt(_rest.total);}} _rest=null; }\nfunction restAdd(sec){ if(_rest){_rest.left+=sec;_rest.total+=sec; if(typeof restOvTick==='function')restOvTick(_rest.left,_rest.total);} }\nfunction restSkip(){ clearRest(); if(typeof restOvClose==='function')restOvClose(); }\nasync function logSetStep(id){\n  const cfg=findCfg(id)||{s:3,lo:8,hi:12};const d=DRAFT[id];if(!d)return;const n=setsOf(cfg);\n  d.logged[d.set]=d.reps;tick();\n  const restS=REST[id]||0;const autoRest=twGet('autoRest','on')!=='off';\n  if(d.set<n-1){\n    d.set++;renderTrk(id);persistDraft();if(typeof updateSess==='function')updateSess(id);if(restS&&autoRest)startRest(id,restS);\n  }else{\n    if(!DB.log[id])DB.log[id]=[];\n    const w=(cfg.m==='b')?'':(d.w>0?String(d.w):'');\n    DB.log[id].push({w,reps:d.logged.slice(0,n).map(x=>String(x)),d:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})});\n    if(DB.log[id].length>40)DB.log[id]=DB.log[id].slice(-40);\n    DRAFT[id]={set:0,w:d.w,reps:(cfg.m==='t'?Math.max(5,cfg.lo):cfg.lo)||8,logged:[]};\n    await saveDB();progFill();\n    renderTrk(id);if(typeof updateSess==='function')updateSess(id);if(restS&&autoRest)startRest(id,restS);\n    const b=document.getElementById('ls-'+id);if(b){b.classList.add('flash');b.textContent='LOGGED ✓';setTimeout(()=>{const bb=document.getElementById('ls-'+id);if(bb){bb.classList.remove('flash');bb.textContent='LOG SET ✓';}},1000);}\n  }\n}\nfunction renderLast(id){\n  const el=document.querySelector(`[data-last=\"${id}\"]`);if(!el)return;\n  const h=DB.log[id];\n  if(h&&h.length){const L=h[h.length-1];const cfg=findCfg(id);\n    const allTop=cfg&&L.reps.length===cfg.s&&L.reps.every(r=>parseInt(r)>=cfg.hi)&&cfg.hi<99;\n    el.innerHTML=`${L.w?L.w+'kg × ':''}${L.reps.join('/')}<small>${L.d} · ${h.length} logged<\u002Fsmall>${allTop?'<span class=\"badge\">ADD WEIGHT ✚<\u002Fspan>':''}`;\n  }else el.innerHTML=`—<small>no log yet<\u002Fsmall>`;\n}\nasync function logSet(id,n){\n  const wEl=document.getElementById('w-'+id);const w=wEl?wEl.value.trim():'';\n  const reps=[];for(let i=0;i<n;i++){const v=document.getElementById(`r-${id}-${i}`).value.trim();if(v!=='')reps.push(v);}\n  if(!reps.length)return;\n  if(!DB.log[id])DB.log[id]=[];\n  DB.log[id].push({w,reps,d:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})});\n  if(DB.log[id].length>40)DB.log[id]=DB.log[id].slice(-40);\n  await saveDB();renderLast(id);progFill();\n  const b=document.getElementById('b-'+id);b.textContent='SAVED ✓';setTimeout(()=>b.textContent='LOG',900);\n}\n\n/* ============ TIMER ============ */\nconst timers={};\nfunction fmt(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}\nfunction buzz(){if(twGet('haptics','on')!=='off'&&navigator.vibrate)navigator.vibrate([250,120,250]);\n  try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();\n  o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.14;o.start();\n  o.frequency.setValueAtTime(660,a.currentTime+.18);o.stop(a.currentTime+.4);}catch(e){}}\nfunction restTimer(id,sec){\n  if(_rest&&_rest.id===id){ restSkip(); return; }\n  startRest(id,sec);\n}\n\n/* ============ BODYWEIGHT ============ */\nasync function logBW(){\n  const v=document.getElementById('bw-in').value.trim();if(!v)return;\n  DB.bw.push({w:parseFloat(v),d:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})});\n  if(DB.bw.length>60)DB.bw=DB.bw.slice(-60);\n  await saveDB();document.getElementById('bw-in').value='';renderAll();\n}\nfunction bwRender(){\n  const s=document.getElementById('bw-stat');\n  if(!DB.bw.length){s.innerHTML='—<small>log weekly, Sunday morning<\u002Fsmall>';}\n  else{const L=DB.bw[DB.bw.length-1],P=DB.bw.length>1?DB.bw[DB.bw.length-2]:null;\n    const dlt=P?(L.w-P.w):0;const ar=P?(dlt>0?`▲ +${dlt.toFixed(1)}`:dlt<0?`▼ ${dlt.toFixed(1)}`:'—'):'';\n    s.innerHTML=`${L.w}kg ${ar}<small>${L.d} · target 75kg<\u002Fsmall>`;}\n  const h=document.getElementById('bw-hist');\n  h.innerHTML=DB.bw.length?DB.bw.slice(-8).map(e=>`${e.d} — <b>${e.w}kg<\u002Fb>`).join('<br>')+`<br><span style=\"color:var(--gold)\">Rule: +0.25–0.5kg/wk. Flat 2 wks = eat more.<\u002Fspan>`:'No entries yet.';\n  const sp=document.getElementById('bw-spark');\n  if(sp){\n    const arr=DB.bw.slice(-12).map(e=>+e.w);\n    if(arr.length<2){sp.innerHTML='';}\n    else{const mn=Math.min(...arr)-0.15,mx=Math.max(...arr)+0.15,W=96,H=30,n=arr.length;\n      const pt=arr.map((v,i)=>[ (i/(n-1)*W).toFixed(1), (H-2-((v-mn)/(mx-mn))*(H-4)).toFixed(1) ]);\n      const line='M'+pt.map(p=>p[0]+' '+p[1]).join(' L');\n      const area=line+` L${W} ${H} L0 ${H} Z`;\n      sp.innerHTML=`<svg viewBox=\"0 0 ${W} ${H}\" width=\"${W}\" height=\"${H}\"><path d=\"${area}\" fill=\"rgba(255,122,60,.13)\"><\u002Fpath><path d=\"${line}\" fill=\"none\" stroke=\"var(--dawn)\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"${pt[n-1][0]}\" cy=\"${pt[n-1][1]}\" r=\"2.4\" fill=\"var(--dawn)\"><\u002Fcircle><\u002Fsvg>`;\n    }\n  }\n}\n\n/* ============ SESSION DONE / ADHERENCE ============ */\nfunction sessKey(ph,i){return `${ph}-${i}`;}\nfunction doneToday(ph,i){const t=isoToday();return DB.sess.some(s=>s.k===sessKey(ph,i)&&s.d===t);}\nasync function markDone(ph,i){\n  if(doneToday(ph,i))return;\n  const note=document.getElementById(`note-${ph}-${i}`).value.trim();\n  DB.sess.push({k:sessKey(ph,i),d:isoToday(),n:note});\n  if(DB.sess.length>200)DB.sess=DB.sess.slice(-200);\n  await saveDB();renderAll();\n}\nfunction weekCount(){const now=Date.now();return DB.sess.filter(s=>now-new Date(s.d).getTime()<604800000).length;}\nfunction sessRender(){\n  const h=document.getElementById('sess-hist');\n  if(!DB.sess.length){h.textContent='Mark sessions done from each day\\u2019s button.';return;}\n  h.innerHTML=DB.sess.slice(-8).reverse().map(s=>{\n    const [ph,i]=s.k.split('-');const day=PHASES[ph]?.days[+i];\n    return `${dispDate(s.d)} — <b>${ph.toUpperCase()} · ${day?day.t:s.k}<\u002Fb>${s.n?` · <span style=\"color:var(--gold)\">\"${s.n}\"<\u002Fspan>`:''}`;}).join('<br>');\n}\n\n/* ============ DIET ============ */\nconst KCAL=[3000,3150,3350,3400],FLOOR=[150,160,168,172];\nconst PVAL=[[34,20,40,30,30,7],[38,20,41,30,32,8],[42,22,45,35,34,9],[46,25,45,35,34,9]];\nconst MEALS=[\"Breakfast — eggs + besan chilla + milk\",\"Mid-AM — sattu / curd + peanuts\",\"Lunch — dal + paneer/chicken + rice + curd\",\"Post-workout — shake + creatine 5g\",\"Dinner — roti + dal + paneer/tofu\",\"Bed — milk\"];\nlet dayT=0;\nfunction dayType(i){dayT=i;document.querySelectorAll('.dt-btn').forEach(b=>b.classList.toggle('on',+b.dataset.d===i));calcUpdate();}\nfunction calcUpdate(){\n  const p=+document.getElementById('calc-phase').value;\n  let k=KCAL[p],note='training day';\n  if(dayT===1){k+=250;note='conditioning: +250 kcal (extra rice + banana)';}\n  if(dayT===2){k-=150;note='rest: shake → evening snack, −banana';}\n  if(DB.deload){note+=' · deload week: hold, don\\u2019t push surplus';}\n  document.getElementById('calc-out').innerHTML=`${k.toLocaleString()} kcal · ${FLOOR[p]}g protein<small>${note}<\u002Fsmall>`;\n  chkRender(p);\n}\nfunction todayStr(){return new Date().toDateString();}\nfunction dietRollover(){\n  const t=todayStr();\n  if(DB.diet.date&&DB.diet.date!==t){DB.diet.streak=DB.diet.hit?(DB.diet.streak+1):0;DB.diet.checks=[0,0,0,0,0,0];DB.diet.hit=false;}\n  DB.diet.date=t;\n}\nfunction chkRender(p){\n  const wrap=document.getElementById('chk');\n  wrap.innerHTML=MEALS.map((m,i)=>`<label class=\"${DB.diet.checks[i]?'done':''}\"><input type=\"checkbox\" ${DB.diet.checks[i]?'checked':''} onchange=\"chkToggle(${i})\"> ${m}<span class=\"pv\">${PVAL[p][i]}g<\u002Fspan><\u002Flabel>`).join('');\n  const tot=DB.diet.checks.reduce((a,c,i)=>a+(c?PVAL[p][i]:0),0);\n  const big=document.getElementById('p-big');big.textContent=tot+'g';big.classList.toggle('miss',tot<FLOOR[p]);\n  document.getElementById('p-floor').textContent=`/ floor ${FLOOR[p]}g`;\n  document.getElementById('p-streak').innerHTML=`STREAK ${DB.diet.streak}<br><small style=\"color:var(--muted)\">days at floor<\u002Fsmall>`;\n  const ring=document.getElementById('p-ringc');\n  if(ring){const C=113.1,pct=Math.min(1,tot/FLOOR[p]),hit=tot>=FLOOR[p];\n    ring.setAttribute('stroke-dashoffset',(C*(1-pct)).toFixed(1));\n    ring.style.stroke=hit?'var(--green)':'var(--gold)';}\n  DB.diet.hit=tot>=FLOOR[p];\n}\nasync function chkToggle(i){DB.diet.checks[i]=DB.diet.checks[i]?0:1;chkRender(+document.getElementById('calc-phase').value);await saveDB();}\n\n/* ============ DELOAD + PHOTO + STATUS ============ */\nasync function toggleDeload(){DB.deload=!DB.deload;await saveDB();renderAll();}\nfunction photoDue(){if(!DB.photo)return !!DB.start[DB.phase];return (Date.now()-new Date(DB.photo).getTime())>2592000000;}\nasync function photoDone(){DB.photo=isoToday();await saveDB();renderAll();}\nfunction statusRender(){\n  const st=document.getElementById('status');const ph=DB.phase;const wk=weekOf(ph);\n  let html=`<span class=\"st\">PHASE <b>${ph.slice(1)}<\u002Fb>${wk?` · WEEK <b>${wk}<\u002Fb>`:' · not started'}<\u002Fspan>`;\n  html+=`<span class=\"st\">THIS WEEK <b>${weekCount()}/5<\u002Fb> sessions<\u002Fspan>`;\n  html+=`<span class=\"st toggle ${DB.deload?'on':''}\" onclick=\"toggleDeload()\">${DB.deload?'DELOAD ON — 60% sets, no sprints':'DELOAD OFF'}<\u002Fspan>`;\n  if(!DB.deload&&wk>=6)html+=`<span class=\"st alert\">DELOAD DUE (week ${wk})<button onclick=\"toggleDeload()\">enable<\u002Fbutton><\u002Fspan>`;\n  if(photoDue())html+=`<span class=\"st warn\">📸 progress photo due<button onclick=\"photoDone()\">done ✓<\u002Fbutton><\u002Fspan>`;\n  st.innerHTML=html;\n}\n\n/* ============ PROGRESS + BACKUP ============ */\nfunction progFill(){\n  const sel=document.getElementById('prog-sel');const cur=sel.value;\n  const opts=Object.keys(DB.log).filter(k=>DB.log[k].length).map(k=>`<option value=\"${k}\" ${k===cur?'selected':''}>${NAMES[k]||k}<\u002Foption>`);\n  sel.innerHTML=`<option value=\"\">— exercises you've logged (${opts.length}) —<\u002Foption>`+opts.join('');progShow();\n}\nfunction progShow(){\n  const id=document.getElementById('prog-sel').value;const out=document.getElementById('prog-hist');\n  if(!id||!DB.log[id]){out.textContent='Log sets and they appear here.';return;}\n  out.innerHTML=DB.log[id].slice(-5).reverse().map(e=>`${e.d} — <b>${e.w?e.w+'kg × ':''}${e.reps.join('/')}<\u002Fb>`).join('<br>');\n}\nasync function exportLog(){\n  const txt=JSON.stringify(DB);\n  try{await navigator.clipboard.writeText(txt);}catch(e){const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();}\n  document.getElementById('exp-ok').textContent='COPIED ✓';setTimeout(()=>document.getElementById('exp-ok').textContent='',1600);\n}\nasync function importLog(){\n  const v=document.getElementById('impbox').value.trim();if(!v)return;\n  try{const d=JSON.parse(v);if(typeof d!=='object'||!d.log)throw 0;DB={...DB,...d};await saveDB();renderAll();\n    document.getElementById('imp-ok').textContent='RESTORED ✓';document.getElementById('impbox').value='';}\n  catch(e){document.getElementById('imp-ok').textContent='INVALID JSON ✗';}\n  setTimeout(()=>document.getElementById('imp-ok').textContent='',2000);\n}\n\n/* ============ RENDER ============ */\nfunction gateHTML(ph){\n  const items=PHASES[ph].exit.map((txt,i)=>{\n    const met=gateMet(ph,i);\n    if(i===0){const hint=`auto — current: ${bwNow()||'—'}kg / needs ${BWGATE[ph]}kg`;\n      return `<label class=\"auto ${met?'met':''}\"><input type=\"checkbox\" disabled ${met?'checked':''}> <span>${txt}<span class=\"hint\">${hint}<\u002Fspan><\u002Fspan><span class=\"autotag\">AUTO<\u002Fspan><\u002Flabel>`;}\n    let hint='';\n    if(ph==='p1'&&i===3)hint=`<span class=\"hint\">current streak: ${DB.diet.streak} days<\u002Fspan>`;\n    return `<label class=\"${met?'met':''}\"><input type=\"checkbox\" ${met?'checked':''} onchange=\"gateToggle('${ph}',${i})\"> <span>${txt}${hint}<\u002Fspan><\u002Flabel>`;});\n  const nxt=ORDER[ORDER.indexOf(ph)+1];\n  const label=nxt?`ADVANCE TO PHASE ${nxt.slice(1)} →`:'MARK TARGET ACHIEVED 🏆';\n  const btn=DB.advanced[ph]?`<div class=\"note green\"><b>Gate passed ${dispDate(DB.advanced[ph])}.<\u002Fb>${nxt?'':' Maintenance mode: 3 sessions/week, maintenance calories, hold strength within 90%.'}<\u002Fdiv>`\n    :`<button class=\"advbtn\" ${allMet(ph)?'':'disabled'} onclick=\"advance('${ph}')\">${allMet(ph)?label:'COMPLETE ALL CRITERIA TO UNLOCK →'}<\u002Fbutton>`;\n  return `<h3>Phase gate — exit criteria<\u002Fh3><div class=\"gate\">${items.join('')}<\u002Fdiv>${btn}`;\n}\nfunction bannerHTML(ph){\n  const idx=ORDER.indexOf(ph),act=actIdx();\n  if(DB.advanced[ph])return `<div class=\"pbanner\"><span class=\"done\">COMPLETED ✓<\u002Fspan><span>started ${DB.start[ph]?dispDate(DB.start[ph]):'—'} · passed ${dispDate(DB.advanced[ph])}<\u002Fspan><\u002Fdiv>`;\n  if(idx>act)return `<div class=\"pbanner\"><span class=\"lock\">🔒 PREVIEW — unlocks when Phase ${act+1} gate is passed. Read ahead freely.<\u002Fspan><\u002Fdiv>`;\n  if(!DB.start[ph])return `<div class=\"pbanner\"><button class=\"startbtn\" onclick=\"startPhase('${ph}')\">▶ START PHASE ${ph.slice(1)} — begin the clock<\u002Fbutton><span class=\"lock\">week tracking + photo reminders begin from this date<\u002Fspan><\u002Fdiv>`;\n  const wk=weekOf(ph);\n  return `<div class=\"pbanner\"><span class=\"wk\">ACTIVE · started ${dispDate(DB.start[ph])} · WEEK ${wk}<\u002Fspan>${(!DB.deload&&wk>=6)?'<span class=\"deldue\">DELOAD DUE — toggle it in the header<\u002Fspan>':''}${DB.deload?'<span style=\"color:var(--blue)\">DELOAD WEEK — 60% sets, no sprints<\u002Fspan>':''}<\u002Fdiv>`;\n}\nfunction dayHTML(ph,day,i,isToday){\n  const done=doneToday(ph,i);\n  const list=effExList(ph,i);\n  const sp=(typeof sessionProgress==='function')?sessionProgress(ph,i):{done:0,total:0,pct:0};\n  return `<details${isToday?' open class=\"today\"':''}>\n    <summary><span class=\"day\">${day.d}<\u002Fspan><span class=\"dt\">${day.t}<\u002Fspan>${isToday?'<span class=\"tdy\">TODAY<\u002Fspan>':''}<span class=\"focus\">${day.f}<\u002Fspan><\u002Fsummary>\n    <div class=\"body\">\n      <div class=\"sessbar\"><div class=\"sessbar-fill\" id=\"sfill-${ph}-${i}\" style=\"width:${sp.pct}%\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"sessbar-lab\" id=\"slab-${ph}-${i}\">SESSION · ${sp.done}/${sp.total} sets · ${sp.pct}%<\u002Fdiv>\n      <div class=\"block-label warm\">Warm-up · 5–6 min dynamic<\u002Fdiv>\n      <ul class=\"simple\">${W[day.w].map(x=>`<li>${x}<\u002Fli>`).join('')}<\u002Ful>\n      <div class=\"block-label main\">Main work · RIR 1–2<\u002Fdiv>\n      ${list.map(exHTML).join('')}\n      <div class=\"block-label cool\">Cool-down · 3 static<\u002Fdiv>\n      <ul class=\"simple\">${C[day.c].map(x=>`<li>${x}<\u002Fli>`).join('')}<\u002Ful>\n      <div class=\"sess\">\n        <input id=\"note-${ph}-${i}\" placeholder=\"optional note — pain, energy, PRs…\" ${done?'disabled':''}>\n        <button ${done?'disabled':''} onclick=\"markDone('${ph}',${i})\">${done?'DONE TODAY ✓':'MARK SESSION DONE ✓'}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv><\u002Fdetails>`;\n}\nfunction renderAll(){\n  const dow=new Date().getDay();const todayIdx=(dow>=2&&dow<=6)?dow-2:-1;\n  for(const key of ORDER){\n    const P=PHASES[key];\n    document.getElementById(key).innerHTML=\n      `<div class=\"ph-head\"><h2>${P.title}<\u002Fh2><button class=\"mp-open\" onclick=\"mpOpen('${key}')\">✎ Manage plan<\u002Fbutton><\u002Fdiv>\n       <p class=\"phase-meta\">${P.meta}<\u002Fp>${bannerHTML(key)}<div class=\"note\">${P.note}<\u002Fdiv>\n       ${P.days.map((d,i)=>dayHTML(key,d,i,key===DB.phase&&i===todayIdx&&!!DB.start[key])).join('')}\n       ${(typeof staminaCardHTML==='function')?staminaCardHTML(key):''}\n       ${gateHTML(key)}`;\n  }\n  Object.keys(DB.log).forEach(renderLast);\n  if(typeof railRender==='function')railRender();\n  const cp=document.getElementById('calc-phase');cp.value=String(actIdx());\n  bwRender();statusRender();sessRender();calcUpdate();progFill();\n  const shown=document.querySelector('section.show');\n  if(!shown){document.querySelectorAll('.rail button').forEach(b=>b.classList.toggle('active',b.dataset.t===DB.phase));\n    document.querySelectorAll('section').forEach(s=>s.classList.toggle('show',s.id===DB.phase));}\n}\ndocument.querySelectorAll('.rail button').forEach(b=>b.addEventListener('click',()=>{\n  document.querySelectorAll('.rail button').forEach(x=>x.classList.remove('active'));b.classList.add('active');\n  document.querySelectorAll('section').forEach(s=>s.classList.toggle('show',s.id===b.dataset.t));\n  window.scrollTo({top:0,behavior:'smooth'});\n}));\n/* load() is invoked at the end of the feature script below, once all helpers are defined */\n<\u002Fscript>\n\n<style id=\"feat-css\">\n/* phase header + manage button */\n.ph-head{display:flex;align-it 1C','#F43F5E','#A78BFA','#38BDF8','#A3E635'];\n  const GLD=['#FFC85C','#FFD700','#F59E0B','#4ADE80','#5CA8FF'];\n  const DEF={display:0,body:0,mono:0,fs:15,round:12,accent:'#FF7A3C',gold:'#FFC85C',surface:'navy',border:'def',motion:'full',density:'cozy',wstep:'2.5',stp:'std',autoRest:'on',haptics:'on'};\n  let st=Object.assign({},DEF);\n  try{const s=localStorage.getItem('apex-tweaks');if(s)st=Object.assign({},DEF,JSON.parse(s));}catch(e){}\n  const loaded={};\n  function loadFont(t){if(!t||loaded[t])return;loaded[t]=1;const l=document.createElement('link');l.rel='stylesheet';l.href=t[0]==='g'?'https://fonts.googleapis.com/css2?family='+t.slice(2)+'&display=swap':'https://api.fontshare.com/v2/css?f[]='+t.slice(3)+'&display=swap';document.head.appendChild(l);}\n  const rs=document.documentElement.style;\n  const moStyle=document.createElement('style');document.head.appendChild(moStyle);\n  const densStyle=document.createElement('style');document.head.appendChild(densStyle);\n  function apply(){\n    const d=FONTS.display[st.display],b=FONTS.body[st.body],m=FONTS.mono[st.mono];\n    loadFont(d[2]);loadFont(b[2]);loadFont(m[2]);\n    rs.setProperty('--font-display',d[1]);rs.setProperty('--font-body',b[1]);rs.setProperty('--font-mono',m[1]);\n    rs.setProperty('--fs-base',st.fs+'px');\n    rs.setProperty('--r-md',st.round+'px');rs.setProperty('--r-sm',Math.max(4,st.round-3)+'px');rs.setProperty('--r-lg',(st.round+2)+'px');\n    rs.setProperty('--dawn',st.accent);rs.setProperty('--gold',st.gold);\n    const S=SURF[st.surface]||SURF.navy;rs.setProperty('--ink',S.ink);rs.setProperty('--panel',S.panel);rs.setProperty('--panel2',S.panel2);\n    rs.setProperty('--line',st.border==='sub'?'rgba(255,255,255,.06)':st.border==='bold'?'rgba(255,255,255,.17)':S.line);\n    rs.setProperty('--stp-btn',st.stp==='lg'?'56px':st.stp==='sm'?'42px':'48px');\n    rs.setProperty('--stp-val',st.stp==='lg'?'36px':st.stp==='sm'?'26px':'30px');\n    const dens=st.density==='compact'?.8:st.density==='roomy'?1.18:1;\n    densStyle.textContent=dens===1?'':`.body{padding:${(2*dens).toFixed(1)}px 15px ${Math.round(15*dens)}px}.ex{padding:${Math.round(11*dens)}px 0}.trk{padding:${Math.round(12*dens)}px}.note{padding:${Math.round(12*dens)}px 14px}details{margin-bottom:${Math.round(10*dens)}px}h3{margin:${Math.round(26*dens)}px 0 ${Math.round(10*dens)}px}`;\n    moStyle.textContent=st.motion==='off'?'*,*::before,*::after{animation:none!important;transition:none!important}':st.motion==='red'?'*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important}':'';\n    window.APEX_TW=st;\n    try{localStorage.setItem('apex-tweaks',JSON.stringify(st));}catch(e){}\n  }\n  const panel=document.getElementById('tw-panel');\n  const body=panel.querySelector('.tw-body');\n  const opt=(list,sel)=>list.map((f,i)=>'<option value=\"'+i+'\"'+(i===sel?' selected':'')+'>'+f[0]+'<\u002Foption>').join('');\n  const sw=(list,cur,k)=>'<div class=\"tw-swatches\" data-k=\"'+k+'\">'+list.map(c=>'<button class=\"tw-sw'+(c===cur?' on':'')+'\" data-c=\"'+c+'\" style=\"background:'+c+'\"><\u002Fbutton>').join('')+'<\u002Fdiv>';\n  const seg=(opts,cur,k)=>'<div class=\"tw-seg\" data-k=\"'+k+'\">'+opts.map(o=>'<button class=\"'+(o[0]===cur?'on':'')+'\" data-v=\"'+o[0]+'\">'+o[1]+'<\u002Fbutton>').join('')+'<\u002Fdiv>';\n  function render(){\n    body.innerHTML=\n      '<div class=\"tw-sec\"><div class=\"tw-lab\">Typography<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Display font<\u002Fdiv><select class=\"tw-sel\" data-k=\"display\">'+opt(FONTS.display,st.display)+'<\u002Fselect><\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Body font<\u002Fdiv><select class=\"tw-sel\" data-k=\"body\">'+opt(FONTS.body,st.body)+'<\u002Fselect><\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Mono / data font<\u002Fdiv><select class=\"tw-sel\" data-k=\"mono\">'+opt(FONTS.mono,st.mono)+'<\u002Fselect><\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Base text size<b>'+st.fs+'px<\u002Fb><\u002Fdiv><input class=\"tw-range\" type=\"range\" min=\"13\" max=\"18\" step=\"1\" value=\"'+st.fs+'\" data-k=\"fs\"><\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"tw-sec\"><div class=\"tw-lab\">Color<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Accent<\u002Fdiv>'+sw(ACC,st.accent,'accent')+'<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Highlight<\u002Fdiv>'+sw(GLD,st.gold,'gold')+'<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Surface theme<\u002Fdiv>'+seg([['navy','Navy'],['black','Black'],['graphite','Graphite'],['warm','Warm']],st.surface,'surface')+'<\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"tw-sec\"><div class=\"tw-lab\">Shape &amp; feel<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Corner roundness<b>'+st.round+'px<\u002Fb><\u002Fdiv><input class=\"tw-range\" type=\"range\" min=\"2\" max=\"20\" step=\"1\" value=\"'+st.round+'\" data-k=\"round\"><\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Borders<\u002Fdiv>'+seg([['sub','Subtle'],['def','Default'],['bold','Bold']],st.border,'border')+'<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Animation<\u002Fdiv>'+seg([['full','Full'],['red','Reduced'],['off','Off']],st.motion,'motion')+'<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Density<\u002Fdiv>'+seg([['compact','Compact'],['cozy','Cozy'],['roomy','Roomy']],st.density,'density')+'<\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<div class=\"tw-sec\"><div class=\"tw-lab\">Workout logger<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Weight step · kg<\u002Fdiv>'+seg([['1.25','1.25'],['2.5','2.5'],['5','5']],st.wstep,'wstep')+'<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Stepper size<\u002Fdiv>'+seg([['sm','Small'],['std','Standard'],['lg','Large']],st.stp,'stp')+'<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Rest auto-start<\u002Fdiv>'+seg([['on','On'],['off','Off']],st.autoRest,'autoRest')+'<\u002Fdiv>'+\n        '<div class=\"tw-row\"><div class=\"tw-cap\">Haptics<\u002Fdiv>'+seg([['on','On'],['off','Off']],st.haptics,'haptics')+'<\u002Fdiv>'+\n      '<\u002Fdiv>'+\n      '<button class=\"tw-reset\">Reset to default<\u002Fbutton>'+\n      '<div class=\"tw-links\"><a href=\"Apex Focus Runner.dc.html\"><b>Redesign A<\u002Fb>Focus Runner<\u002Fa><a href=\"Apex Overview OS.dc.html\"><b>Redesign B<\u002Fb>Overview OS<\u002Fa><\u002Fdiv>'+\n      '<div class=\"tw-note\">Changes preview live and save to this device. They restyle the tracker only — every logged set, gate and streak stays exactly where it was.<\u002Fdiv>';\n  }\n  body.addEventListener('input',e=>{const el=e.target;if(el.classList.contains('tw-range')){st[el.dataset.k]=+el.value;const b=el.closest('.tw-row').querySelector('.tw-cap b');if(b)b.textContent=el.value+'px';apply();}});\n  body.addEventListener('change',e=>{const el=e.target;if(el.classList.contains('tw-sel')){st[el.dataset.k]=+el.value;apply();}});\n  body.addEventListener('click',e=>{\n    const s=e.target.closest('.tw-sw');if(s){const k=s.parentElement.dataset.k;st[k]=s.dataset.c;s.parentElement.querySelectorAll('.tw-sw').forEach(x=>x.classList.toggle('on',x===s));apply();return;}\n    const g=e.target.closest('.tw-seg button');if(g){const k=g.parentElement.dataset.k;st[k]=g.dataset.v;g.parentElement.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===g));apply();return;}\n    if(e.target.classList.contains('tw-reset')){st=Object.assign({},DEF);render();apply();}\n  });\n  function toggle(on){document.getElementById('tw-scrim').classList.toggle('on',on);panel.classList.toggle('on',on);}\n  document.getElementById('tw-gear').addEventListener('click',()=>toggle(true));\n  document.getElementById('tw-scrim').addEventListener('click',()=>toggle(false));\n  panel.querySelector('.x').addEventListener('click',()=>toggle(false));\n  render();apply();\n})();\n<\u002Fscript>\n<script id=\"feat-js\">\n/* ===== inject overlay / manage panel / today FAB ===== */\ndocument.body.insertAdjacentHTML('beforeend',\n  '<div id=\"mp-scrim\"><\u002Fdiv>'+\n  '<aside id=\"mp-panel\"><div class=\"mp-head\"><h4 id=\"mp-title\">Manage plan<\u002Fh4><button class=\"x\" aria-label=\"Close\" onclick=\"mpClose()\">&times;<\u002Fbutton><\u002Fdiv><div class=\"mp-body\" id=\"mp-body\"><\u002Fdiv><\u002Faside>'+\n  '<div id=\"restov\"><div class=\"rov-eyebrow\">Rest<\u002Fdiv><div class=\"rov-ring\"><svg viewBox=\"0 0 100 100\"><circle cx=\"50\" cy=\"50\" r=\"44\" fill=\"none\" stroke=\"rgba(255,255,255,.08)\" stroke-width=\"7\"><\u002Fcircle><circle id=\"rov-arc\" cx=\"50\" cy=\"50\" r=\"44\" fill=\"none\" stroke=\"var(--dawn)\" stroke-width=\"7\" stroke-linecap=\"round\" stroke-dasharray=\"276.5\" stroke-dashoffset=\"0\" style=\"filter:drop-shadow(0 0 8px rgba(255,122,60,.5))\"><\u002Fcircle><\u002Fsvg><div class=\"rov-time\" id=\"rov-time\">0:00<\u002Fdiv><\u002Fdiv><div class=\"rov-next\" id=\"rov-next\"><\u002Fdiv><div class=\"rov-btns\"><button class=\"rov-add\" onclick=\"restAdd(15)\">+15s<\u002Fbutton><button class=\"rov-skip\" onclick=\"restSkip()\">Skip &middot; continue &#9656;<\u002Fbutton><\u002Fdiv><\u002Fdiv>'+\n  '<button id=\"today-fab\" onclick=\"jumpToday()\">&#9656; Today<\u002Fbutton>');\n\n/* ===== small helpers ===== */\nfunction clampInt(v,mn,mx){v=parseInt(v,10);if(isNaN(v))v=mn;return Math.max(mn,Math.min(mx,v));}\nfunction clampNum(v,mn,mx){v=parseFloat(v);if(isNaN(v))v=mn;return Math.max(mn,Math.min(mx,Math.round(v*100)/100));}\nfunction stripTags(s){return String(s==null?'':s).replace(/<[^>]*>/g,'');}\nfunction escAttr(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/\"/g,'&quot;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');}\n\n/* ===== session progress ===== */\nfunction sessionProgress(ph,i){\n  const list=effExList(ph,i);let total=0,done=0;\n  const today=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});\n  list.forEach(e=>{const cfg=cfgOf(e);const n=setsOf(cfg);total+=n;\n    const h=DB.log[e[0]]||[];let s=0;h.forEach(x=>{if(x.d===today)s+=(x.reps?x.reps.length:0);});\n    const dr=DRAFT[e[0]];if(dr&&dr.logged)s+=dr.logged.length;\n    done+=Math.min(n,s);});\n  return {total,done,pct:total?Math.round(done/total*100):0};\n}\nfunction dayOfId(id){for(const ph of ORDER){const P=PHASES[ph];for(let i=0;i<P.days.length;i++){if(effExList(ph,i).some(e=>e[0]===id))return [ph,i];}}return null;}\nfunction updateSess(id){const d=dayOfId(id);if(!d)return;const ph=d[0],i=d[1],sp=sessionProgress(ph,i);\n  const f=document.getElementById('sfill-'+ph+'-'+i),l=document.getElementById('slab-'+ph+'-'+i);\n  if(f)f.style.width=sp.pct+'%';if(l)l.textContent='SESSION · '+sp.done+'/'+sp.total+' sets · '+sp.pct+'%';}\n\n/* ===== stamina add-ons ===== */\nfunction staminaList(ph){\n  if(!DB.stamina[ph]){const seen={},arr=[];(PHASES[ph].days||[]).forEach(d=>{if(d.cond&&!seen[d.cond]){seen[d.cond]=1;arr.push({id:'st'+Math.random().toString(36).slice(2,7),text:d.cond});}});DB.stamina[ph]=arr;}\n  return DB.stamina[ph];\n}\nfunction staminaCardHTML(ph){\n  const list=staminaList(ph);\n  let items;\n  if(!list.length){items='<div class=\"stam-empty\">No stamina add-ons yet.<\u002Fdiv>';}\n  else{items=list.map(s=>{\n    if(_stamEdit===ph+'|'+s.id){\n      return `<div class=\"stam-item edit\"><textarea id=\"scf-${s.id}\" class=\"stam-input\" rows=\"2\">${escAttr(s.text)}<\u002Ftextarea><div class=\"stam-ebtns\"><button class=\"stam-cancel\" onclick=\"stamCancel()\">Cancel<\u002Fbutton><button class=\"stam-savebtn\" onclick=\"stamSaveInline('${ph}','${s.id}')\">Save<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n    }\n    return `<div class=\"stam-item\"><span class=\"stam-txt\">${s.text}${DB.deload&&/sprint/i.test(s.text)?' <b style=\"color:var(--blue)\">(SKIP — deload)<\u002Fb>':''}<\u002Fspan><span class=\"stam-ic\"><button class=\"mp-ic\" title=\"Edit\" onclick=\"stamEditInline('${ph}','${s.id}')\">&#9998;<\u002Fbutton><button class=\"mp-ic del\" title=\"Remove\" onclick=\"stamDelInline('${ph}','${s.id}')\">&#128465;<\u002Fbutton><\u002Fspan><\u002Fdiv>`;\n  }).join('');}\n  return `<h3>Stamina add-ons<\u002Fh3><div class=\"stam\">${items}<button class=\"stam-add\" onclick=\"stamAddInline('${ph}')\">+ Add stamina add-on<\u002Fbutton><\u002Fdiv>`;\n}\nlet _stamEdit=null;\nfunction stamEditInline(ph,id){_stamEdit=ph+'|'+id;renderAll();}\nfunction stamCancel(){_stamEdit=null;renderAll();}\nfunction stamSaveInline(ph,id){const el=document.getElementById('scf-'+id);const t=el?el.value.trim():'';const it=staminaList(ph).find(x=>x.id===id);if(it&&t)it.text=t;_stamEdit=null;saveDB();renderAll();}\nfunction stamDelInline(ph,id){DB.stamina[ph]=staminaList(ph).filter(x=>x.id!==id);_stamEdit=null;saveDB();renderAll();}\nfunction stamAddInline(ph){const l=staminaList(ph);const id='st'+Math.random().toString(36).slice(2,7);l.push({id:id,text:'New conditioning add-on'});_stamEdit=ph+'|'+id;saveDB();renderAll();}\n\n/* ===== arc-spine nav ===== */\nfunction railRender(){\n  const rt=document.getElementById('railtrack');if(!rt)return;\n  const act=actIdx();\n  const meta={p1:['Foundation','M0–3'],p2:['Strength','M3–6'],p3:['Build','M6–12'],p4:['Pro','M12–24']};\n  const shown=document.querySelector('section.show');const cur=shown?shown.id:DB.phase;\n  const nodes=ORDER.map((ph,idx)=>{\n    const done=!!DB.advanced[ph],active=(ph===DB.phase&&!done),locked=idx>act;\n    let cls=done?'done':active?'active':locked?'locked':'';\n    if(ph===cur)cls+=' sel';\n    return `<button class=\"snode ${cls}\" data-t=\"${ph}\"><span class=\"dotn\">${done?'✓':(idx+1)}<\u002Fspan><span class=\"nlab\">${meta[ph][0]}<small>${meta[ph][1]}<\u002Fsmall><\u002Fspan><\u002Fbutton>`;\n  }).join('');\n  const fillPct=Math.max(0,Math.min(1,act/(ORDER.length-1)))*100;\n  const um={cond:['STAMINA','ENGINE'],diet:['FUEL','DIET'],prog:['PROGRESS','LOGS']};\n  const util=['cond','diet','prog'].map(t=>`<button data-t=\"${t}\" class=\"${cur===t?'active':''}\"><span>${um[t][0]}<\u002Fspan><small>${um[t][1]}<\u002Fsmall><\u002Fbutton>`).join('');\n  rt.innerHTML=`<div class=\"spine\"><div class=\"spine-line\"><div class=\"fill\" style=\"width:${fillPct}%\"><\u002Fdiv><\u002Fdiv><div class=\"snodes\">${nodes}<\u002Fdiv><\u002Fdiv><div class=\"util\">${util}<\u002Fdiv>`;\n}\n\n/* ===== rest overlay ===== */\nfunction restOvOpen(id,total){\n  const ov=document.getElementById('restov');if(!ov)return;\n  const nm=NAMES[id]||'',dr=DRAFT[id],cfg=findCfg(id)||{s:3},n=setsOf(cfg);\n  let nx='';if(dr){nx=(dr.logged.length<n)?('Up next · Set '+(dr.logged.length+1)+' of '+n+(nm?' · '+nm:'')):(nm?('Done · '+nm):'Set complete');}\n  document.getElementById('rov-next').textContent=nx;\n  restOvTick(total,total);ov.classList.add('on');\n}\nfunction restOvTick(left,total){\n  const t=document.getElementById('rov-time');if(t)t.textContent=fmt(Math.max(0,Math.ceil(left)));\n  const a=document.getElementById('rov-arc');if(a){const C=276.46,frac=total>0?left/total:0;a.setAttribute('stroke-dashoffset',(C*(1-frac)).toFixed(1));}\n}\nfunction restOvGo(){const t=document.getElementById('rov-time');if(t)t.textContent='GO';const a=document.getElementById('rov-arc');if(a)a.setAttribute('stroke-dashoffset','0');setTimeout(restOvClose,1200);}\nfunction restOvClose(){const ov=document.getElementById('restov');if(ov)ov.classList.remove('on');}\n\n/* ===== jump to today ===== */\nfunction jumpToday(){\n  const ph=DB.phase;\n  document.querySelectorAll('section').forEach(s=>s.classList.toggle('show',s.id===ph));\n  railRender();\n  const dow=new Date().getDay(),todayIdx=(dow>=2&&dow<=6)?dow-2:-1,sec=document.getElementById(ph);\n  if(todayIdx>=0&&sec){const dets=sec.querySelectorAll('details'),d=dets[todayIdx];if(d){d.open=true;const y=d.getBoundingClientRect().top+window.scrollY-70;window.scrollTo({top:y,behavior:'smooth'});return;}}\n  window.scrollTo({top:0,behavior:'smooth'});\n}\n\n/* ===== manage-plan CRUD ===== */\nlet _mpPhase='p1',_mpEdit=null,_mpAdd=null,_mpStamEdit=null;\nfunction mpOpen(ph){_mpPhase=ph;_mpEdit=null;_mpAdd=null;_mpStamEdit=null;mpRender();document.getElementById('mp-scrim').classList.add('on');document.getElementById('mp-panel').classList.add('on');}\nfunction mpClose(){document.getElementById('mp-scrim').classList.remove('on');document.getElementById('mp-panel').classList.remove('on');}\nfunction readForm(pfx){const g=k=>document.getElementById(pfx+'-'+k);return{\n  name:g('name').value.trim(),scheme:g('scheme').value.trim(),\n  s:clampInt(g('s').value,1,10),lo:clampInt(g('lo').value,1,99),hi:clampInt(g('hi').value,1,99),\n  rest:clampInt(g('rest').value,0,600),dw:clampNum(g('dw').value,0,500),\n  cue:g('cue').value.trim(),yt:g('yt').value.trim()};}\nfunction mpForm(e,ph,i,isNew){\n  const cfg=e[7]||{s:3,lo:8,hi:12},pfx=isNew?'af':'mf',sw=isNew?0:startW(e[0]);\n  return `<div class=\"mp-form\">\n    <div class=\"mp-f\"><label>Name<\u002Flabel><input id=\"${pfx}-name\" value=\"${escAttr(e[1])}\"><\u002Fdiv>\n    <div class=\"mp-f\"><label>Scheme text<\u002Flabel><input id=\"${pfx}-scheme\" value=\"${escAttr(e[2])}\" placeholder=\"auto from sets × reps\"><\u002Fdiv>\n    <div class=\"mp-f3\"><div class=\"mp-f\"><label>Sets<\u002Flabel><input id=\"${pfx}-s\" type=\"number\" inputmode=\"numeric\" value=\"${cfg.s}\"><\u002Fdiv><div class=\"mp-f\"><label>Rep low<\u002Flabel><input id=\"${pfx}-lo\" type=\"number\" inputmode=\"numeric\" value=\"${cfg.lo}\"><\u002Fdiv><div class=\"mp-f\"><label>Rep high<\u002Flabel><input id=\"${pfx}-hi\" type=\"number\" inputmode=\"numeric\" value=\"${cfg.hi}\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"mp-f2\"><div class=\"mp-f\"><label>Rest sec<\u002Flabel><input id=\"${pfx}-rest\" type=\"number\" inputmode=\"numeric\" value=\"${e[3]||0}\"><\u002Fdiv><div class=\"mp-f\"><label>Start weight kg<\u002Flabel><input id=\"${pfx}-dw\" type=\"number\" inputmode=\"decimal\" value=\"${sw||0}\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"mp-f\"><label>Cue / notes<\u002Flabel><input id=\"${pfx}-cue\" value=\"${escAttr(e[4]||'')}\"><\u002Fdiv>\n    <div class=\"mp-f\"><label>YouTube search cue<\u002Flabel><input id=\"${pfx}-yt\" value=\"${escAttr(e[5]||'')}\"><\u002Fdiv>\n    <div class=\"mp-f2\"><button class=\"mp-cancel\" onclick=\"${isNew?'mpAddCancel()':`mpEditToggle('${e[0]}')`}\">Cancel<\u002Fbutton><button class=\"mp-save\" onclick=\"${isNew?`mpAddSave('${ph}',${i})`:`mpEditSave('${e[0]}')`}\">Save<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction mpExRow(e,ph,i){\n  const id=e[0],editing=_mpEdit===id;\n  let row=`<div class=\"mp-ex\"><div class=\"mp-ex-row\"><span class=\"nm\">${e[1]}<\u002Fspan><span class=\"sc\">${e[2]}<\u002Fspan><button class=\"mp-ic\" title=\"Edit\" onclick=\"mpEditToggle('${id}')\">&#9998;<\u002Fbutton><button class=\"mp-ic del\" title=\"Remove\" onclick=\"mpDel('${id}','${ph}',${i})\">&#128465;<\u002Fbutton><\u002Fdiv>`;\n  if(editing)row+=mpForm(e,ph,i,false);\n  return row+`<\u002Fdiv>`;\n}\nfunction mpStamRow(s,ph){\n  const editing=_mpStamEdit===s.id;\n  let row=`<div class=\"mp-ex\"><div class=\"mp-ex-row\"><span class=\"nm\" style=\"font-weight:500;font-size:12.5px\">${stripTags(s.text)}<\u002Fspan><button class=\"mp-ic\" title=\"Edit\" onclick=\"mpStamEditToggle('${ph}','${s.id}')\">&#9998;<\u002Fbutton><button class=\"mp-ic del\" title=\"Remove\" onclick=\"mpStamDel('${ph}','${s.id}')\">&#128465;<\u002Fbutton><\u002Fdiv>`;\n  if(editing)row+=`<div class=\"mp-form\"><div class=\"mp-f\"><label>Stamina add-on<\u002Flabel><textarea id=\"sf-text\" rows=\"2\">${escAttr(s.text)}<\u002Ftextarea><\u002Fdiv><div class=\"mp-f2\"><button class=\"mp-cancel\" onclick=\"mpStamEditToggle('${ph}','${s.id}')\">Cancel<\u002Fbutton><button class=\"mp-save\" onclick=\"mpStamSave('${ph}','${s.id}')\">Save<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n  return row+`<\u002Fdiv>`;\n}\nfunction mpRender(){\n  const ph=_mpPhase;\n  document.getElementById('mp-title').textContent='Manage · Phase '+ph.slice(1);\n  let html='';\n  PHASES[ph].days.forEach((day,i)=>{\n    html+=`<div class=\"mp-day\">${day.d} · ${day.t.replace(/Day \\d+ — /,'').replace(/—.*/,'').trim()}<\u002Fdiv>`;\n    effExList(ph,i).forEach(e=>{html+=mpExRow(e,ph,i);});\n    if(_mpAdd&&_mpAdd.ph===ph&&_mpAdd.i===i){html+=`<div class=\"mp-ex\">${mpForm(['','','',60,'','','',{s:3,lo:8,hi:12}],ph,i,true)}<\u002Fdiv>`;}\n    else{html+=`<button class=\"mp-add\" onclick=\"mpAdd('${ph}',${i})\">+ Add exercise<\u002Fbutton>`;}\n  });\n  html+=`<div class=\"mp-day\">Stamina add-ons<\u002Fdiv>`;\n  staminaList(ph).forEach(s=>{html+=mpStamRow(s,ph);});\n  html+=`<button class=\"mp-add\" onclick=\"mpStamAdd('${ph}')\">+ Add stamina add-on<\u002Fbutton>`;\n  html+=`<button class=\"mp-reset\" onclick=\"mpReset('${ph}')\">Reset this phase to default<\u002Fbutton>`;\n  document.getElementById('mp-body').innerHTML=html;\n}\nfunction mpEditToggle(id){_mpEdit=(_mpEdit===id?null:id);_mpAdd=null;mpRender();}\nfunction mpEditSave(id){\n  const f=readForm('mf');\n  DB.plan[id]=Object.assign({},DB.plan[id],{name:f.name,scheme:f.scheme,s:f.s,lo:f.lo,hi:f.hi,rest:f.rest,cue:f.cue,yt:f.yt,dw:f.dw});\n  delete DRAFT[id];_mpEdit=null;saveDB();mpRender();renderAll();\n}\nfunction mpDel(id,ph,i){\n  if(DB.customEx&&DB.customEx[id]){const dk=dayKey(ph,i);if(DB.added[dk])DB.added[dk]=DB.added[dk].filter(x=>x!==id);delete DB.customEx[id];delete DB.plan[id];}\n  else{DB.removed[id]=1;}\n  delete DRAFT[id];_mpEdit=null;saveDB();mpRender();renderAll();\n}\nfunction mpAdd(ph,i){_mpAdd={ph:ph,i:i};_mpEdit=null;mpRender();}\nfunction mpAddCancel(){_mpAdd=null;mpRender();}\nfunction mpAddSave(ph,i){\n  const f=readForm('af');const nm=f.name||'New exercise';\n  const id='cust_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);\n  const scheme=f.scheme||(f.s+' × '+(f.lo===f.hi?f.lo:f.lo+'–'+f.hi));\n  DB.customEx[id]=[id,nm,scheme,f.rest,f.cue,f.yt,'',{s:f.s,lo:f.lo,hi:f.hi}];\n  if(f.dw)DB.plan[id]={dw:f.dw};\n  const dk=dayKey(ph,i);if(!DB.added[dk])DB.added[dk]=[];DB.added[dk].push(id);\n  _mpAdd=null;saveDB();mpRender();renderAll();\n}\nfunction mpStamAdd(ph){const l=staminaList(ph);const id='st'+Math.random().toString(36).slice(2,7);l.push({id:id,text:'New conditioning add-on'});_mpStamEdit=id;saveDB();mpRender();renderAll();}\nfunction mpStamEditToggle(ph,id){_mpStamEdit=(_mpStamEdit===id?null:id);mpRender();}\nfunction mpStamSave(ph,id){const t=document.getElementById('sf-text').value.trim();const it=staminaList(ph).find(x=>x.id===id);if(it&&t)it.text=t;_mpStamEdit=null;saveDB();mpRender();renderAll();}\nfunction mpStamDel(ph,id){DB.stamina[ph]=staminaList(ph).filter(x=>x.id!==id);_mpStamEdit=null;saveDB();mpRender();renderAll();}\nfunction mpReset(ph){\n  const ids={};\n  PHASES[ph].days.forEach((d,i)=>{d.ex.forEach(e=>ids[e[0]]=1);const dk=dayKey(ph,i);(DB.added[dk]||[]).forEach(id=>ids[id]=1);delete DB.added[dk];});\n  Object.keys(ids).forEach(id=>{delete DB.plan[id];delete DB.removed[id];delete DB.customEx[id];delete DRAFT[id];});\n  delete DB.stamina[ph];\n  _mpEdit=null;_mpAdd=null;_mpStamEdit=null;saveDB();mpRender();renderAll();\n}\n\n/* ===== wire rail (delegated) + scrim + boot ===== */\ndocument.getElementById('railtrack').addEventListener('click',e=>{\n  const b=e.target.closest('button[data-t]');if(!b)return;\n  const t=b.dataset.t;\n  document.querySelectorAll('section').forEach(s=>s.classList.toggle('show',s.id===t));\n  railRender();window.scrollTo({top:0,behavior:'smooth'});\n});\ndocument.getElementById('mp-scrim').addEventListener('click',mpClose);\nload();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
